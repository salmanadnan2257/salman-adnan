  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0D0A12;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);

    #hud {
      position: absolute; right: 12px; bottom: 12px;

      padding: 7px 10px; border-radius: 999px;

      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #EFAF4E; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }

<script type="module">
import * as THREE from 'three';

/* ================= scene: prompt-evolution-ga ================= */
// FITNESS CLIMB
// Concept: a population of walkers evolves uphill on a slowly morphing fitness
//          landscape; each generation resamples toward higher ground, elites
//          ignite and exchange crossover sparks.
// Palette: bg obsidian #0D0A12, terrain violet-gray #3A3050, contour dim #514768,
//          walker amber #EFAF4E, elite magenta #D45BB0, spark white #F4EFE6.
//          Justification: a dark search-space violet with warm life climbing it,
//          magenta reserved strictly for the winners.
// Signature: crossover sparks arcing between elites at each generation tick.

function createScene(THREE, ctx) {
  const Q = ctx.quality;

  // Tunables
  const WALKERS = Math.floor(600 * Q);   // population size
  const SEG = Math.max(48, Math.floor(120 * Q)); // terrain grid segments per side
  const EXTENT = 30.0;                   // terrain width in world units
  const GEN_PERIOD = 5.0;                // seconds between generation ticks
  const GEN_TRAVEL = 1.8;                // seconds a resample transition takes
  const ELITES = 8;                      // walkers that ignite magenta
  const CANDIDATES = 5;                  // resample candidates per walker
  const MORPH_SPEED = 0.018;             // how fast the landscape drifts
  const SPARK_PTS = 16;                  // points per crossover arc
  const BG = 0x0D0A12;

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.020);

  const px = ctx.renderer.getPixelRatio();

  // The analytic hill field, mirrored exactly in GLSL below so walkers
  // always touch the terrain. JS uses it to bias resampling uphill.
  function hillsJS(x, z, m) {
    return 1.5 * Math.sin(x * 0.35 + m) * Math.cos(z * 0.30 - m * 0.7)
         + 0.9 * Math.sin(x * 0.62 - m * 1.3 + 2.1) * Math.cos(z * 0.55 + m * 0.9)
         + 0.5 * Math.sin((x + z) * 0.28 + m * 0.5);
  }

  const NOISE = `
  vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
              i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }`;

  const HILLS_GLSL = `
  float hills(vec2 p, float m){
    return 1.5 * sin(p.x * 0.35 + m) * cos(p.y * 0.30 - m * 0.7)
         + 0.9 * sin(p.x * 0.62 - m * 1.3 + 2.1) * cos(p.y * 0.55 + m * 0.9)
         + 0.5 * sin((p.x + p.y) * 0.28 + m * 0.5);
  }
  float terrainH(vec2 p, float m){
    return hills(p, m) + 0.35 * snoise(vec3(p.x * 0.45, p.y * 0.45, m * 0.4));
  }`;

  // Terrain grid built by hand (indexed BufferGeometry).
  const verts = new Float32Array((SEG + 1) * (SEG + 1) * 3);
  const idx = [];
  for (let j = 0; j <= SEG; j++) {
    for (let i = 0; i <= SEG; i++) {
      const o = (j * (SEG + 1) + i) * 3;
      verts[o] = (i / SEG - 0.5) * EXTENT;
      verts[o + 1] = 0;
      verts[o + 2] = (j / SEG - 0.5) * EXTENT;
    }
  }
  for (let j = 0; j < SEG; j++) {
    for (let i = 0; i < SEG; i++) {
      const a = j * (SEG + 1) + i, b = a + 1, c = a + SEG + 1, d = c + 1;
      idx.push(a, c, b, b, c, d);
    }
  }
  const terraGeo = new THREE.BufferGeometry();
  terraGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  terraGeo.setIndex(idx);

  const shared = {
    uMorph: { value: 0 },
    uTime: { value: 0 }
  };

  const terraMat = new THREE.ShaderMaterial({
    uniforms: {
      uMorph: shared.uMorph,
      uLow: { value: new THREE.Color(0x241E33) },
      uHigh: { value: new THREE.Color(0x4A3F66) },
      uContour: { value: new THREE.Color(0x514768) },
      uFog: { value: new THREE.Color(BG) }
    },
    side: THREE.DoubleSide,
    vertexShader: `
      uniform float uMorph;
      varying float vH;
      varying vec3 vWp;
      ${NOISE}
      ${HILLS_GLSL}
      void main(){
        vec3 p = position;
        p.y = terrainH(p.xz, uMorph);
        vH = p.y;
        vWp = p;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 uLow; uniform vec3 uHigh; uniform vec3 uContour; uniform vec3 uFog;
      varying float vH;
      varying vec3 vWp;
      void main(){
        float hn = clamp((vH + 2.9) / 5.8, 0.0, 1.0);
        vec3 col = mix(uLow, uHigh, hn);
        float f = abs(fract(vH * 1.5) - 0.5);
        float line = smoothstep(0.10, 0.02, f) * 0.45;
        col += uContour * line;
        float d = length(vWp.xz);
        col = mix(col, uFog, smoothstep(9.5, 16.5, d));
        gl_FragColor = vec4(col, 1.0);
      }`
  });
  ctx.scene.add(new THREE.Mesh(terraGeo, terraMat));

  // Walkers: position.xz holds the FROM sample, aTo holds the next target.
  const wPos = new Float32Array(WALKERS * 3);
  const wTo = new Float32Array(WALKERS * 2);
  const wSeed = new Float32Array(WALKERS);
  const wElite = new Float32Array(WALKERS);
  const BOUND = EXTENT * 0.45;
  for (let i = 0; i < WALKERS; i++) {
    const x = (Math.random() * 2 - 1) * BOUND;
    const z = (Math.random() * 2 - 1) * BOUND;
    wPos[i * 3] = x; wPos[i * 3 + 1] = 0; wPos[i * 3 + 2] = z;
    wTo[i * 2] = x; wTo[i * 2 + 1] = z;
    wSeed[i] = Math.random() * 100;
  }
  const wGeo = new THREE.BufferGeometry();
  wGeo.setAttribute('position', new THREE.Float32BufferAttribute(wPos, 3));
  wGeo.setAttribute('aTo', new THREE.Float32BufferAttribute(wTo, 2));
  wGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(wSeed, 1));
  wGeo.setAttribute('aElite', new THREE.Float32BufferAttribute(wElite, 1));

  const wUniforms = {
    uTime: shared.uTime,
    uMorph: shared.uMorph,
    uGenT: { value: 1 },
    uPx: { value: px },
    uAmber: { value: new THREE.Color(0xEFAF4E) },
    uMagenta: { value: new THREE.Color(0xD45BB0) }
  };

  const wMat = new THREE.ShaderMaterial({
    uniforms: wUniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      uniform float uTime;
      uniform float uMorph;
      uniform float uGenT;
      uniform float uPx;
      uniform vec3 uAmber;
      uniform vec3 uMagenta;
      attribute vec2 aTo;
      attribute float aSeed;
      attribute float aElite;
      varying vec3 vColor;
      varying float vAlpha;
      ${NOISE}
      ${HILLS_GLSL}
      void main(){
        // staggered eased hop from the old sample to the new one
        float e = smoothstep(0.0, 1.0, clamp(uGenT * 1.35 - fract(aSeed * 5.1) * 0.35, 0.0, 1.0));
        vec2 xz = mix(position.xz, aTo, e);
        // exploratory mutation shimmer between ticks
        xz += vec2(sin(uTime * 1.6 + aSeed * 21.0), cos(uTime * 1.4 + aSeed * 13.0)) * 0.06;
        float y = terrainH(xz, uMorph) + 0.10;
        y += sin(e * 3.14159265) * 0.5; // small airborne arc while resampling
        float pulse = 0.75 + 0.25 * sin(uTime * 3.0 + aSeed * 30.0);
        vColor = mix(uAmber, uMagenta * (0.8 + 0.5 * pulse), aElite);
        vAlpha = 0.85;
        vec4 mv = modelViewMatrix * vec4(xz.x, y, xz.y, 1.0);
        gl_PointSize = uPx * (2.4 + 2.4 * aElite * pulse) * (120.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float alpha = smoothstep(0.5, 0.05, d) * vAlpha;
        if (alpha < 0.02) discard;
        gl_FragColor = vec4(vColor, alpha);
      }`
  });
  ctx.scene.add(new THREE.Points(wGeo, wMat));

  // Crossover spark arcs between elite pairs (rebuilt each generation).
  const PAIRS = Math.floor(ELITES / 2);
  const sparkPos = new Float32Array(PAIRS * (SPARK_PTS - 1) * 2 * 3);
  const sparkGeo = new THREE.BufferGeometry();
  sparkGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparkPos, 3));
  const sparkMat = new THREE.LineBasicMaterial({
    color: 0xF4EFE6,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const sparks = new THREE.LineSegments(sparkGeo, sparkMat);
  sparks.visible = false;
  ctx.scene.add(sparks);

  // Generation state
  const eliteTarget = new Float32Array(WALKERS);
  let genStart = -GEN_PERIOD;   // last tick time
  let swapped = true;
  let sparkT = -10;
  let eliteIdx = [];

  function doGeneration(t) {
    const m = shared.uMorph.value;
    const posArr = wGeo.getAttribute('position').array;
    const toArr = wGeo.getAttribute('aTo').array;

    // elites of the CURRENT population guide part of the sampling
    const guide = eliteIdx.length ? eliteIdx : [0];

    const scored = [];
    for (let i = 0; i < WALKERS; i++) {
      const cx = toArr[i * 2], cz = toArr[i * 2 + 1];
      // FROM becomes wherever the walker last arrived
      posArr[i * 3] = cx; posArr[i * 3 + 2] = cz;
      let bx = cx, bz = cz, bh = -1e9;
      for (let c = 0; c < CANDIDATES; c++) {
        let sx, sz;
        if (c < 3) { // local exploration
          sx = cx + (Math.random() + Math.random() - 1) * 2.8;
          sz = cz + (Math.random() + Math.random() - 1) * 2.8;
        } else {     // pull toward a current elite
          const g = guide[Math.floor(Math.random() * guide.length)];
          sx = toArr[g * 2] + (Math.random() + Math.random() - 1) * 2.0;
          sz = toArr[g * 2 + 1] + (Math.random() + Math.random() - 1) * 2.0;
        }
        sx = Math.max(-BOUND, Math.min(BOUND, sx));
        sz = Math.max(-BOUND, Math.min(BOUND, sz));
        const h = hillsJS(sx, sz, m);
        if (h > bh) { bh = h; bx = sx; bz = sz; }
      }
      toArr[i * 2] = bx; toArr[i * 2 + 1] = bz;
      scored.push([bh, i]);
    }
    scored.sort((a, b) => b[0] - a[0]);
    eliteIdx = [];
    eliteTarget.fill(0);
    for (let k = 0; k < ELITES && k < scored.length; k++) {
      eliteIdx.push(scored[k][1]);
      eliteTarget[scored[k][1]] = 1;
    }
    wGeo.getAttribute('position').needsUpdate = true;
    wGeo.getAttribute('aTo').needsUpdate = true;
  }

  function spawnSparks(t) {
    const toArr = wGeo.getAttribute('aTo').array;
    const m = shared.uMorph.value;
    let o = 0;
    for (let p = 0; p < PAIRS; p++) {
      const ia = eliteIdx[p * 2], ib = eliteIdx[p * 2 + 1];
      if (ia === undefined || ib === undefined) break;
      const ax = toArr[ia * 2], az = toArr[ia * 2 + 1];
      const bx = toArr[ib * 2], bz = toArr[ib * 2 + 1];
      const ay = hillsJS(ax, az, m) + 0.55;
      const by = hillsJS(bx, bz, m) + 0.55;
      const dist = Math.hypot(bx - ax, bz - az);
      const lift = 1.1 + dist * 0.12;
      let prevX = ax, prevY = ay, prevZ = az;
      for (let s = 1; s < SPARK_PTS; s++) {
        const u = s / (SPARK_PTS - 1);
        const X = ax + (bx - ax) * u;
        const Z = az + (bz - az) * u;
        const Y = ay + (by - ay) * u + Math.sin(u * Math.PI) * lift;
        sparkPos[o] = prevX; sparkPos[o + 1] = prevY; sparkPos[o + 2] = prevZ;
        sparkPos[o + 3] = X; sparkPos[o + 4] = Y; sparkPos[o + 5] = Z;
        o += 6;
        prevX = X; prevY = Y; prevZ = Z;
      }
    }
    sparkGeo.getAttribute('position').needsUpdate = true;
    sparkGeo.setDrawRange(0, o / 3);
    sparkT = t;
    sparks.visible = true;
  }

  ctx.camera.position.set(0, 9, 21);
  ctx.camera.lookAt(0, 0.5, 0);

  return {
    update(t, dt) {
      shared.uTime.value = t;
      shared.uMorph.value = t * MORPH_SPEED;

      // generation tick
      if (t - genStart >= GEN_PERIOD) {
        genStart = t;
        swapped = false;
        doGeneration(t);
      }
      const gt = Math.min(1, (t - genStart) / GEN_TRAVEL);
      wUniforms.uGenT.value = gt;
      if (!swapped && gt >= 1) {
        swapped = true;
        spawnSparks(t);
      }

      // elite glow eases in and out instead of popping
      const el = wGeo.getAttribute('aElite');
      const k = Math.min(1, dt * 2.5);
      for (let i = 0; i < WALKERS; i++) {
        el.array[i] += (eliteTarget[i] - el.array[i]) * k;
      }
      el.needsUpdate = true;

      // spark envelope: quick rise, soft decay
      if (sparks.visible) {
        const age = t - sparkT;
        const op = (age < 0.12 ? age / 0.12 : Math.exp(-(age - 0.12) * 2.2)) * 0.85;
        sparkMat.opacity = op;
        if (op < 0.01 && age > 0.2) sparks.visible = false;
      }

      const a = t * 0.05 + ctx.pointer.x * 0.4;
      ctx.camera.position.set(
        Math.sin(a) * 21,
        8.5 + ctx.pointer.y * 2.0 + Math.sin(t * 0.09) * 0.5,
        Math.cos(a) * 21);
      ctx.camera.lookAt(0, 0.5, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'prompt-evolution-ga-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
