<script type="module">
import * as THREE from 'three';

/* ================= scene: flask-todo-list ================= */
// DONE AND GONE: a floating queue of task cards in denim dark space; on a
// relaxed rhythm the top card earns its green check ring, flips with an eased
// rotation, glows, and dissolves edge-first into rising pearl dust while the
// queue eases up a slot and a fresh card slides in from below.
//
// Palette: bg deep denim #0C1524, card indigo #33415E, check green #5FCB8E,
//          dust pearl #E8EDF4, priority amber #E8B24E.
//   Calm productivity blues; green is reserved for the moment of completion.
//
// Signature: the edge-first dissolve into rising dust.

function createScene(THREE, ctx) {
  const Q = ctx.quality;
  const PR = ctx.renderer.getPixelRatio();

  // ---- tunables ----
  const CARD_COUNT   = 9;      // cards in the queue
  const CARD_W       = 3.2;    // card width, world units
  const CARD_H       = 0.95;   // card height, world units
  const SLOT_TOP_Y   = 4.35;   // y of the top slot
  const SLOT_STEP    = 1.18;   // vertical slot spacing
  const DUST_COUNT   = Math.floor(800 * Q); // dissolve dust particles
  const DUST_LIFE    = 1.6;    // seconds a dust mote lives
  const IDLE_TIME    = 1.15;   // breath before the next check
  const RING_TIME    = 0.8;    // green ring drawing around the check circle
  const CHECK_TIME   = 0.35;   // check mark fade in
  const FLIP_TIME    = 0.7;    // card flip duration
  const GLOW_TIME    = 0.3;    // satisfied glow before dissolving
  const DISSOLVE_TIME = 1.5;   // erosion front crossing the card
  const SHIFT_TIME   = 0.9;    // queue easing up one slot
  const PRIORITY_ODDS = 0.2;   // chance a new card is priority

  const COL_BG = 0x0C1524;
  ctx.scene.background = new THREE.Color(COL_BG);
  ctx.scene.fog = new THREE.FogExp2(COL_BG, 0.02);

  function smooth01(x) {
    x = Math.min(1, Math.max(0, x));
    return x * x * (3 - 2 * x);
  }
  function easeInOut(x) {
    x = Math.min(1, Math.max(0, x));
    return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
  }
  function easeOutBack(x) {
    x = Math.min(1, Math.max(0, x));
    const c1 = 1.0;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
  }

  const uPr = { value: PR };

  const board = new THREE.Group();
  ctx.scene.add(board);

  // ---- card face textures: three abstract line layouts ----
  function roundedPath(g, x, y, w, h, r) {
    g.beginPath();
    g.moveTo(x + r, y);
    g.lineTo(x + w - r, y); g.arcTo(x + w, y, x + w, y + r, r);
    g.lineTo(x + w, y + h - r); g.arcTo(x + w, y + h, x + w - r, y + h, r);
    g.lineTo(x + r, y + h); g.arcTo(x, y + h, x, y + h - r, r);
    g.lineTo(x, y + r); g.arcTo(x, y, x + r, y, r);
    g.closePath();
  }
  function makeCardTexture(variant) {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 160;
    const g = c.getContext('2d');
    g.clearRect(0, 0, 512, 160);
    roundedPath(g, 6, 6, 500, 148, 18);
    g.fillStyle = '#33415E';
    g.fill();
    const grad = g.createLinearGradient(0, 6, 0, 154);
    grad.addColorStop(0, 'rgba(255,255,255,0.07)');
    grad.addColorStop(1, 'rgba(0,0,0,0.10)');
    g.fillStyle = grad;
    g.fill();
    g.strokeStyle = 'rgba(150,165,200,0.35)';
    g.lineWidth = 2.5;
    g.stroke();
    // check circle outline
    g.beginPath();
    g.arc(56, 80, 26, 0, Math.PI * 2);
    g.strokeStyle = 'rgba(210,220,240,0.5)';
    g.lineWidth = 3.5;
    g.stroke();
    // abstract task text lines, widths vary by variant
    const layouts = [
      [[110, 46, 300, 14], [110, 78, 220, 11], [110, 104, 260, 11]],
      [[110, 52, 250, 14], [110, 86, 320, 11]],
      [[110, 46, 340, 14], [110, 78, 180, 11], [110, 104, 230, 11]]
    ];
    const rows = layouts[variant % layouts.length];
    for (let i = 0; i < rows.length; i++) {
      roundedPath(g, rows[i][0], rows[i][1], rows[i][2], rows[i][3], rows[i][3] / 2);
      g.fillStyle = i === 0 ? 'rgba(170,185,215,0.6)' : 'rgba(140,155,185,0.42)';
      g.fill();
    }
    return new THREE.CanvasTexture(c);
  }
  const cardTextures = [makeCardTexture(0), makeCardTexture(1), makeCardTexture(2)];

  // check circle center in aspect-corrected shader space
  const ASPECT = CARD_W / CARD_H;
  const CIRC_X = (56 / 512) * ASPECT;
  const CIRC_R = 26 / 160;

  const CARD_VERT = `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const CARD_FRAG = `
    uniform sampler2D tMap;
    uniform float uRing;
    uniform float uCheck;
    uniform float uGlow;
    uniform float uDissolve;
    uniform float uPriority;
    uniform float uSeed;
    uniform vec2 uC;
    uniform float uR;
    uniform float uAspect;
    varying vec2 vUv;
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float vnoise(vec2 p){
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    float segd(vec2 p, vec2 a, vec2 b){
      vec2 pa = p - a, ba = b - a;
      float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
      return length(pa - ba * h);
    }
    void main(){
      vec4 tex = texture2D(tMap, vUv);
      vec3 col = tex.rgb;
      vec2 p = vec2(vUv.x * uAspect, vUv.y);
      // priority amber edge on the left
      float pr = uPriority * smoothstep(0.045, 0.018, vUv.x);
      col = mix(col, vec3(0.910, 0.698, 0.306), pr * 0.9 * tex.a);
      // green ring drawing itself around the check circle
      float ringD = abs(length(p - uC) - uR);
      float ang = atan(p.y - uC.y, p.x - uC.x);
      float angN = fract((ang + 3.14159265) / 6.2831853 + 0.25);
      float ring = smoothstep(0.022, 0.008, ringD) * step(angN, uRing) * step(0.001, uRing);
      // check mark inside the circle
      vec2 ca = uC + vec2(-0.55, -0.05) * uR;
      vec2 cb = uC + vec2(-0.12, -0.48) * uR;
      vec2 cc = uC + vec2(0.62, 0.45) * uR;
      float ck = min(segd(p, ca, cb), segd(p, cb, cc));
      float check = smoothstep(0.030, 0.012, ck) * uCheck;
      vec3 green = vec3(0.373, 0.796, 0.557) * (1.0 + uPriority * 0.55);
      col += green * (ring * 1.3 + check * 1.5);
      // satisfied glow
      col *= 1.0 + uGlow * 0.85;
      // edge-first dissolve sweeping left to right with a noisy front
      float n = vnoise(vUv * vec2(14.0, 4.0) + uSeed * 7.0);
      float front = uDissolve * 1.3 - 0.15 + (n - 0.5) * 0.18;
      float keep = smoothstep(front, front + 0.035, vUv.x);
      float rim = (1.0 - smoothstep(front + 0.02, front + 0.16, vUv.x)) * keep * step(0.001, uDissolve);
      col += vec3(0.910, 0.929, 0.957) * rim * 1.4;
      gl_FragColor = vec4(col, tex.a * keep);
    }
  `;

  // ---- cards ----
  const cards = [];
  for (let i = 0; i < CARD_COUNT; i++) {
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        tMap: { value: cardTextures[i % 3] },
        uRing: { value: 0 },
        uCheck: { value: 0 },
        uGlow: { value: 0 },
        uDissolve: { value: 0 },
        uPriority: { value: Math.random() < PRIORITY_ODDS ? 1 : 0 },
        uSeed: { value: Math.random() },
        uC: { value: new THREE.Vector2(CIRC_X, 0.5) },
        uR: { value: CIRC_R },
        uAspect: { value: ASPECT }
      },
      vertexShader: CARD_VERT,
      fragmentShader: CARD_FRAG,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W, CARD_H), mat);
    const group = new THREE.Group();
    group.add(mesh);
    board.add(group);
    cards.push({
      group: group,
      mesh: mesh,
      mat: mat,
      slot: i,
      fromSlot: i,
      toSlot: i,
      bob: Math.random() * Math.PI * 2,
      entering: false
    });
  }

  function slotY(s) { return SLOT_TOP_Y - s * SLOT_STEP; }
  function slotX(s) { return Math.sin(s * 0.35) * 0.15; }
  function slotZ(s) { return -s * 0.12; }

  // ---- dissolve dust ----
  const dustUv = new Float32Array(DUST_COUNT * 2);
  const dustSeed = new Float32Array(DUST_COUNT);
  const dustPosZero = new Float32Array(DUST_COUNT * 3);
  for (let i = 0; i < DUST_COUNT; i++) {
    dustUv[i * 2] = Math.random();
    dustUv[i * 2 + 1] = Math.random();
    dustSeed[i] = Math.random();
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.Float32BufferAttribute(dustPosZero, 3));
  dustGeo.setAttribute('aUv', new THREE.Float32BufferAttribute(dustUv, 2));
  dustGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(dustSeed, 1));
  const dustUniforms = {
    uPos: { value: new THREE.Vector3(0, 0, 0) },
    uT: { value: -10 },
    uDur: { value: DISSOLVE_TIME },
    uLife: { value: DUST_LIFE },
    uW: { value: CARD_W },
    uH: { value: CARD_H },
    uPr: uPr
  };
  const dustMat = new THREE.ShaderMaterial({
    uniforms: dustUniforms,
    vertexShader: `
      attribute vec2 aUv;
      attribute float aSeed;
      uniform vec3 uPos;
      uniform float uT;
      uniform float uDur;
      uniform float uLife;
      uniform float uW;
      uniform float uH;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float birth = aUv.x * uDur;
        float lt = uT - birth;
        float on = step(0.0, lt) * step(lt, uLife);
        float k = clamp(lt / uLife, 0.0, 1.0);
        vec3 base = uPos + vec3((aUv.x - 0.5) * uW, (aUv.y - 0.5) * uH, 0.02);
        vec3 p = base + vec3(
          sin(lt * 3.0 + aSeed * 6.2831) * 0.12 * k,
          max(lt, 0.0) * (0.7 + 0.7 * aSeed),
          sin(lt * 2.2 + aSeed * 12.0) * 0.1 * k
        );
        vColor = vec3(0.910, 0.929, 0.957);
        vAlpha = on * smoothstep(0.0, 0.12, k) * (1.0 - smoothstep(0.45, 1.0, k)) * 0.9;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = (0.35 + aSeed * 0.45) * (1.0 - 0.6 * k) * uPr * (150.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, 0.08, d);
        gl_FragColor = vec4(vColor, a * a * vAlpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  board.add(new THREE.Points(dustGeo, dustMat));

  // ---- ambient drifting motes for depth ----
  const MOTES = Math.floor(150 * Q);
  const motePos = new Float32Array(MOTES * 3);
  const moteSeed = new Float32Array(MOTES);
  for (let i = 0; i < MOTES; i++) {
    motePos[i * 3] = (Math.random() - 0.5) * 18;
    motePos[i * 3 + 1] = (Math.random() - 0.5) * 13;
    motePos[i * 3 + 2] = -3 - Math.random() * 6;
    moteSeed[i] = Math.random();
  }
  const moteGeo = new THREE.BufferGeometry();
  moteGeo.setAttribute('position', new THREE.Float32BufferAttribute(motePos, 3));
  moteGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(moteSeed, 1));
  const uTime = { value: 0 };
  const moteMat = new THREE.ShaderMaterial({
    uniforms: { uTime: uTime, uPr: uPr },
    vertexShader: `
      attribute float aSeed;
      uniform float uTime;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vec3 p = position;
        p.y += sin(uTime * 0.1 + aSeed * 6.2831) * 0.6;
        p.x += sin(uTime * 0.07 + aSeed * 12.6) * 0.5;
        vColor = vec3(0.55, 0.62, 0.75);
        vAlpha = 0.10 + 0.07 * sin(uTime * 0.6 + aSeed * 25.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = (0.4 + aSeed * 0.5) * uPr * (120.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, 0.08, d);
        gl_FragColor = vec4(vColor, a * a * vAlpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(moteGeo, moteMat));

  // ---- state machine ----
  const ST_IDLE = 0, ST_RING = 1, ST_CHECK = 2, ST_FLIP = 3, ST_GLOW = 4, ST_DISSOLVE = 5, ST_SHIFT = 6;
  let state = ST_IDLE;
  let stateT = 0;
  let dustT = -10;

  return {
    update(t, dt) {
      dt = Math.min(Math.max(dt || 0.016, 0.0001), 0.05);
      uTime.value = t;
      stateT += dt;
      dustT += dt;
      dustUniforms.uT.value = dustT;

      const top = cards[0];

      switch (state) {
        case ST_IDLE:
          if (stateT >= IDLE_TIME) { state = ST_RING; stateT = 0; }
          break;
        case ST_RING:
          top.mat.uniforms.uRing.value = easeInOut(stateT / RING_TIME);
          if (stateT >= RING_TIME) { state = ST_CHECK; stateT = 0; }
          break;
        case ST_CHECK:
          top.mat.uniforms.uCheck.value = smooth01(stateT / CHECK_TIME);
          if (stateT >= CHECK_TIME) { state = ST_FLIP; stateT = 0; }
          break;
        case ST_FLIP: {
          const k = easeInOut(stateT / FLIP_TIME);
          top.mesh.rotation.y = Math.PI * k;
          top.mesh.position.z = 0.5 * Math.sin(Math.PI * k);
          top.mat.uniforms.uGlow.value = 0.7 * smooth01(stateT / FLIP_TIME);
          if (stateT >= FLIP_TIME) { state = ST_GLOW; stateT = 0; }
          break;
        }
        case ST_GLOW:
          if (stateT >= GLOW_TIME) {
            state = ST_DISSOLVE;
            stateT = 0;
            dustT = 0;
            // freeze the dust origin at the card's current board-space position
            dustUniforms.uPos.value.copy(top.group.position);
            dustUniforms.uPos.value.y += top.mesh.position.y;
          }
          break;
        case ST_DISSOLVE:
          top.mat.uniforms.uDissolve.value = Math.min(1, stateT / DISSOLVE_TIME);
          top.mat.uniforms.uGlow.value = 0.7 * (1 - smooth01(stateT / DISSOLVE_TIME));
          if (stateT >= DISSOLVE_TIME) {
            state = ST_SHIFT;
            stateT = 0;
            // recycle: the dissolved card becomes the fresh card entering below
            const done = cards.shift();
            cards.push(done);
            for (let i = 0; i < CARD_COUNT; i++) {
              cards[i].fromSlot = i + 1;
              cards[i].toSlot = i;
              cards[i].entering = false;
            }
            done.fromSlot = CARD_COUNT + 0.8;
            done.toSlot = CARD_COUNT - 1;
            done.entering = true;
            // reset while it sits below the visible frame
            done.mesh.rotation.y = 0;
            done.mesh.position.z = 0;
            done.mat.uniforms.uRing.value = 0;
            done.mat.uniforms.uCheck.value = 0;
            done.mat.uniforms.uGlow.value = 0;
            done.mat.uniforms.uDissolve.value = 0;
            done.mat.uniforms.uSeed.value = Math.random();
            done.mat.uniforms.uPriority.value = Math.random() < PRIORITY_ODDS ? 1 : 0;
            done.mat.uniforms.tMap.value = cardTextures[Math.floor(Math.random() * 3)];
          }
          break;
        case ST_SHIFT: {
          for (let i = 0; i < CARD_COUNT; i++) {
            const c = cards[i];
            const stagger = c.entering ? 0.1 : i * 0.03;
            const k = Math.min(1, Math.max(0, (stateT - stagger) / (SHIFT_TIME - 0.15)));
            const e = c.entering ? easeOutBack(k) : easeInOut(k);
            c.slot = c.fromSlot + (c.toSlot - c.fromSlot) * e;
          }
          if (stateT >= SHIFT_TIME) {
            for (let i = 0; i < CARD_COUNT; i++) cards[i].slot = cards[i].toSlot;
            state = ST_IDLE;
            stateT = 0;
          }
          break;
        }
      }

      // place cards with a gentle idle bob
      for (let i = 0; i < CARD_COUNT; i++) {
        const c = cards[i];
        c.group.position.set(
          slotX(c.slot),
          slotY(c.slot) + Math.sin(t * 0.8 + c.bob) * 0.045,
          slotZ(c.slot)
        );
      }

      // pointer parallax on the whole board
      board.rotation.y += (ctx.pointer.x * 0.12 - board.rotation.y) * Math.min(1, dt * 3);
      board.rotation.x += (-ctx.pointer.y * 0.08 - board.rotation.x) * Math.min(1, dt * 3);

      ctx.camera.position.set(0, -0.2, 12);
      ctx.camera.lookAt(0, -0.2, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'flask-todo-list-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
