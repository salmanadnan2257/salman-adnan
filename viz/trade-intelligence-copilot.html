<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#061224">
  <title>Trade Intelligence Copilot in 3D · Salman Adnan</title>
  <meta name="description" content="Signal Routes: an interactive 3D study of agentic retrieval over global trade lanes.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #061224;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #F2B84B; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated 3D globe of trade lanes with luminous query pulses traveling along great-circle arcs."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
    <button id="btnFs" type="button" aria-pressed="false">Fullscreen</button>
  </div>
  <p id="note" hidden>Motion is paused because your system prefers reduced motion.
     Press Play to animate.</p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: trade-intelligence-copilot ================= */
// SIGNAL ROUTES
// A dark ocean globe of trade lanes; agentic retrieval drawn as pulse traffic on great circles.
// Palette: bg deep ocean #061224, lane cyan #35C4DC, pulse gold #F2B84B, answer coral #EF7B5A,
// port pearl #E8EEF5. Justification: a trading desk feel, cyan lanes and gold signals on deep
// navy, premium and calm.
// Signature: double direction pulse traffic, queries out in gold, answers back in coral.

function createScene(THREE, ctx) {
  const Q = ctx.quality || 1;

  // ---- tunables
  const GLOBE_R = 3.6;                      // globe radius in world units
  const GLOBE_PTS = Math.floor(4000 * Q);   // points scattered on the sphere
  const PORT_COUNT = 14;                    // glowing arc endpoints
  const ARC_COUNT = 40;                     // great circle trade lanes
  const ARC_SAMPLES = Math.floor(72 * Math.max(Q, 0.6)); // points per lane
  const SPIN = 0.05;                        // globe spin, radians per second
  const QUERY_SPEED = 0.085;                // gold pulse lane traversals per second
  const ANSWER_SPEED = 0.068;               // coral return pulse speed, a touch slower
  const CAM_R = 11.5;                       // camera orbit radius
  const CAM_H = 0.18;                       // resting camera elevation angle
  const BG = 0x061224;                      // deep ocean navy

  ctx.scene.background = new THREE.Color(BG);

  // deterministic rng so the piece is identical on every load
  let seed = 20260711;
  function rnd() { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }

  function randUnit() {
    const z = rnd() * 2 - 1;
    const a = rnd() * Math.PI * 2;
    const r = Math.sqrt(Math.max(0, 1 - z * z));
    return new THREE.Vector3(r * Math.cos(a), z, r * Math.sin(a));
  }

  // implied continents: a handful of soft density blobs on the sphere
  const blobs = [];
  for (let i = 0; i < 7; i++) blobs.push(randUnit());
  function landVal(v) {
    let s = 0;
    for (let i = 0; i < blobs.length; i++) s += Math.exp((v.dot(blobs[i]) - 1) * 6);
    return s;
  }

  const group = new THREE.Group();
  ctx.scene.add(group);

  // shared screen-height uniform for perspective point sizing
  const uPx = { value: ctx.renderer.domElement.height };
  const uTime = { value: 0 };

  const softFrag = `
    varying vec3 vCol;
    varying float vA;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      float a = smoothstep(0.5, 0.08, d);
      gl_FragColor = vec4(vCol, a * vA);
    }
  `;

  // ---- globe surface points, denser on the implied continents
  {
    const pos = new Float32Array(GLOBE_PTS * 3);
    const phase = new Float32Array(GLOBE_PTS);
    const shade = new Float32Array(GLOBE_PTS);
    let n = 0;
    while (n < GLOBE_PTS) {
      const v = randUnit();
      const lv = landVal(v);
      const dens = 0.22 + 0.78 * Math.min(1, lv);
      if (rnd() > dens) continue;
      pos[n * 3] = v.x * GLOBE_R;
      pos[n * 3 + 1] = v.y * GLOBE_R;
      pos[n * 3 + 2] = v.z * GLOBE_R;
      phase[n] = rnd() * Math.PI * 2;
      shade[n] = Math.min(1, lv);
      n++;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('aPhase', new THREE.Float32BufferAttribute(phase, 1));
    g.setAttribute('aShade', new THREE.Float32BufferAttribute(shade, 1));
    const m = new THREE.ShaderMaterial({
      uniforms: { uTime: uTime, uPx: uPx },
      vertexShader: `
        attribute float aPhase;
        attribute float aShade;
        uniform float uTime;
        uniform float uPx;
        varying vec3 vCol;
        varying float vA;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          float fc = dot(normalize((modelViewMatrix * vec4(normalize(position), 0.0)).xyz), vec3(0.0, 0.0, 1.0));
          float facing = smoothstep(-0.55, 0.35, fc);
          float tw = 0.75 + 0.25 * sin(uTime * 0.7 + aPhase);
          vA = (0.30 + 0.38 * aShade) * tw * (0.2 + 0.8 * facing);
          vCol = mix(vec3(0.22, 0.52, 0.68), vec3(0.91, 0.93, 0.96), aShade * 0.55);
          gl_PointSize = (2.4 + aShade * 1.6) * uPx / (-mv.z * 55.0);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: softFrag,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    group.add(new THREE.Points(g, m));
  }

  // ---- ports: pick well separated land points
  const ports = [];
  {
    let guard = 0;
    while (ports.length < PORT_COUNT && guard < 20000) {
      guard++;
      const v = randUnit();
      if (landVal(v) < 0.55) continue;
      let ok = true;
      for (let i = 0; i < ports.length; i++) {
        if (ports[i].angleTo(v) < 0.5) { ok = false; break; }
      }
      if (ok) ports.push(v);
    }
    while (ports.length < PORT_COUNT) ports.push(randUnit());
  }

  {
    const pos = new Float32Array(PORT_COUNT * 3);
    const phase = new Float32Array(PORT_COUNT);
    for (let i = 0; i < PORT_COUNT; i++) {
      pos[i * 3] = ports[i].x * GLOBE_R * 1.005;
      pos[i * 3 + 1] = ports[i].y * GLOBE_R * 1.005;
      pos[i * 3 + 2] = ports[i].z * GLOBE_R * 1.005;
      phase[i] = rnd() * Math.PI * 2;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute('aPhase', new THREE.Float32BufferAttribute(phase, 1));
    const m = new THREE.ShaderMaterial({
      uniforms: { uTime: uTime, uPx: uPx },
      vertexShader: `
        attribute float aPhase;
        uniform float uTime;
        uniform float uPx;
        varying vec3 vCol;
        varying float vA;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          float fc = dot(normalize((modelViewMatrix * vec4(normalize(position), 0.0)).xyz), vec3(0.0, 0.0, 1.0));
          float facing = smoothstep(-0.45, 0.4, fc);
          float pulse = 0.65 + 0.35 * sin(uTime * 0.9 + aPhase);
          vA = 0.7 * pulse * facing;
          vCol = vec3(0.91, 0.933, 0.961);
          gl_PointSize = (8.0 + 2.5 * pulse) * uPx / (-mv.z * 55.0);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: softFrag,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    group.add(new THREE.Points(g, m));
  }

  // ---- great circle arcs with two way pulse traffic
  function slerp(a, b, t) {
    const d = THREE.MathUtils.clamp(a.dot(b), -1, 1);
    const th = Math.acos(d);
    if (th < 1e-4) return a.clone();
    const s = Math.sin(th);
    return a.clone().multiplyScalar(Math.sin((1 - t) * th) / s)
      .add(b.clone().multiplyScalar(Math.sin(t * th) / s));
  }

  {
    const total = ARC_COUNT * ARC_SAMPLES;
    const pos = new Float32Array(total * 3);
    const aT = new Float32Array(total);
    const aPh1 = new Float32Array(total);
    const aPh2 = new Float32Array(total);
    const aSpd = new Float32Array(total);
    let w = 0;
    let made = 0;
    let guard = 0;
    while (made < ARC_COUNT && guard < 4000) {
      guard++;
      const i = Math.floor(rnd() * PORT_COUNT);
      let j = Math.floor(rnd() * PORT_COUNT);
      if (i === j) continue;
      const ang = ports[i].angleTo(ports[j]);
      if (ang < 0.5 || ang > 2.6) continue;
      const lift = 0.10 + 0.22 * (ang / Math.PI);
      const ph1 = rnd();
      const ph2 = rnd();
      const spd = 0.7 + rnd() * 0.6;
      for (let k = 0; k < ARC_SAMPLES; k++) {
        const t = k / (ARC_SAMPLES - 1);
        const v = slerp(ports[i], ports[j], t);
        const r = GLOBE_R * (1.015 + lift * Math.sin(Math.PI * t));
        pos[w * 3] = v.x * r;
        pos[w * 3 + 1] = v.y * r;
        pos[w * 3 + 2] = v.z * r;
        aT[w] = t;
        aPh1[w] = ph1;
        aPh2[w] = ph2;
        aSpd[w] = spd;
        w++;
      }
      made++;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos.subarray(0, w * 3), 3));
    g.setAttribute('aT', new THREE.Float32BufferAttribute(aT.subarray(0, w), 1));
    g.setAttribute('aPh1', new THREE.Float32BufferAttribute(aPh1.subarray(0, w), 1));
    g.setAttribute('aPh2', new THREE.Float32BufferAttribute(aPh2.subarray(0, w), 1));
    g.setAttribute('aSpd', new THREE.Float32BufferAttribute(aSpd.subarray(0, w), 1));
    const m = new THREE.ShaderMaterial({
      uniforms: {
        uTime: uTime, uPx: uPx,
        uQSpd: { value: QUERY_SPEED },
        uASpd: { value: ANSWER_SPEED }
      },
      vertexShader: `
        attribute float aT;
        attribute float aPh1;
        attribute float aPh2;
        attribute float aSpd;
        uniform float uTime;
        uniform float uPx;
        uniform float uQSpd;
        uniform float uASpd;
        varying vec3 vCol;
        varying float vA;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          float fc = dot(normalize((modelViewMatrix * vec4(normalize(position), 0.0)).xyz), vec3(0.0, 0.0, 1.0));
          float facing = smoothstep(-0.65, 0.25, fc);
          // gold query pulse travels 0 to 1, comet tail just behind the head
          float dq = fract(aT - uTime * uQSpd * aSpd + aPh1);
          float wq = smoothstep(0.16, 0.0, dq);
          // coral answer pulse travels 1 to 0
          float da = fract((1.0 - aT) - uTime * uASpd * aSpd + aPh2);
          float wa = smoothstep(0.14, 0.0, da);
          vec3 lane = vec3(0.208, 0.769, 0.863);
          vec3 gold = vec3(0.949, 0.722, 0.294);
          vec3 coral = vec3(0.937, 0.482, 0.353);
          float pk = min(1.0, wq + wa);
          vCol = lane * 0.85 * (1.0 - pk) + gold * wq * 1.05 + coral * wa * 0.95;
          vA = (0.50 + 0.55 * pk) * facing;
          float sz = 2.6 + 4.6 * pk;
          gl_PointSize = sz * uPx / (-mv.z * 55.0);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: softFrag,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    group.add(new THREE.Points(g, m));
  }

  ctx.camera.position.set(0, Math.sin(CAM_H) * CAM_R, Math.cos(CAM_H) * CAM_R);
  ctx.camera.lookAt(0, 0, 0);

  return {
    update(t, dt) {
      uTime.value = t;
      group.rotation.y = t * SPIN;
      const a = ctx.pointer.x * 0.5;
      const e = CAM_H + ctx.pointer.y * 0.25;
      ctx.camera.position.set(
        Math.sin(a) * CAM_R * Math.cos(e),
        Math.sin(e) * CAM_R,
        Math.cos(a) * CAM_R * Math.cos(e)
      );
      ctx.camera.lookAt(0, 0, 0);
    },
    resize() {
      uPx.value = ctx.renderer.domElement.height;
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'trade-intelligence-copilot-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
