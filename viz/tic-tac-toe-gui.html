<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0E1018">
  <title>Tic Tac Toe in 3D · Salman Adnan</title>
  <meta name="description" content="Endless Openings: an interactive 3D study of games drawing themselves on a floating glass grid.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0E1018;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas {
      display: block; width: 100%; height: 100%; outline: none;
      cursor: grab; touch-action: pan-y;
    }
    canvas.is-grabbing { cursor: grabbing; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hint {
      position: absolute; left: 12px; bottom: 12px;
      padding: 6px 11px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      pointer-events: none; white-space: nowrap;
      opacity: 0.75; transition: opacity 0.5s ease;
    }
    #hint b { font-weight: 600; color: rgba(255, 255, 255, 0.95); }
    #hint.is-gone { opacity: 0; }
    /* Narrow frames have no room for the tail, and a finger cannot scroll or
       double-click anyway: the drag is the part that matters on touch. */
    @media (max-width: 700px), (pointer: coarse) {
      #hintMore { display: none; }
    }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #EEC55E; }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    #lbl {
      position: absolute; left: 12px; top: 12px; max-width: 44ch;
      padding: 10px 14px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #lbl h1 {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
    }
    #lblSub { margin-top: 3px; opacity: 0.72; }
    #lblPhase {
      margin-top: 8px; min-height: 1.4em; color: #EEC55E;
      opacity: 1; transition: opacity 0.18s ease;
    }
    #legend {
      position: absolute; right: 12px; top: 12px;
      display: flex; flex-direction: column; gap: 5px;
      padding: 9px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      pointer-events: none; font-size: 11px;
    }
    #legend span { display: flex; align-items: center; gap: 7px; }
    #legend i {
      width: 9px; height: 9px; border-radius: 2px; flex: none;
      background: var(--c); box-shadow: 0 0 6px var(--c);
    }
    @media (max-width: 640px) {
      #lblSub { display: none; }
      #lbl { max-width: 30ch; }
      #legend { font-size: 10px; padding: 7px 9px; gap: 4px; }
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
    @media (max-width: 480px) {
      /* keep even the longest title on one line, clear of the legend */
      #lbl h1 { font-size: 10px; letter-spacing: 0.1em; }
      #lbl { max-width: 26ch; padding: 8px 11px; }
    }
    /* Compact mode, opted into with ?compact=1 on the URL. The frame is then a
       card, roughly 380x260, and panels sized for a window cover the scene they
       exist to explain. At that size the scene is the whole point, so it gets the
       whole frame: no title card, no legend, no control HUD, no drag hint. The
       host page carries the title and the affordance. The piece itself is
       untouched: it still runs, still orbits, still zooms. */
    html.is-compact #lbl,
    html.is-compact #legend,
    html.is-compact #hud,
    html.is-compact #hint { display: none; }
    /* The one panel compact mode keeps: if WebGL is missing there is nothing else
       to look at, so the note stays, sized for the card. */
    html.is-compact #err { padding: 14px; font-size: 11px; line-height: 1.5; }
  </style>
  <script>
    /* Read here, ahead of the first paint, so a card never flashes the chrome it
       is about to hide. Any value but 0 turns it on. */
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.has('compact') && p.get('compact') !== '0') {
        document.documentElement.classList.add('is-compact');
      }
    })();
  </script>
</head>

<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated floating glass grid where X and O strokes draw themselves, the win line flares, and the board dissolves into the next game."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
    <button id="btnReset" type="button" hidden>Reset view</button>
    <button id="btnFs" type="button" aria-pressed="false">Fullscreen</button>
  </div>
  <div id="lbl">
    <h1>Endless Openings</h1>
    <p id="lblSub">Tic Tac Toe playing itself from legal scripts; gold marks the deciding line.</p>
    <p id="lblPhase" aria-hidden="true"></p>
  </div>
  <div id="legend" role="list" aria-label="Legend">
    <span role="listitem"><i style="--c:#E8705A"></i>X</span>
    <span role="listitem"><i style="--c:#5AA8E8"></i>O</span>
    <span role="listitem"><i style="--c:#EEC55E"></i>Winning line</span>
  </div>
  <p id="hint" aria-hidden="true"><b>Drag</b> to orbit<span id="hintMore"> &middot; scroll to zoom &middot; double-click to reset</span></p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

/* ================= scene: tic-tac-toe-gui ================= */
// ENDLESS OPENINGS, tic tac toe playing itself on a floating glass grid:
// every game comes from a precomputed legal script (wins for X, wins for O,
// draws), strokes draw themselves like a confident pen, the winning line
// flares gold, and the board dissolves into the next game.
// Palette: bg ink #0E1018, grid glass #3C4454, X coral #E8705A, O sky #5AA8E8,
//   win gold #EEC55E. Two friendly rival hues on dark glass, gold only for
//   the deciding line.
// Signature: strokes that draw themselves like a confident pen.

function createScene(THREE, ctx) {
  const q = ctx.quality;

  // ---- tunables -----------------------------------------------------------
  const BG = 0x0E1018;        // ink background
  const GRID_COL = 0x3C4454;  // glass slab tint
  const EDGE_COL = 0x8A96B0;  // grid edge glow
  const X_COL = 0xE8705A;     // coral X strokes
  const O_COL = 0x5AA8E8;     // sky O sweeps
  const WIN_COL = 0xEEC55E;   // gold win flare
  const S = 1.42;             // cell pitch (center to center)
  const MOVE_DT = 1.15;       // thinking pause between moves, seconds
  const STROKE_T = 0.62;      // time to draw one piece
  const SPARK_POOL = Math.max(120, Math.floor(320 * q)); // dissolve spark budget
  const GHOSTS = 2;           // faint mid-game boards in the background

  const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
  const easeOut = (x) => 1 - Math.pow(1 - clamp(x, 0, 1), 3);
  const easeIn = (x) => { x = clamp(x, 0, 1); return x * x * x; };
  let seed = 424242;
  const rnd = () => { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let z = Math.imul(seed ^ seed >>> 15, 1 | seed); z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z; return ((z ^ z >>> 14) >>> 0) / 4294967296; };

  // ---- precomputed legal game scripts (cells 0..8 row-major, X moves first).
  // Each was checked by hand for legality and sensible play: blocks happen,
  // wins come from forks or one plausible slip, draws are well fought.
  const SCRIPTS = [
    { m: [0, 4, 8, 6, 2, 1, 5], win: 'X', line: [2, 5, 8] },
    { m: [2, 4, 6, 0, 8, 5, 7], win: 'X', line: [6, 7, 8] },
    { m: [4, 0, 2, 6, 5, 3, 8], win: 'X', line: [2, 5, 8] },
    { m: [1, 4, 7, 0, 8, 6, 3, 2], win: 'O', line: [2, 4, 6] },
    { m: [0, 4, 8, 1, 7, 6, 2, 5, 3], win: 'D', line: null },
    { m: [4, 0, 6, 2, 3, 5, 1, 7, 8], win: 'D', line: null },
    { m: [3, 4, 0, 6, 2, 1, 7, 5, 8], win: 'D', line: null }
  ];

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.02);

  const cellPos = (i) => new THREE.Vector2(((i % 3) - 1) * S, (1 - Math.floor(i / 3)) * S);

  // ---- board group ---------------------------------------------------------
  const board = new THREE.Group();
  ctx.scene.add(board);

  // glass grid: four slabs plus edge glow lines
  const gridGroup = new THREE.Group();
  board.add(gridGroup);
  const slabMat = new THREE.MeshBasicMaterial({ color: GRID_COL, transparent: true, opacity: 0.42 });
  const edgeMat = new THREE.LineBasicMaterial({ color: EDGE_COL, transparent: true, opacity: 0.35 });
  const barLen = S * 3 + 0.4;
  for (let k = 0; k < 4; k++) {
    const vert = k < 2;
    const geo = vert ? new THREE.BoxGeometry(0.07, barLen, 0.16) : new THREE.BoxGeometry(barLen, 0.07, 0.16);
    const slab = new THREE.Mesh(geo, slabMat);
    const off = (k % 2 === 0 ? -1 : 1) * S / 2;
    if (vert) slab.position.x = off; else slab.position.y = off;
    gridGroup.add(slab);
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
    edges.position.copy(slab.position);
    gridGroup.add(edges);
  }

  // ---- piece pools: 9 X groups (two pen strokes each), 9 O shader rings ----
  function makeXPiece() {
    const g = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({ color: X_COL, transparent: true, opacity: 1 });
    const barGeo = new THREE.BoxGeometry(1, 0.13, 0.13);
    barGeo.translate(0.5, 0, 0); // grow from the origin end, like a pen stroke
    const b1 = new THREE.Mesh(barGeo, mat);
    b1.position.set(-0.44, 0.44, 0.05); b1.rotation.z = -Math.PI / 4; b1.scale.x = 0.0001;
    const b2 = new THREE.Mesh(barGeo, mat);
    b2.position.set(0.44, 0.44, 0.05); b2.rotation.z = -3 * Math.PI / 4; b2.scale.x = 0.0001;
    g.add(b1, b2);
    g.visible = false;
    return { group: g, bars: [b1, b2], mat: mat, len: 1.24 };
  }

  const O_FRAG = [
    'uniform float uProg;',
    'uniform float uFade;',
    'uniform float uFlash;',
    'uniform vec3 uColor;',
    'varying vec2 vUv;',
    'void main(){',
    '  vec2 p = vUv * 2.0 - 1.0;',
    '  float r = length(p);',
    '  float ring = smoothstep(0.16, 0.05, abs(r - 0.6));',
    '  float ang = atan(p.x, p.y);',
    '  float u = ang < 0.0 ? ang + 6.28318 : ang;',
    '  u /= 6.28318;',
    '  float reveal = 1.0 - smoothstep(uProg - 0.015, uProg + 0.015, u);',
    '  float head = smoothstep(0.10, 0.0, abs(u - uProg)) * step(uProg, 0.985) * 0.9;',
    '  float a = ring * (reveal + head) * uFade;',
    '  vec3 col = uColor + vec3(1.0, 0.95, 0.8) * uFlash * 0.7;',
    '  gl_FragColor = vec4(col, a);',
    '}'
  ].join('\n');
  const O_VERT = [
    'varying vec2 vUv;',
    'void main(){',
    '  vUv = uv;',
    '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
    '}'
  ].join('\n');

  function makeOPiece() {
    const uniforms = {
      uProg: { value: 0 }, uFade: { value: 1 }, uFlash: { value: 0 },
      uColor: { value: new THREE.Color(O_COL) }
    };
    const mat = new THREE.ShaderMaterial({
      uniforms: uniforms, vertexShader: O_VERT, fragmentShader: O_FRAG,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.16, 1.16), mat);
    mesh.visible = false;
    return { mesh: mesh, u: uniforms };
  }

  const xPieces = [], oPieces = [];
  for (let i = 0; i < 9; i++) {
    const xp = makeXPiece(); board.add(xp.group); xPieces.push(xp);
    const op = makeOPiece(); board.add(op.mesh); oPieces.push(op);
  }

  // ---- win line flare -------------------------------------------------------
  const winUniforms = { uProg: { value: 0 }, uFade: { value: 0 }, uColor: { value: new THREE.Color(WIN_COL) } };
  const winMat = new THREE.ShaderMaterial({
    uniforms: winUniforms,
    vertexShader: O_VERT,
    fragmentShader: [
      'uniform float uProg;',
      'uniform float uFade;',
      'uniform vec3 uColor;',
      'varying vec2 vUv;',
      'void main(){',
      '  float along = vUv.x;',
      '  float across = abs(vUv.y - 0.5) * 2.0;',
      '  float body = smoothstep(1.0, 0.2, across);',
      '  float reveal = 1.0 - smoothstep(uProg - 0.02, uProg + 0.02, along);',
      '  float head = smoothstep(0.08, 0.0, abs(along - uProg)) * 1.2;',
      '  gl_FragColor = vec4(uColor, (body * reveal + head * body) * uFade);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
  });
  const winBar = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.34), winMat);
  winBar.visible = false;
  board.add(winBar);

  function placeWinBar(line) {
    const a = cellPos(line[0]), c = cellPos(line[2]);
    const mid = a.clone().add(c).multiplyScalar(0.5);
    const dir = c.clone().sub(a);
    const len = dir.length() + 1.0;
    winBar.position.set(mid.x, mid.y, 0.12);
    winBar.rotation.z = Math.atan2(dir.y, dir.x);
    winBar.scale.set(len, 1, 1);
    winBar.visible = true;
  }

  // ---- dissolve sparks ------------------------------------------------------
  const spPos = new Float32Array(SPARK_POOL * 3);
  const spVel = new Float32Array(SPARK_POOL * 3);
  const spLife = new Float32Array(SPARK_POOL);
  const spMax = new Float32Array(SPARK_POOL);
  const spA = new Float32Array(SPARK_POOL);
  const spKind = new Float32Array(SPARK_POOL); // 0 coral, 1 sky
  const spGeo = new THREE.BufferGeometry();
  spGeo.setAttribute('position', new THREE.BufferAttribute(spPos, 3));
  spGeo.setAttribute('aAlpha', new THREE.Float32BufferAttribute(spA, 1));
  spGeo.setAttribute('aKind', new THREE.BufferAttribute(spKind, 1));
  const spMat = new THREE.ShaderMaterial({
    uniforms: {
      uColA: { value: new THREE.Color(X_COL) },
      uColB: { value: new THREE.Color(O_COL) }
    },
    vertexShader: [
      'attribute float aAlpha;',
      'attribute float aKind;',
      'varying float vA;',
      'varying float vK;',
      'void main(){',
      '  vA = aAlpha; vK = aKind;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = (0.3 + 0.5 * aAlpha) * (120.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColA;',
      'uniform vec3 uColB;',
      'varying float vA;',
      'varying float vK;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  float a = smoothstep(0.5, 0.08, d) * vA;',
      '  gl_FragColor = vec4(mix(uColA, uColB, vK), a);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const sparks = new THREE.Points(spGeo, spMat);
  sparks.frustumCulled = false; // pool starts at the origin, sparks fly across the board
  board.add(sparks);
  let spCursor = 0;

  function spawnSparks(x, y, kind, n) {
    for (let k = 0; k < n; k++) {
      const i = spCursor; spCursor = (spCursor + 1) % SPARK_POOL;
      const a = rnd() * Math.PI * 2, sp = 0.4 + rnd() * 1.4;
      spPos[i * 3] = x + (rnd() - 0.5) * 0.7;
      spPos[i * 3 + 1] = y + (rnd() - 0.5) * 0.7;
      spPos[i * 3 + 2] = 0.1;
      spVel[i * 3] = Math.cos(a) * sp;
      spVel[i * 3 + 1] = Math.sin(a) * sp + 0.5;
      spVel[i * 3 + 2] = (rnd() - 0.5) * 0.6;
      spMax[i] = 0.5 + rnd() * 0.6;
      spLife[i] = spMax[i];
      spKind[i] = kind;
    }
    spGeo.attributes.aKind.needsUpdate = true;
  }

  // ---- ghost boards drifting far behind ------------------------------------
  function ghostMarkTexture(isX) {
    const cv = document.createElement('canvas');
    cv.width = 64; cv.height = 64;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, 64, 64);
    g.strokeStyle = '#ffffff';
    g.lineWidth = 8; g.lineCap = 'round';
    if (isX) {
      g.beginPath(); g.moveTo(16, 16); g.lineTo(48, 48);
      g.moveTo(48, 16); g.lineTo(16, 48); g.stroke();
    } else {
      g.beginPath(); g.arc(32, 32, 18, 0, Math.PI * 2); g.stroke();
    }
    return new THREE.CanvasTexture(cv);
  }
  const ghostXTex = ghostMarkTexture(true);
  const ghostOTex = ghostMarkTexture(false);
  const ghosts = [];
  for (let g = 0; g < GHOSTS; g++) {
    const grp = new THREE.Group();
    const gm = new THREE.LineBasicMaterial({ color: EDGE_COL, transparent: true, opacity: 0.08 });
    const pts = [];
    for (let k = 0; k < 4; k++) {
      const vert = k < 2, off = (k % 2 === 0 ? -1 : 1) * S / 2;
      if (vert) pts.push(off, -barLen / 2, 0, off, barLen / 2, 0);
      else pts.push(-barLen / 2, off, 0, barLen / 2, off, 0);
    }
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    grp.add(new THREE.LineSegments(lg, gm));
    // a frozen mid-game: three ghost marks
    const gx = new THREE.MeshBasicMaterial({ color: X_COL, transparent: true, opacity: 0.14, map: ghostXTex, depthWrite: false });
    const go = new THREE.MeshBasicMaterial({ color: O_COL, transparent: true, opacity: 0.14, map: ghostOTex, depthWrite: false });
    const marks = g === 0 ? [[0, 1], [4, 0], [8, 1]] : [[2, 1], [4, 1], [3, 0]];
    for (const mk of marks) {
      const p = cellPos(mk[0]);
      const quad = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 1.0), mk[1] ? gx : go);
      quad.position.set(p.x, p.y, 0.02);
      grp.add(quad);
    }
    grp.position.set(g === 0 ? -5.5 : 6.2, g === 0 ? 2.2 : -1.6, -8.5);
    grp.scale.setScalar(0.62);
    ctx.scene.add(grp);
    ghosts.push(grp);
  }

  // ---- game state machine ---------------------------------------------------
  let order = shuffle([0, 1, 2, 3, 4, 5, 6]);
  let orderIdx = 0;
  let script = SCRIPTS[order[0]];
  let moveIdx = 0;                 // next move to place
  let placed = [];                 // {cell, kind:0 X /1 O, t0}
  let state = 'play';              // play | flare | shimmer | dissolve | reset
  let stateT = 0;
  let moveTimer = 0.8;
  let tt = 0;
  let boardTiltBase = -0.14, boardYawBase = 0.06;
  let dissolveSpawned = false;
  let shimmerPulse = 0;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function hidePieces() {
    for (let i = 0; i < 9; i++) {
      xPieces[i].group.visible = false;
      xPieces[i].bars[0].scale.x = 0.0001;
      xPieces[i].bars[1].scale.x = 0.0001;
      xPieces[i].mat.opacity = 1;
      xPieces[i].mat.color.setHex(X_COL);
      xPieces[i].group.scale.setScalar(1);
      oPieces[i].mesh.visible = false;
      oPieces[i].mesh.scale.setScalar(1);
      oPieces[i].u.uProg.value = 0;
      oPieces[i].u.uFade.value = 1;
      oPieces[i].u.uFlash.value = 0;
    }
    winBar.visible = false;
    winUniforms.uProg.value = 0;
    winUniforms.uFade.value = 0;
  }

  function placeMove(cell, kind) {
    const p = cellPos(cell);
    if (kind === 0) {
      const xp = xPieces[cell];
      xp.group.position.set(p.x, p.y, 0);
      xp.group.visible = true;
    } else {
      const op = oPieces[cell];
      op.mesh.position.set(p.x, p.y, 0.05);
      op.mesh.visible = true;
    }
    placed.push({ cell: cell, kind: kind, t0: tt });
  }

  function nextGame() {
    orderIdx = (orderIdx + 1) % order.length;
    if (orderIdx === 0) order = shuffle(order);
    script = SCRIPTS[order[orderIdx]];
    moveIdx = 0; placed = []; moveTimer = MOVE_DT * 0.7;
    dissolveSpawned = false;
    boardTiltBase = -0.14 + (rnd() - 0.5) * 0.16;
    boardYawBase = (rnd() - 0.5) * 0.2;
    hidePieces();
  }

  ctx.camera.position.set(0, 0.4, 10.2);
  ctx.camera.lookAt(0, 0, 0);

  function update(t, dt) {
    dt = clamp(dt, 0, 0.05);
    tt += dt; stateT += dt;

    // advance the current game
    if (state === 'play') {
      moveTimer -= dt;
      if (moveTimer <= 0 && moveIdx < script.m.length) {
        placeMove(script.m[moveIdx], moveIdx % 2);
        moveIdx++;
        moveTimer = MOVE_DT * (0.85 + rnd() * 0.4);
      }
      if (moveIdx >= script.m.length) {
        // wait for the last stroke to finish drawing
        const last = placed[placed.length - 1];
        if (last && tt - last.t0 > STROKE_T + 0.35) {
          if (script.win === 'D') { state = 'shimmer'; shimmerPulse = 1; }
          else { state = 'flare'; placeWinBar(script.line); }
          stateT = 0;
        }
      }
    } else if (state === 'flare') {
      winUniforms.uFade.value = Math.min(1, stateT * 3);
      winUniforms.uProg.value = easeOut(stateT / 0.55);
      // pulse the three winning pieces
      const pulse = 0.5 + 0.5 * Math.sin(stateT * 7 - 1.4);
      for (const c of script.line) {
        if (script.win === 'X') {
          xPieces[c].mat.color.setHex(X_COL).lerp(new THREE.Color(0xffe9c8), pulse * 0.55);
          xPieces[c].group.scale.setScalar(1 + pulse * 0.07);
        } else {
          oPieces[c].u.uFlash.value = pulse;
          oPieces[c].mesh.scale.setScalar(1 + pulse * 0.07);
        }
      }
      if (stateT > 2.3) { state = 'dissolve'; stateT = 0; }
    } else if (state === 'shimmer') {
      shimmerPulse = Math.max(0, 1 - stateT / 1.6);
      if (stateT > 1.8) { state = 'dissolve'; stateT = 0; }
    } else if (state === 'dissolve') {
      const u = stateT / 1.5;
      // pieces fade, sparks fly once, board tips back
      const fade = 1 - easeIn(u);
      for (const pl of placed) {
        if (pl.kind === 0) xPieces[pl.cell].mat.opacity = fade;
        else oPieces[pl.cell].u.uFade.value = fade;
      }
      winUniforms.uFade.value = fade;
      if (!dissolveSpawned && u > 0.12) {
        dissolveSpawned = true;
        const per = Math.max(6, Math.floor(SPARK_POOL / 14));
        for (const pl of placed) {
          const p = cellPos(pl.cell);
          spawnSparks(p.x, p.y, pl.kind, per);
        }
      }
      if (u >= 1) { state = 'reset'; stateT = 0; nextGame(); }
    } else if (state === 'reset') {
      if (stateT > 0.9) { state = 'play'; stateT = 0; }
    }

    // caption follows the game state and the script's precomputed outcome
    let cap;
    if (state === 'play') cap = moveIdx < 6
      ? 'X and O trade confident strokes from a precomputed legal script'
      : 'Endgame: the script already knows how this one ends';
    else if (state === 'flare') cap = script.win === 'X'
      ? 'X wins: the deciding line flares gold'
      : 'O wins this one: the line flares gold';
    else if (state === 'shimmer') cap = 'A draw: the grid shimmers, no line to flare';
    else if (state === 'dissolve') cap = 'The board dissolves into sparks';
    else cap = 'A fresh board settles in for the next game';
    ctx.caption(cap);

    // stroke drawing for placed pieces
    for (const pl of placed) {
      const age = tt - pl.t0;
      if (pl.kind === 0) {
        const xp = xPieces[pl.cell];
        const u1 = easeOut(age / (STROKE_T * 0.52));
        const u2 = easeOut((age - STROKE_T * 0.42) / (STROKE_T * 0.55));
        xp.bars[0].scale.x = Math.max(0.0001, u1 * xp.len);
        xp.bars[1].scale.x = Math.max(0.0001, u2 * xp.len);
      } else {
        const op = oPieces[pl.cell];
        op.u.uProg.value = easeOut(age / STROKE_T);
      }
    }

    // dissolve sparks integration
    const pArr = spGeo.attributes.position.array;
    const aArr = spGeo.attributes.aAlpha.array;
    for (let i = 0; i < SPARK_POOL; i++) {
      if (spLife[i] <= 0) { if (aArr[i] !== 0) aArr[i] = 0; continue; }
      spLife[i] -= dt;
      spVel[i * 3 + 1] -= 2.2 * dt;
      pArr[i * 3] += spVel[i * 3] * dt;
      pArr[i * 3 + 1] += spVel[i * 3 + 1] * dt;
      pArr[i * 3 + 2] += spVel[i * 3 + 2] * dt;
      const u = clamp(spLife[i] / spMax[i], 0, 1);
      aArr[i] = u;
    }
    spGeo.attributes.position.needsUpdate = true;
    spGeo.attributes.aAlpha.needsUpdate = true;

    // board float and the dissolve tilt
    const tiltExtra = state === 'dissolve' ? easeIn(stateT / 1.5) * -0.55 : 0;
    const settle = state === 'reset' ? easeOut(stateT / 0.9) : 1;
    board.rotation.x = boardTiltBase * settle + tiltExtra + Math.sin(tt * 0.4) * 0.02;
    board.rotation.y = boardYawBase * settle + Math.sin(tt * 0.31) * 0.03;
    board.position.y = Math.sin(tt * 0.5) * 0.16;

    // grid shimmer (draw celebration), dissolve fade-out, reset fade-in
    let gridIn = 1;
    if (state === 'reset') gridIn = easeOut(stateT / 0.9);
    else if (state === 'dissolve') gridIn = 1 - easeIn(stateT / 1.5);
    slabMat.opacity = (0.42 + shimmerPulse * 0.25 * (0.5 + 0.5 * Math.sin(tt * 9))) * gridIn;
    edgeMat.opacity = (0.35 + shimmerPulse * 0.4 * (0.5 + 0.5 * Math.sin(tt * 9 + 1))) * gridIn;

    // ghosts drift
    for (let g = 0; g < ghosts.length; g++) {
      ghosts[g].rotation.z = Math.sin(tt * 0.11 + g * 2.1) * 0.1;
      ghosts[g].position.y += Math.sin(tt * 0.17 + g * 3.7) * 0.0016;
    }

    // camera parallax
    ctx.camera.position.x += (ctx.pointer.x * 1.1 - ctx.camera.position.x) * (1 - Math.exp(-dt * 3));
    ctx.camera.position.y += (0.4 + ctx.pointer.y * 0.8 - ctx.camera.position.y) * (1 - Math.exp(-dt * 3));
    ctx.camera.lookAt(0, 0, 0);
  }

  return { update };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');

/* The piece is running in something card-sized (?compact=1). The head script has
   already taken the panels out of the layout; what is left for the scene is its own
   in-frame labelling, below. */
const COMPACT = document.documentElement.classList.contains('is-compact');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

/* The scene drives the camera itself, calling camera.lookAt(target) every
   frame. Recording that target is what lets the viewer orbit the piece: the
   pivot below is whatever the scene is looking at right now, so the orbit
   layer further down can swing the camera around it without the scene and
   the viewer fighting over the camera. */
const sceneLook = new THREE.Vector3(0, 0, 0);
const rawLookAt = camera.lookAt.bind(camera);
camera.lookAt = function (x, y, z) {
  if (x && x.isVector3) sceneLook.copy(x); else sceneLook.set(x, y, z);
  return rawLookAt(sceneLook);
};

/* Live phase caption: scenes call ctx.caption('...') each frame; the text
   only touches the DOM when it changes, with a quick cross-fade. */
const lblPhase = document.getElementById('lblPhase');
let capText = null, capTimer = 0;
ctx.caption = (s) => {
  if (s === capText || !lblPhase) return;
  capText = s;
  lblPhase.style.opacity = '0';
  clearTimeout(capTimer);
  capTimer = setTimeout(() => {
    lblPhase.textContent = capText;
    lblPhase.style.opacity = '1';
  }, 180);
};

/* Small floating text tag rendered to a canvas texture, for labelling
   objects inside the 3D scene. Returns a sprite; scale is world height. */
ctx.makeTag = (text, color, h = 0.42) => {
  const pad = 18, fpx = 46;
  const meas = document.createElement('canvas').getContext('2d');
  meas.font = '600 ' + fpx + 'px ui-monospace, Menlo, Consolas, monospace';
  const tw = Math.ceil(meas.measureText(text).width);
  const cw = tw + pad * 2, ch = fpx + pad * 2;
  const cnv = document.createElement('canvas');
  cnv.width = cw; cnv.height = ch;
  const g = cnv.getContext('2d');
  g.font = meas.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = color; g.shadowBlur = 14;
  g.fillStyle = color;
  g.fillText(text, cw / 2, ch / 2 + 2);
  g.shadowBlur = 0;
  g.fillText(text, cw / 2, ch / 2 + 2);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: false,
  }));
  spr.scale.set(h * cw / ch, h, 1);
  spr.renderOrder = 20;
  /* A card has no room to read a tag: it arrives as a grey smudge across the very
     thing it names. The sprite is still built and still carried by the scene, it is
     simply not drawn, so no scene has to know about compact mode. */
  spr.visible = !COMPACT;
  return spr;
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
/* Resizing clears the drawing buffer, and a paused piece has no loop running to
   redraw it, so ask the view loop for a single frame. */
window.addEventListener('resize', () => { resize(); kickView(); });
resize();

/* Pointer parallax target, lerped each frame for weight. Frozen while the
   viewer is dragging, so a grab is a clean orbit and not a double motion. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  if (drag.id !== -1) return;
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

/* ================= direct manipulation =================
   Grab the piece and it orbits around whatever the scene is looking at, with
   a little weight on release. Wheel or pinch zooms, double-click or the Reset
   button returns the framing. The orbit is an offset applied after the scene
   has placed its camera for the frame, never a replacement for it, so the
   animation keeps playing from wherever the viewer parked the view. */

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const PITCH_LIMIT = 1.15;            // radians of tilt either side of the scene's own
const ZOOM_MIN = 0.4, ZOOM_MAX = 2.6;
const EPS = 1e-4;

const view = {
  yaw: 0, pitch: 0, zoom: 1,               // what is applied this frame
  yawGoal: 0, pitchGoal: 0, zoomGoal: 1,   // where it is easing to
  vYaw: 0, vPitch: 0,                      // release momentum
  touched: false                           // the viewer has taken the wheel
};
const drag = { id: -1, x: 0, y: 0 };
const touches = new Map();                 // live touch points, for pinch
let pinchFrom = 0, pinchZoom = 1;
/* What the view looked like when the gesture now in flight began. Embedded, the
   canvas is touch-action: pan-y, so a vertical swipe is the host page's to keep:
   the browser hands over a pointerdown and a move, then cancels. That gesture was
   never an orbit, and this is what it gets put back to. */
const gesture = {
  active: false,
  yaw: 0, pitch: 0, zoom: 1,
  yawGoal: 0, pitchGoal: 0, zoomGoal: 1,
  touched: false
};

const hintEl = document.getElementById('hint');
const btnReset = document.getElementById('btnReset');

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

/* The viewer has taken the wheel. The hint and the Reset button are deliberately
   not set from here: they follow the view's own state, synced every frame, so a
   gesture the browser takes back for a page scroll leaves no trace on either. */
function engage() { view.touched = true; }

function beginGesture() {
  if (gesture.active) return;
  gesture.active = true;
  gesture.yaw = view.yaw; gesture.pitch = view.pitch; gesture.zoom = view.zoom;
  gesture.yawGoal = view.yawGoal; gesture.pitchGoal = view.pitchGoal;
  gesture.zoomGoal = view.zoomGoal;
  gesture.touched = view.touched;
}

function undoGesture() {
  if (!gesture.active) return;
  view.yaw = gesture.yaw; view.pitch = gesture.pitch; view.zoom = gesture.zoom;
  view.yawGoal = gesture.yawGoal; view.pitchGoal = gesture.pitchGoal;
  view.zoomGoal = gesture.zoomGoal;
  view.vYaw = 0; view.vPitch = 0;
  view.touched = gesture.touched;
}

/* Is there anything to reset? Only if the view sits off the framing the scene gave
   it, or is still carrying a release back into one. A finger that merely crossed the
   canvas on its way down the page moved nothing, so it is offered nothing. */
function viewMoved() {
  return view.yaw !== 0 || view.pitch !== 0 || view.zoom !== 1 ||
    view.yawGoal !== 0 || view.pitchGoal !== 0 || view.zoomGoal !== 1 ||
    view.vYaw !== 0 || view.vPitch !== 0;
}

function syncViewUi() {
  if (hintEl && hintEl.classList.contains('is-gone') !== view.touched) {
    hintEl.classList.toggle('is-gone', view.touched);
  }
  if (!btnReset) return;
  const show = viewMoved();
  if (btnReset.hidden === !show) return;   // already saying the right thing
  /* Hiding the control the keyboard is standing on would drop focus to nowhere:
     hand it back to the piece first. */
  if (!show && document.activeElement === btnReset) canvas.focus({ preventScroll: true });
  btnReset.hidden = !show;
}

function resetView() {
  view.yawGoal = 0; view.pitchGoal = 0; view.zoomGoal = 1;
  view.vYaw = 0; view.vPitch = 0;
  if (reduceMotion) { view.yaw = 0; view.pitch = 0; view.zoom = 1; }
  kickView();
}

/* Wheel belongs to the host page until the viewer has actually grabbed the
   piece, so scrolling past an embedded visualization never gets hijacked. */
function ownsWheel() {
  return view.touched || window.self === window.top || !!document.fullscreenElement;
}

/* Touch: a vertical swipe still scrolls the host page while embedded; taken
   full screen or opened on its own, the canvas takes every axis. */
function syncTouchAction() {
  const own = window.self === window.top || !!document.fullscreenElement;
  canvas.style.touchAction = own ? 'none' : 'pan-y';
}
syncTouchAction();

function pinchSpan() {
  const p = Array.from(touches.values());
  return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
}

canvas.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;   // the left button orbits; leave the rest alone
  beginGesture();
  if (e.pointerType === 'touch') {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size >= 2) {
      drag.id = -1;
      canvas.classList.remove('is-grabbing');
      /* seed the pinch on exactly two fingers; a third neither orbits nor re-seeds */
      if (touches.size === 2) {
        pinchFrom = pinchSpan();
        pinchZoom = view.zoomGoal;
        engage();
      }
      return;
    }
  }
  if (drag.id !== -1) return;
  drag.id = e.pointerId;
  drag.x = e.clientX;
  drag.y = e.clientY;
  view.vYaw = 0; view.vPitch = 0;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) { /* capture is a nicety */ }
  canvas.classList.add('is-grabbing');
  canvas.focus({ preventScroll: true });
  /* Engaging happens on the first actual movement, not here: a stray click on an
     embedded piece must not quietly take the scroll wheel away from the host page. */
});

canvas.addEventListener('pointermove', (e) => {
  if (e.pointerType === 'touch' && touches.has(e.pointerId)) {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size === 2 && pinchFrom > 0) {
      view.zoomGoal = clamp(pinchZoom * (pinchFrom / Math.max(1, pinchSpan())), ZOOM_MIN, ZOOM_MAX);
      kickView();
      return;
    }
  }
  if (e.pointerId !== drag.id) return;
  const dx = e.clientX - drag.x;
  const dy = e.clientY - drag.y;
  drag.x = e.clientX;
  drag.y = e.clientY;
  const yawStep = -(dx / Math.max(1, window.innerWidth)) * Math.PI * 2;
  const pitchStep = (dy / Math.max(1, window.innerHeight)) * Math.PI * 1.4;
  view.yawGoal += yawStep;
  view.pitchGoal = clamp(view.pitchGoal + pitchStep, -PITCH_LIMIT, PITCH_LIMIT);
  view.vYaw = yawStep;
  view.vPitch = pitchStep;
  engage();
  kickView();
});

function endDrag(e) {
  touches.delete(e.pointerId);
  if (touches.size === 2) { pinchFrom = pinchSpan(); pinchZoom = view.zoomGoal; }
  else if (touches.size < 2) pinchFrom = 0;
  if (e.pointerId === drag.id) {
    drag.id = -1;
    canvas.classList.remove('is-grabbing');
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) { /* already gone */ }
  }
  if (drag.id === -1 && touches.size === 0) gesture.active = false;
  kickView();
}
canvas.addEventListener('pointerup', endDrag);
/* The browser has taken the gesture back: the finger that started on the piece
   turned out to be the host page scrolling past it, so it was never an orbit. Give
   the view back exactly as the gesture found it, hint and Reset button included. */
canvas.addEventListener('pointercancel', (e) => { undoGesture(); endDrag(e); });

canvas.addEventListener('wheel', (e) => {
  if (!ownsWheel()) return;   // let the host page scroll
  e.preventDefault();
  const d = e.deltaY * (e.deltaMode === 1 ? 16 : (e.deltaMode === 2 ? 400 : 1));
  view.zoomGoal = clamp(view.zoomGoal * Math.exp(d * 0.0012), ZOOM_MIN, ZOOM_MAX);
  engage();
  kickView();
}, { passive: false });

canvas.addEventListener('dblclick', (e) => { e.preventDefault(); resetView(); });
if (btnReset) btnReset.addEventListener('click', resetView);

/* The same orbit from the keyboard, for anyone not using a pointer. */
canvas.setAttribute('aria-label', (canvas.getAttribute('aria-label') || '') +
  ' Interactive: drag or use the arrow keys to orbit the view, plus and minus to zoom, R to reset it.');

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  setPlayUi();
  if (!userPaused) {
    if (vraf) { cancelAnimationFrame(vraf); vraf = 0; }
    if (raf) { cancelAnimationFrame(raf); raf = 0; }
    last = performance.now();
    loop(last);
  }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); return; }
  const step = 0.14;
  if (e.code === 'ArrowLeft') view.yawGoal += step;
  else if (e.code === 'ArrowRight') view.yawGoal -= step;
  else if (e.code === 'ArrowUp') view.pitchGoal = clamp(view.pitchGoal - step, -PITCH_LIMIT, PITCH_LIMIT);
  else if (e.code === 'ArrowDown') view.pitchGoal = clamp(view.pitchGoal + step, -PITCH_LIMIT, PITCH_LIMIT);
  else if (e.key === '+' || e.key === '=') view.zoomGoal = clamp(view.zoomGoal * 0.88, ZOOM_MIN, ZOOM_MAX);
  else if (e.key === '-' || e.key === '_') view.zoomGoal = clamp(view.zoomGoal / 0.88, ZOOM_MIN, ZOOM_MAX);
  else if (e.key === 'r' || e.key === 'R') { resetView(); engage(); e.preventDefault(); return; }
  else return;
  e.preventDefault();
  engage();
  kickView();
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tic-tac-toe-gui-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
    syncTouchAction();
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) {
    /* the hidden tab left a frame queued; drop it rather than run two loops */
    if (raf) { cancelAnimationFrame(raf); raf = 0; }
    last = performance.now();
    loop(last);
  }
});

/* The scene's own camera placement for this frame, before the viewer's orbit
   is layered on. Kept so the orbit is re-derived from the scene's framing every
   frame instead of compounding on its own output. */
const baseCam = new THREE.Vector3();
const off = new THREE.Vector3();
/* Whatever the scene rotated the camera by beyond simply aiming it at the pivot
   (the terrain piece banks into its turns). Re-applied after every orbit so the
   viewer moving the view never flattens the scene's own tilt. */
const sceneTwist = new THREE.Quaternion();
const aimQ = new THREE.Quaternion();
let baseSet = false;

function stepView(dt) {
  if (reduceMotion) { view.vYaw = 0; view.vPitch = 0; }
  else if (drag.id === -1) {
    view.yawGoal += view.vYaw;
    view.pitchGoal = clamp(view.pitchGoal + view.vPitch, -PITCH_LIMIT, PITCH_LIMIT);
    const decay = Math.pow(0.9, dt * 60);
    view.vYaw *= decay;
    view.vPitch *= decay;
    if (Math.abs(view.vYaw) < EPS) view.vYaw = 0;
    if (Math.abs(view.vPitch) < EPS) view.vPitch = 0;
  }
  const k = reduceMotion ? 1 : Math.min(1, dt * 9);
  view.yaw += (view.yawGoal - view.yaw) * k;
  view.pitch += (view.pitchGoal - view.pitch) * k;
  view.zoom += (view.zoomGoal - view.zoom) * k;
  /* Settle exactly on the identity view rather than asymptotically near it, so a
     reset gives the framing back to the scene instead of leaving it a hair off. */
  if (Math.abs(view.yaw) < EPS) view.yaw = 0;
  if (Math.abs(view.pitch) < EPS) view.pitch = 0;
  if (Math.abs(view.zoom - 1) < EPS) view.zoom = 1;
  syncViewUi();
}

/* fresh: the scene has just placed the camera this frame. Otherwise the piece
   is paused and the camera is restored from the last placement it made. */
function applyView(fresh) {
  if (fresh) {
    baseCam.copy(camera.position);
    baseSet = true;
    /* Measure the scene's own twist: aim at the pivot, compare with where the
       scene actually left the camera, then put the scene's orientation back. */
    aimQ.copy(camera.quaternion);
    rawLookAt(sceneLook);
    sceneTwist.copy(camera.quaternion).invert().multiply(aimQ);
    camera.quaternion.copy(aimQ);
  } else if (baseSet) {
    camera.position.copy(baseCam);
  }
  if (!view.touched || !baseSet) return;
  /* Nothing to add: give the scene's own framing straight back, so an untouched
     view and a reset view are the same view, down to the pixel. When the piece is
     paused the scene is not re-aiming the camera itself, so do it here. */
  if (view.yaw === 0 && view.pitch === 0 && view.zoom === 1) {
    if (!fresh) { rawLookAt(sceneLook); camera.quaternion.multiply(sceneTwist); }
    return;
  }
  off.copy(baseCam).sub(sceneLook);
  let r = off.length();
  if (r < 1e-5) return;
  const theta = Math.atan2(off.x, off.z) + view.yaw;
  const phi = clamp(Math.acos(clamp(off.y / r, -1, 1)) - view.pitch, 0.08, Math.PI - 0.08);
  r = Math.max(0.05, r * view.zoom);
  const flat = Math.sin(phi) * r;
  camera.position.set(
    sceneLook.x + flat * Math.sin(theta),
    sceneLook.y + r * Math.cos(phi),
    sceneLook.z + flat * Math.cos(theta)
  );
  rawLookAt(sceneLook);
  camera.quaternion.multiply(sceneTwist);
}

function viewSettling() {
  return drag.id !== -1 || view.vYaw !== 0 || view.vPitch !== 0 ||
    Math.abs(view.yawGoal - view.yaw) > EPS ||
    Math.abs(view.pitchGoal - view.pitch) > EPS ||
    Math.abs(view.zoomGoal - view.zoom) > EPS;
}

/* Dragging a paused piece still moves the view: a light loop that eases the
   orbit and redraws, without advancing the scene. */
let vraf = 0, vlast = 0;
function viewFrame(now) {
  vraf = 0;
  const dt = Math.min((now - vlast) / 1000, 0.1);
  vlast = now;
  stepView(dt);
  applyView(false);
  renderer.render(ctx.scene, camera);
  if (viewSettling()) kickView();
}
function kickView() {
  if (!userPaused || hidden || vraf) return;
  vlast = performance.now();
  vraf = requestAnimationFrame(viewFrame);
}

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  /* Give the scene back its own camera before it steps. Some pieces ease the camera
     from wherever it currently is rather than placing it outright, and they must not
     read the viewer's orbit back as their own starting point: the two would feed each
     other and the framing would run away within a second. */
  if (baseSet) camera.position.copy(baseCam);
  piece.update(t, dt * speed);
  stepView(dt);
  applyView(true);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

/* Always autoplay; the Pause button is the opt-out. */
loop(performance.now());
</script>
</body>
</html>
