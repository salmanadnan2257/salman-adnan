<script type="module">
import * as THREE from 'three';

/* ================= scene: agent-runtime ================= */
// EVENT HELIX: an event-sourced agent run writes a rising helix of event
// beads, pausing at amber approval gates, then a cyan replay cursor
// re-traverses the strand and lands a ghost bead on every original,
// proving deterministic replay before the run drains and begins again.
//
// Palette: bg ink violet #0E0818, event lilac #B49AF4, replay cyan #58C6E0,
//          gate amber #E8A84C, spine gray #4A4460.
//   Lilac and cyan give the original strand and its replay unmistakably
//   distinct identities on a deep violet night; amber is reserved for approvals.
//
// Signature: the replay ghost landing bead for bead on the original strand,
// each coincidence flashing white.

function createScene(THREE, ctx) {
  const Q = ctx.quality;
  const PR = ctx.renderer.getPixelRatio();

  // ---- tunables ----
  const BEAD_COUNT   = Math.max(90, Math.floor(400 * Q)); // event beads per run
  const HELIX_RADIUS = 2.4;   // strand radius
  const HELIX_HEIGHT = 9.2;   // vertical span of one run
  const HELIX_TURNS  = 4.6;   // full turns bottom to top
  const GATE_EVERY   = 15;    // every Nth bead is an approval gate
  const WRITE_TIME   = 11.0;  // seconds of pure appending, pauses excluded
  const GATE_PAUSE   = 0.55;  // hold duration at each approval gate
  const REPLAY_TIME  = 3.2;   // fast ghost re-traversal duration
  const HOLD_TOP     = 0.9;   // breath after the live run completes
  const HOLD_PROOF   = 1.5;   // breath after the replay overlay lands
  const DRAIN_TIME   = 2.6;   // bottom-up drain duration
  const GAP_TIME     = 0.7;   // dark beat between runs
  const DUST_COUNT   = Math.floor(160 * Q); // ambient depth motes
  const CAM_R        = 11.5;  // camera orbit radius
  const GATE_RADIUS  = 0.55;  // approval ring radius

  const COL_BG = 0x0E0818;
  ctx.scene.background = new THREE.Color(COL_BG);
  ctx.scene.fog = new THREE.FogExp2(COL_BG, 0.018);

  const group = new THREE.Group();
  ctx.scene.add(group);

  // ---- helpers ----
  function smooth01(x) {
    x = Math.min(1, Math.max(0, x));
    return x * x * (3 - 2 * x);
  }
  function easeInOut(x) {
    x = Math.min(1, Math.max(0, x));
    return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
  }
  function helixPos(u, out) {
    const a = u * HELIX_TURNS * Math.PI * 2.0;
    out.set(
      Math.sin(a) * HELIX_RADIUS,
      -HELIX_HEIGHT / 2 + u * HELIX_HEIGHT,
      Math.cos(a) * HELIX_RADIUS
    );
    return out;
  }
  function helixTangent(u, out) {
    const a = u * HELIX_TURNS * Math.PI * 2.0;
    const rate = HELIX_TURNS * Math.PI * 2.0;
    out.set(Math.cos(a) * HELIX_RADIUS * rate, HELIX_HEIGHT, -Math.sin(a) * HELIX_RADIUS * rate);
    return out.normalize();
  }

  // ---- shared uniforms (one value object referenced by several materials) ----
  const uTime   = { value: 0 };
  const uWrite  = { value: 0 };     // normalized write head, 0..1
  const uReplay = { value: -1 };    // normalized replay cursor, -1 = inactive
  const uDrain  = { value: -0.08 }; // normalized drain front, below 0 = none
  const uPr     = { value: PR };

  const FRAG_SOFT = `
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord - 0.5);
      float a = smoothstep(0.5, 0.08, d);
      gl_FragColor = vec4(vColor, a * vAlpha);
    }
  `;

  // ---- bead geometry (shared by strand and ghost) ----
  const beadPos  = new Float32Array(BEAD_COUNT * 3);
  const beadT    = new Float32Array(BEAD_COUNT);
  const beadGate = new Float32Array(BEAD_COUNT);
  const beadSeed = new Float32Array(BEAD_COUNT);
  const tmpV = new THREE.Vector3();
  for (let i = 0; i < BEAD_COUNT; i++) {
    const u = i / (BEAD_COUNT - 1);
    helixPos(u, tmpV);
    beadPos[i * 3 + 0] = tmpV.x;
    beadPos[i * 3 + 1] = tmpV.y;
    beadPos[i * 3 + 2] = tmpV.z;
    beadT[i] = u;
    beadGate[i] = (i > 0 && i % GATE_EVERY === 0) ? 1 : 0;
    beadSeed[i] = Math.random();
  }
  const beadGeo = new THREE.BufferGeometry();
  beadGeo.setAttribute('position', new THREE.Float32BufferAttribute(beadPos, 3));
  beadGeo.setAttribute('aT', new THREE.Float32BufferAttribute(beadT, 1));
  beadGeo.setAttribute('aGate', new THREE.Float32BufferAttribute(beadGate, 1));
  beadGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(beadSeed, 1));

  const beadMat = new THREE.ShaderMaterial({
    uniforms: { uTime: uTime, uWrite: uWrite, uReplay: uReplay, uDrain: uDrain, uPr: uPr },
    vertexShader: `
      attribute float aT;
      attribute float aGate;
      attribute float aSeed;
      uniform float uTime;
      uniform float uWrite;
      uniform float uReplay;
      uniform float uDrain;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float appear = smoothstep(0.0, 0.012, uWrite - aT);
        float alive  = smoothstep(0.0, 0.05, aT - uDrain);
        float tw = 0.7 + 0.3 * sin(uTime * 1.7 + aSeed * 6.2831);
        float w = uReplay - aT;
        float flash = step(0.0, w) * max(0.0, 1.0 - w * 16.0);
        float head = smoothstep(0.035, 0.0, abs(uWrite - aT)) * (1.0 - step(0.9995, uWrite));
        vec3 base = mix(vec3(0.706, 0.604, 0.957), vec3(0.910, 0.659, 0.298), aGate);
        // once the replay ghost has landed here, hand the bead over to the cyan strand
        float handed = smoothstep(0.05, 0.16, w) * (1.0 - flash);
        vColor = mix(base, vec3(1.0), flash * 0.85) * (0.85 + 0.35 * tw + head * 0.9 + flash * 0.7);
        vAlpha = appear * alive * mix(1.0, 0.3, handed);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float size = (1.05 + aGate * 0.4) * (1.0 + head * 0.9 + flash * 0.7);
        gl_PointSize = size * uPr * (150.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: FRAG_SOFT,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Points(beadGeo, beadMat));

  // ghost strand: cyan replay beads landing exactly on the originals
  const ghostMat = new THREE.ShaderMaterial({
    uniforms: { uReplay: uReplay, uDrain: uDrain, uPr: uPr },
    vertexShader: `
      attribute float aT;
      attribute float aSeed;
      uniform float uReplay;
      uniform float uDrain;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float appear = smoothstep(0.0, 0.012, uReplay - aT);
        float alive  = smoothstep(0.0, 0.05, aT - uDrain);
        float head   = smoothstep(0.02, 0.0, abs(uReplay - aT));
        float settle = mix(1.0, 0.75, smoothstep(0.06, 0.3, uReplay - aT));
        vColor = vec3(0.345, 0.776, 0.878) * (1.2 + head * 1.5 + aSeed * 0.0);
        vAlpha = appear * alive * settle;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = (0.7 + head * 0.9) * uPr * (150.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: FRAG_SOFT,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Points(beadGeo, ghostMat));

  // ---- spine and ghost line (segment pairs between consecutive beads) ----
  const segCount = BEAD_COUNT - 1;
  const linePos = new Float32Array(segCount * 2 * 3);
  const lineT = new Float32Array(segCount * 2);
  for (let i = 0; i < segCount; i++) {
    for (let e = 0; e < 2; e++) {
      const b = i + e;
      linePos[(i * 2 + e) * 3 + 0] = beadPos[b * 3 + 0];
      linePos[(i * 2 + e) * 3 + 1] = beadPos[b * 3 + 1];
      linePos[(i * 2 + e) * 3 + 2] = beadPos[b * 3 + 2];
      lineT[i * 2 + e] = beadT[b];
    }
  }
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
  lineGeo.setAttribute('aT', new THREE.Float32BufferAttribute(lineT, 1));

  function makeLineMat(headUniform, hex, opacity, repDim) {
    return new THREE.ShaderMaterial({
      uniforms: {
        uHead: headUniform,
        uRep: uReplay,
        uDrain: uDrain,
        uColor: { value: new THREE.Color(hex) },
        uOpacity: { value: opacity },
        uRepDim: { value: repDim ? 1 : 0 }
      },
      vertexShader: `
        attribute float aT;
        uniform float uHead;
        uniform float uRep;
        uniform float uRepDim;
        uniform float uDrain;
        varying float vA;
        void main(){
          float handed = smoothstep(0.05, 0.16, uRep - aT) * uRepDim;
          vA = smoothstep(0.0, 0.01, uHead - aT) * smoothstep(0.0, 0.05, aT - uDrain)
               * mix(1.0, 0.35, handed);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        varying float vA;
        void main(){
          gl_FragColor = vec4(uColor, vA * uOpacity);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
  }
  group.add(new THREE.LineSegments(lineGeo, makeLineMat(uWrite, 0x8578B8, 0.9, true)));
  group.add(new THREE.LineSegments(lineGeo, makeLineMat(uReplay, 0x58C6E0, 0.6, false)));

  // ---- approval gate rings (instanced tori, additive so black = hidden) ----
  const gates = [];
  for (let i = GATE_EVERY; i < BEAD_COUNT - 1; i += GATE_EVERY) {
    gates.push({ t: beadT[i], index: i, passed: false, flare: 0 });
  }
  const gateGeo = new THREE.TorusGeometry(GATE_RADIUS, 0.045, 8, 48);
  const gateMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const gateMesh = new THREE.InstancedMesh(gateGeo, gateMat, gates.length);
  const m4 = new THREE.Matrix4();
  const q4 = new THREE.Quaternion();
  const zAxis = new THREE.Vector3(0, 0, 1);
  const tanV = new THREE.Vector3();
  const oneV = new THREE.Vector3(1, 1, 1);
  const gateCol = new THREE.Color();
  const COL_AMBER = new THREE.Color(0xE8A84C);
  for (let g = 0; g < gates.length; g++) {
    const u = gates[g].t;
    helixPos(u, tmpV);
    helixTangent(u, tanV);
    q4.setFromUnitVectors(zAxis, tanV);
    m4.compose(tmpV, q4, oneV);
    gateMesh.setMatrixAt(g, m4);
    gateMesh.setColorAt(g, gateCol.setRGB(0, 0, 0));
  }
  gateMesh.instanceMatrix.needsUpdate = true;
  gateMesh.instanceColor.needsUpdate = true;
  group.add(gateMesh);

  // ---- head sprites: live write head (lilac) and replay cursor (cyan) ----
  const headGeo = new THREE.BufferGeometry();
  const headPosArr = new Float32Array(2 * 3);
  const headColArr = new Float32Array(2 * 3);
  const headSizeArr = new Float32Array(2);
  headGeo.setAttribute('position', new THREE.Float32BufferAttribute(headPosArr, 3));
  headGeo.setAttribute('aColor', new THREE.Float32BufferAttribute(headColArr, 3));
  headGeo.setAttribute('aSize', new THREE.Float32BufferAttribute(headSizeArr, 1));
  const headMat = new THREE.ShaderMaterial({
    uniforms: { uPr: uPr },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aSize;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vColor = aColor;
        vAlpha = 1.0;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * uPr * (150.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: FRAG_SOFT,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Points(headGeo, headMat));

  // ---- ambient dust motes for depth ----
  const dustPosArr = new Float32Array(DUST_COUNT * 3);
  const dustSeed = new Float32Array(DUST_COUNT);
  for (let i = 0; i < DUST_COUNT; i++) {
    const r = 5.5 + Math.random() * 8.5;
    const th = Math.random() * Math.PI * 2;
    dustPosArr[i * 3 + 0] = Math.cos(th) * r;
    dustPosArr[i * 3 + 1] = (Math.random() - 0.5) * 13;
    dustPosArr[i * 3 + 2] = Math.sin(th) * r;
    dustSeed[i] = Math.random();
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.Float32BufferAttribute(dustPosArr, 3));
  dustGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(dustSeed, 1));
  const dustMat = new THREE.ShaderMaterial({
    uniforms: { uTime: uTime, uPr: uPr },
    vertexShader: `
      attribute float aSeed;
      uniform float uTime;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vec3 p = position;
        p.y += sin(uTime * 0.12 + aSeed * 6.2831) * 0.5;
        p.x += sin(uTime * 0.09 + aSeed * 12.57) * 0.4;
        vColor = vec3(0.42, 0.39, 0.55);
        vAlpha = 0.22 + 0.12 * sin(uTime * 0.5 + aSeed * 20.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = (0.5 + aSeed * 0.6) * uPr * (120.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: FRAG_SOFT,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(dustGeo, dustMat));

  // ---- run state machine ----
  const PH_WRITE = 0, PH_HOLD_TOP = 1, PH_REPLAY = 2, PH_HOLD_PROOF = 3, PH_DRAIN = 4, PH_GAP = 5;
  let phase = PH_WRITE;
  let phaseT = 0;
  let writeU = 0;
  let holdGate = null;
  let gateTimer = 0;
  let writeHeadScale = 0;
  let replayHeadScale = 0;

  const headV = new THREE.Vector3();

  return {
    update(t, dt) {
      dt = Math.min(Math.max(dt || 0.016, 0.0001), 0.05);
      uTime.value = t;
      phaseT += dt;

      switch (phase) {
        case PH_WRITE: {
          if (holdGate) {
            gateTimer += dt;
            holdGate.flare = Math.sin(Math.PI * Math.min(1, gateTimer / GATE_PAUSE));
            if (gateTimer >= GATE_PAUSE) {
              holdGate.passed = true;
              holdGate = null;
            }
          } else {
            writeU += dt / WRITE_TIME;
            for (let i = 0; i < gates.length; i++) {
              const g = gates[i];
              if (!g.passed && writeU >= g.t) {
                writeU = g.t;
                holdGate = g;
                gateTimer = 0;
                break;
              }
            }
            if (writeU >= 1) {
              writeU = 1;
              phase = PH_HOLD_TOP;
              phaseT = 0;
            }
          }
          uWrite.value = writeU;
          break;
        }
        case PH_HOLD_TOP:
          if (phaseT >= HOLD_TOP) { phase = PH_REPLAY; phaseT = 0; }
          break;
        case PH_REPLAY: {
          const k = Math.min(1, phaseT / REPLAY_TIME);
          uReplay.value = easeInOut(k) * 1.02;
          if (k >= 1) { phase = PH_HOLD_PROOF; phaseT = 0; }
          break;
        }
        case PH_HOLD_PROOF:
          // push the cursor past the top so the white proof flashes settle out
          uReplay.value = 1.02 + (phaseT / HOLD_PROOF) * 0.6;
          if (phaseT >= HOLD_PROOF) { phase = PH_DRAIN; phaseT = 0; }
          break;
        case PH_DRAIN: {
          const k = Math.min(1, phaseT / DRAIN_TIME);
          uDrain.value = -0.08 + 1.3 * easeInOut(k);
          if (k >= 1) { phase = PH_GAP; phaseT = 0; }
          break;
        }
        case PH_GAP:
          if (phaseT >= GAP_TIME) {
            // everything is fully drained and invisible, safe to reset
            writeU = 0;
            holdGate = null;
            uWrite.value = 0;
            uReplay.value = -1;
            uDrain.value = -0.08;
            for (let i = 0; i < gates.length; i++) {
              gates[i].passed = false;
              gates[i].flare = 0;
            }
            phase = PH_WRITE;
            phaseT = 0;
          }
          break;
      }

      // gate ring intensities (additive material: color brightness is alpha)
      const rp = uReplay.value;
      for (let g = 0; g < gates.length; g++) {
        const gate = gates[g];
        const appear = smooth01((uWrite.value - (gate.t - 0.05)) / 0.05);
        const alive = smooth01((gate.t - uDrain.value) / 0.06);
        const rf = rp >= 0 ? Math.max(0, 1 - Math.abs(rp - gate.t) * 30) : 0;
        const k = appear * alive * (0.30 + 1.15 * gate.flare + 0.7 * rf);
        gateCol.copy(COL_AMBER).multiplyScalar(k);
        gateMesh.setColorAt(g, gateCol);
        if (gate !== holdGate) gate.flare *= Math.exp(-3.2 * dt);
      }
      gateMesh.instanceColor.needsUpdate = true;

      // head sprites
      const writeActive = phase === PH_WRITE ? 1 : 0;
      const replayActive = phase === PH_REPLAY ? 1 : 0;
      writeHeadScale += (writeActive - writeHeadScale) * Math.min(1, dt * 5);
      replayHeadScale += (replayActive - replayHeadScale) * Math.min(1, dt * 5);
      helixPos(Math.min(writeU, 1), headV);
      headPosArr[0] = headV.x; headPosArr[1] = headV.y; headPosArr[2] = headV.z;
      helixPos(Math.min(Math.max(rp, 0), 1), headV);
      headPosArr[3] = headV.x; headPosArr[4] = headV.y; headPosArr[5] = headV.z;
      const wPulse = 1.5 + 0.3 * Math.sin(t * 6) + (holdGate ? 0.7 * holdGate.flare : 0);
      headSizeArr[0] = wPulse * writeHeadScale;
      headSizeArr[1] = (2.1 + 0.35 * Math.sin(t * 9)) * replayHeadScale;
      headColArr[0] = 0.90; headColArr[1] = 0.82; headColArr[2] = 1.0;
      headColArr[3] = 0.55; headColArr[4] = 0.95; headColArr[5] = 1.0;
      headGeo.attributes.position.needsUpdate = true;
      headGeo.attributes.aSize.needsUpdate = true;
      headGeo.attributes.aColor.needsUpdate = true;

      // gentle self-rotation plus corkscrew camera
      group.rotation.y = t * 0.05;
      const ca = t * 0.1 + ctx.pointer.x * 0.5;
      const cy = Math.sin(t * 0.07) * 1.8 + ctx.pointer.y * 1.6;
      ctx.camera.position.set(Math.sin(ca) * CAM_R, cy, Math.cos(ca) * CAM_R);
      ctx.camera.lookAt(0, cy * 0.25, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'agent-runtime-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
