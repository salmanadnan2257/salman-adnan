<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#140D16">
  <title>Urdu Language Model in 3D · Salman Adnan</title>
  <meta name="description" content="Attention Loom: an interactive 3D study of tokens flowing right to left through transformer layers.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #140D16;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #E8A13C; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated rows of token orbs flowing right to left through stacked layers, joined by arcing attention threads of varying brightness."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
  </div>
  <p id="note" hidden>Motion is paused because your system prefers reduced motion.
     Press Play to animate.</p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: urdu-slm ================= */
// ATTENTION LOOM
// Concept: six stacked transformer layers of token orbs flow RIGHT to LEFT,
// the way Urdu reads; curved attention threads arc from each token down to
// earlier tokens in the layer below, re-weaving softly as the stream advances,
// while a saffron head-firing wave ripples down through the layers.
// Palette: bg charcoal aubergine #140D16, token ivory #F2E9DA,
//          attention teal #4FB8A8, highlight saffron #E8A13C, layer plum #5C3A5E.
//   Aubergine, saffron, and teal nod to South Asian textile palettes without
//   pastiche; tokens warm as they rise through the layers.
// Signature: right-to-left flow, a loom weaving attention.

function createScene(THREE, ctx) {
  var q = ctx.quality;

  // ---- tunables ----
  var BG = 0x140d16;                    // background, charcoal aubergine
  var N_ROWS = 6;                       // transformer layers
  var N_SLOTS = Math.max(8, Math.floor(14 * q)); // token slots per layer
  var SPAN_X = 8.0;                     // half width of a layer row
  var Y0 = -3.1;                        // y of the bottom layer
  var Y_STEP = 1.24;                    // vertical gap between layers
  var FLOW = 0.05;                      // row traversals per second (right to left)
  var ARCS_PER_TOKEN = 2;               // attention threads leaving each token
  var SEG_PER_ARC = Math.max(7, Math.floor(12 * q)); // segments per thread
  var ARC_BULGE = 0.85;                 // how far threads bow toward the viewer
  var WAVE_SPEED = 0.09;                // saffron head wave sweeps per second
  var HEAD_FRACTION = 0.72;             // seeds above this glow saffron in the wave

  var COL_IVORY = new THREE.Color(0xf2e9da);
  var COL_WARM = new THREE.Color(0xe8a13c);
  var COL_TEAL = new THREE.Color(0x4fb8a8);
  var COL_SAFFRON = new THREE.Color(0xe8a13c);

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.03);
  ctx.scene.add(new THREE.AmbientLight(0x3a2438, 1.2));
  var dir = new THREE.DirectionalLight(0xe8d8e0, 0.9);
  dir.position.set(-5, 7, 8);
  ctx.scene.add(dir);

  var group = new THREE.Group();
  ctx.scene.add(group);

  // ---- layer slabs: quiet plum shelves under each token row
  var slabGeo = new THREE.BoxGeometry(SPAN_X * 2 + 1.2, 0.07, 1.7);
  var slabMat = new THREE.MeshStandardMaterial({ color: 0x5c3a5e, roughness: 0.6, metalness: 0.25, transparent: true, opacity: 0.55, emissive: 0x2a1830, emissiveIntensity: 0.7 });
  var slabs = new THREE.InstancedMesh(slabGeo, slabMat, N_ROWS);
  var m4 = new THREE.Matrix4();
  var qI = new THREE.Quaternion();
  var one = new THREE.Vector3(1, 1, 1);
  var vP = new THREE.Vector3();
  for (var s = 0; s < N_ROWS; s++) {
    m4.compose(vP.set(0, Y0 + s * Y_STEP - 0.5, -0.15), qI, one);
    slabs.setMatrixAt(s, m4);
    slabs.setColorAt(s, new THREE.Color(0xffffff));
  }
  slabs.instanceMatrix.needsUpdate = true;
  slabs.instanceColor.needsUpdate = true;
  group.add(slabs);

  // shared shader chunk: slot index -> wrapped x position (right to left)
  var flowChunk = [
    'uniform float uTime;',
    'uniform float uN;',
    'uniform float uSpanX;',
    'uniform float uFlow;',
    'float slotU(float slot){ return fract(slot / uN + uTime * uFlow); }',
    'float slotX(float u){ return uSpanX - u * 2.0 * uSpanX; }',
    'float edgeFade(float u){ return smoothstep(0.0, 0.07, u) * smoothstep(1.0, 0.93, u); }'
  ].join('\n');

  var sharedUniforms = {
    uTime: { value: 0 },
    uN: { value: N_SLOTS },
    uSpanX: { value: SPAN_X },
    uFlow: { value: FLOW }
  };

  // ---- token orbs (points, ivory warming per layer)
  var nTok = N_ROWS * N_SLOTS;
  var tokPos = new Float32Array(nTok * 3);
  var tokSlot = new Float32Array(nTok);
  var tokRow = new Float32Array(nTok);
  var tokSeed = new Float32Array(nTok);
  var ti = 0;
  for (var r = 0; r < N_ROWS; r++) {
    for (var c = 0; c < N_SLOTS; c++) {
      tokSlot[ti] = c;
      tokRow[ti] = r;
      tokSeed[ti] = Math.random();
      ti++;
    }
  }
  var tokGeo = new THREE.BufferGeometry();
  tokGeo.setAttribute('position', new THREE.Float32BufferAttribute(tokPos, 3));
  tokGeo.setAttribute('aSlot', new THREE.Float32BufferAttribute(tokSlot, 1));
  tokGeo.setAttribute('aRow', new THREE.Float32BufferAttribute(tokRow, 1));
  tokGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(tokSeed, 1));
  var tokUniforms = {
    uTime: sharedUniforms.uTime,
    uN: sharedUniforms.uN,
    uSpanX: sharedUniforms.uSpanX,
    uFlow: sharedUniforms.uFlow,
    uY0: { value: Y0 },
    uYStep: { value: Y_STEP },
    uIvory: { value: COL_IVORY },
    uWarm: { value: COL_WARM }
  };
  var tokMat = new THREE.ShaderMaterial({
    uniforms: tokUniforms,
    vertexShader: [
      flowChunk,
      'attribute float aSlot;',
      'attribute float aRow;',
      'attribute float aSeed;',
      'uniform float uY0;',
      'uniform float uYStep;',
      'uniform vec3 uIvory;',
      'uniform vec3 uWarm;',
      'varying vec3 vColor;',
      'varying float vAlpha;',
      'void main(){',
      '  float u = slotU(aSlot);',
      '  float x = slotX(u);',
      '  float y = uY0 + aRow * uYStep + 0.07 * sin(uTime * 0.9 + aSeed * 6.2831 + aRow);',
      '  float z = 0.14 * sin(uTime * 0.6 + aSeed * 9.4);',
      '  float warm = aRow / 5.0;',
      '  vColor = mix(uIvory, uWarm, warm * 0.5);',
      '  float breathe = 0.75 + 0.25 * sin(uTime * 1.3 + aSeed * 6.2831);',
      '  vAlpha = edgeFade(u) * breathe;',
      '  vec4 mv = modelViewMatrix * vec4(x, y, z, 1.0);',
      '  gl_PointSize = (9.0 + 5.0 * aSeed + 3.0 * warm) * (150.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vColor;',
      'varying float vAlpha;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  float core = smoothstep(0.17, 0.03, d);',
      '  float halo = smoothstep(0.5, 0.16, d) * 0.3;',
      '  gl_FragColor = vec4(vColor, (core + halo) * vAlpha);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var tokPoints = new THREE.Points(tokGeo, tokMat);
  tokPoints.frustumCulled = false; // positions are analytic in the vertex shader
  group.add(tokPoints);

  // ---- attention threads: arcs from each token down to earlier tokens below
  // earlier tokens sit further left (they entered from the right first)
  var nArcs = (N_ROWS - 1) * N_SLOTS * ARCS_PER_TOKEN;
  var nVerts = nArcs * SEG_PER_ARC * 2;
  var aPos = new Float32Array(nVerts * 3); // placeholder, real position computed in shader
  var aT = new Float32Array(nVerts);
  var aSlotA = new Float32Array(nVerts);
  var aSlotB = new Float32Array(nVerts);
  var aRowB = new Float32Array(nVerts);
  var aSeed = new Float32Array(nVerts);
  var vi = 0;
  for (var rb = 0; rb < N_ROWS - 1; rb++) {       // rb: lower (earlier) layer
    for (var sa = 0; sa < N_SLOTS; sa++) {        // source token in layer rb+1
      for (var arc = 0; arc < ARCS_PER_TOKEN; arc++) {
        var reach = 1 + Math.floor(Math.random() * 4); // attend 1..4 tokens back
        var sb = sa + reach;                      // wrapped in the shader by fract
        var seed = Math.random();
        for (var sg = 0; sg < SEG_PER_ARC; sg++) {
          var t0 = sg / SEG_PER_ARC;
          var t1 = (sg + 1) / SEG_PER_ARC;
          aT[vi] = t0; aSlotA[vi] = sa; aSlotB[vi] = sb; aRowB[vi] = rb; aSeed[vi] = seed; vi++;
          aT[vi] = t1; aSlotA[vi] = sa; aSlotB[vi] = sb; aRowB[vi] = rb; aSeed[vi] = seed; vi++;
        }
      }
    }
  }
  var arcGeo = new THREE.BufferGeometry();
  arcGeo.setAttribute('position', new THREE.Float32BufferAttribute(aPos, 3));
  arcGeo.setAttribute('aT', new THREE.Float32BufferAttribute(aT, 1));
  arcGeo.setAttribute('aSlotA', new THREE.Float32BufferAttribute(aSlotA, 1));
  arcGeo.setAttribute('aSlotB', new THREE.Float32BufferAttribute(aSlotB, 1));
  arcGeo.setAttribute('aRowB', new THREE.Float32BufferAttribute(aRowB, 1));
  arcGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(aSeed, 1));
  var arcUniforms = {
    uTime: sharedUniforms.uTime,
    uN: sharedUniforms.uN,
    uSpanX: sharedUniforms.uSpanX,
    uFlow: sharedUniforms.uFlow,
    uY0: { value: Y0 },
    uYStep: { value: Y_STEP },
    uBulge: { value: ARC_BULGE },
    uWaveSpeed: { value: WAVE_SPEED },
    uHeadFrac: { value: HEAD_FRACTION },
    uTeal: { value: COL_TEAL },
    uSaffron: { value: COL_SAFFRON }
  };
  var arcMat = new THREE.ShaderMaterial({
    uniforms: arcUniforms,
    vertexShader: [
      flowChunk,
      'attribute float aT;',
      'attribute float aSlotA;',
      'attribute float aSlotB;',
      'attribute float aRowB;',
      'attribute float aSeed;',
      'uniform float uY0;',
      'uniform float uYStep;',
      'uniform float uBulge;',
      'uniform float uWaveSpeed;',
      'uniform float uHeadFrac;',
      'uniform vec3 uTeal;',
      'uniform vec3 uSaffron;',
      'varying vec3 vColor;',
      'varying float vAlpha;',
      'void main(){',
      '  float uA = slotU(aSlotA);',
      '  float uB = slotU(aSlotB);',
      '  vec3 A = vec3(slotX(uA), uY0 + (aRowB + 1.0) * uYStep, 0.0);',
      '  vec3 B = vec3(slotX(uB), uY0 + aRowB * uYStep, 0.0);',
      '  vec3 p = mix(A, B, aT);',
      '  float lift = sin(aT * 3.14159);',
      '  p.z += lift * uBulge * (0.6 + 0.4 * sin(aSeed * 6.2831));',
      '  p.y += lift * 0.12;',
      // attention weight breathes per thread, re-weaving softly
      '  float w = 0.25 + 0.75 * pow(0.5 + 0.5 * sin(uTime * 0.55 + aSeed * 6.2831 + aRowB), 2.0);',
      // saffron head wave sweeping down through the layers, no wrap pop
      '  float waveRow = fract(uTime * uWaveSpeed) * 9.0 - 1.5;',
      '  float h = smoothstep(0.95, 0.0, abs((5.0 - (aRowB + 1.0)) - waveRow));',
      '  h *= step(uHeadFrac, fract(aSeed * 13.73));',
      '  vColor = mix(uTeal, uSaffron, h);',
      '  vAlpha = w * edgeFade(uA) * edgeFade(uB) * (0.16 + 0.5 * h);',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vColor;',
      'varying float vAlpha;',
      'void main(){',
      '  gl_FragColor = vec4(vColor, vAlpha);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var arcLines = new THREE.LineSegments(arcGeo, arcMat);
  arcLines.frustumCulled = false; // arc endpoints are computed in the vertex shader
  group.add(arcLines);

  // ---- a few drifting dust motes for depth
  var N_DUST = Math.floor(160 * q);
  var dustGeo = new THREE.BufferGeometry();
  var dustPos = new Float32Array(N_DUST * 3);
  var dustSeed = new Float32Array(N_DUST);
  for (var du = 0; du < N_DUST; du++) {
    dustPos[du * 3] = (Math.random() - 0.5) * 24;
    dustPos[du * 3 + 1] = (Math.random() - 0.5) * 12;
    dustPos[du * 3 + 2] = -3 - Math.random() * 6;
    dustSeed[du] = Math.random();
  }
  dustGeo.setAttribute('position', new THREE.Float32BufferAttribute(dustPos, 3));
  dustGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(dustSeed, 1));
  var dustMat = new THREE.ShaderMaterial({
    uniforms: { uTime: sharedUniforms.uTime, uColor: { value: new THREE.Color(0x8a6a80) } },
    vertexShader: [
      'attribute float aSeed;',
      'uniform float uTime;',
      'varying float vA;',
      'void main(){',
      '  vec3 p = position;',
      '  p.x += 0.6 * sin(uTime * 0.12 + aSeed * 6.2831);',
      '  p.y += 0.4 * sin(uTime * 0.09 + aSeed * 12.4);',
      '  vA = 0.25 + 0.35 * sin(uTime * 0.5 + aSeed * 40.0);',
      '  vec4 mv = modelViewMatrix * vec4(p, 1.0);',
      '  gl_PointSize = (1.5 + 2.0 * aSeed) * (150.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vA;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  float a = smoothstep(0.5, 0.1, d) * max(vA, 0.0);',
      '  gl_FragColor = vec4(uColor, a);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Points(dustGeo, dustMat));

  return {
    update: function (t, dt) {
      sharedUniforms.uTime.value = t;

      // meditative loom sway
      group.rotation.y = 0.05 * Math.sin(t * 0.07);
      group.position.y = 0.1 * Math.sin(t * 0.31);

      // camera looks on at a slight angle; pointer pans
      var cx = 4.6 + 0.7 * Math.sin(t * 0.05);
      var cy = 1.3 + 0.4 * Math.sin(t * 0.06);
      ctx.camera.position.set(cx, cy, 11.0);
      ctx.camera.lookAt(ctx.pointer.x * 1.6, 0.25 + ctx.pointer.y * 1.0, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'urdu-slm-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
