<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0D1218">
  <title>Typing Master in 3D · Salman Adnan</title>
  <meta name="description" content="WPM Waves: an interactive 3D study of keystrokes rippling a keyboard and feeding a live speed trace.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0D1218;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #5BC8D8; }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    #lbl {
      position: absolute; left: 12px; top: 12px; max-width: 44ch;
      padding: 10px 14px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #lbl h1 {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
    }
    #lblSub { margin-top: 3px; opacity: 0.72; }
    #lblPhase {
      margin-top: 8px; min-height: 1.4em; color: #5BC8D8;
      opacity: 1; transition: opacity 0.18s ease;
    }
    #legend {
      position: absolute; right: 12px; top: 12px;
      display: flex; flex-direction: column; gap: 5px;
      padding: 9px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      pointer-events: none; font-size: 11px;
    }
    #legend span { display: flex; align-items: center; gap: 7px; }
    #legend i {
      width: 9px; height: 9px; border-radius: 2px; flex: none;
      background: var(--c); box-shadow: 0 0 6px var(--c);
    }
    @media (max-width: 640px) {
      #lblSub { display: none; }
      #lbl { max-width: 30ch; }
      #legend { font-size: 10px; padding: 7px 9px; gap: 4px; }
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated 3D keyboard where keys depress in ripples spelling text, launched glyphs arc upward into a scrolling speed trace, misses flashing softly."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
    <button id="btnFs" type="button" aria-pressed="false">Fullscreen</button>
  </div>
  <div id="lbl">
    <h1>WPM Waves</h1>
    <p id="lblSub">Human-rhythm typing: keys ripple, glyphs fly, and the words-per-minute trace breathes above.</p>
    <p id="lblPhase" aria-hidden="true"></p>
  </div>
  <div id="legend" role="list" aria-label="Legend">
    <span role="listitem"><i style="--c:#5BC8D8"></i>Key press</span>
    <span role="listitem"><i style="--c:#EFE8D6"></i>Flying glyph</span>
    <span role="listitem"><i style="--c:#E06A78"></i>Miss</span>
    <span role="listitem"><i style="--c:#5BC8D8"></i>WPM trace</span>
  </div>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: typing-master-gui ================= */
// WPM WAVES, keystrokes rippling a floating keyboard and feeding a live
// speed trace: a phrase bank is typed with genuinely human rhythm (bursts,
// micro-pauses, a breath between phrases), each strike depresses its cap,
// ripples its neighbors, launches the glyph, and raises the WPM line above.
// Palette: bg slate #0D1218, keycap graphite #333C4A, press cyan #5BC8D8,
//   glyph cream #EFE8D6, miss rose #E06A78. Cool focus colors, rose kept
//   rare so errors sting a little.
// Signature: the WPM trace breathing with the typing bursts.

function createScene(THREE, ctx) {
  const q = ctx.quality;

  // ---- tunables -----------------------------------------------------------
  const BG = 0x0D1218;         // slate background
  const CAP_COL = 0x4A5568;    // graphite keycap, lifted for readability
  const PRESS_COL = 0x5BC8D8;  // cyan press glow
  const GLYPH_COL = '#EFE8D6'; // cream launched glyphs
  const MISS_COL = 0xE06A78;   // rose mistake flash
  const PITCH = 0.62;          // key pitch (center to center)
  const PRESS_DEPTH = 0.14;    // how far a cap travels when struck
  const RIPPLE_R = 1.6;        // world radius of the neighbor ripple
  const TRACE_N = Math.max(70, Math.floor(150 * q)); // WPM trace samples
  const TRACE_DT = 0.045;      // seconds per trace sample
  const GLYPH_POOL = Math.max(6, Math.floor(14 * q)); // airborne glyph quads
  const MISTAKE_P = 0.045;     // chance a keystroke goes to a neighbor key
  const EMA_DECAY = 1.5;       // keystroke-rate decay, per second

  const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
  const smooth = (a, b, v) => { const x = clamp((v - a) / (b - a), 0, 1); return x * x * (3 - 2 * x); };
  let seed = 777001;
  const rnd = () => { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let z = Math.imul(seed ^ seed >>> 15, 1 | seed); z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z; return ((z ^ z >>> 14) >>> 0) / 4294967296; };

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.024);

  const amb = new THREE.AmbientLight(0x9aa4b8, 3.3);
  const key = new THREE.DirectionalLight(0xe8f0ff, 3.0);
  key.position.set(-3, 7, 5);
  ctx.scene.add(amb, key);

  // ---- keyboard layout: '#' are blank caps, ' ' is the wide space bar ------
  const ROWS = ['#1234567890##', '#QWERTYUIOP##', '#ASDFGHJKL##', '##ZXCVBNM##', '## ##'];
  const ROW_OFF = [0, 0.4, 0.65, 1.05, 2.6];  // stagger, in key units
  const keys = [];        // {x, z, char, wide}
  const charToKey = {};
  for (let r = 0; r < ROWS.length; r++) {
    let extra = 0; // room taken by the wide space bar
    for (let c = 0; c < ROWS[r].length; c++) {
      const ch = ROWS[r][c];
      const wide = ch === ' ';
      const x = (c + ROW_OFF[r] + extra - 6) * PITCH + (wide ? PITCH * 1.6 : 0);
      if (wide) extra += 3.2;
      const z = (r - 2) * PITCH;
      const idx = keys.length;
      keys.push({ x: x, z: z, char: ch, wide: wide });
      if (ch !== '#') charToKey[ch] = idx;
    }
  }
  const N_KEYS = keys.length;

  const board = new THREE.Group();
  board.rotation.x = -0.3;
  board.position.y = -0.4;
  ctx.scene.add(board);

  const capGeo = new THREE.BoxGeometry(0.54, 0.17, 0.54);
  const capMesh = new THREE.InstancedMesh(capGeo,
    new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0x18202c }), N_KEYS);
  const baseCol = new THREE.Color(CAP_COL);
  const pressCol = new THREE.Color(PRESS_COL);
  const missColC = new THREE.Color(MISS_COL);
  const cTmp = new THREE.Color();
  const m4 = new THREE.Matrix4();
  for (let i = 0; i < N_KEYS; i++) {
    m4.makeScale(keys[i].wide ? 4.2 : 1, 1, 1);
    m4.setPosition(keys[i].x, 0, keys[i].z);
    capMesh.setMatrixAt(i, m4);
    capMesh.setColorAt(i, baseCol);
  }
  capMesh.instanceMatrix.needsUpdate = true;
  capMesh.instanceColor.needsUpdate = true;
  board.add(capMesh);

  // deck under the keys
  const deck = new THREE.Mesh(
    new THREE.BoxGeometry(9.4, 0.14, 3.9),
    new THREE.MeshLambertMaterial({ color: 0x27303d })
  );
  deck.position.y = -0.18;
  board.add(deck);

  // per-key dynamic state
  const glow = new Float32Array(N_KEYS);      // cyan press glow
  const missGlow = new Float32Array(N_KEYS);  // rose mistake glow
  const presses = [];                          // {key, t0} recent, for ripples

  // ---- glyph sprites (canvas letter textures, cached per character) --------
  const glyphTex = {};
  function texFor(ch) {
    if (glyphTex[ch]) return glyphTex[ch];
    const cv = document.createElement('canvas');
    cv.width = 64; cv.height = 64;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, 64, 64);
    g.font = 'bold 46px "Courier New", monospace';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillStyle = GLYPH_COL;
    g.fillText(ch, 32, 36);
    const tx = new THREE.CanvasTexture(cv);
    tx.colorSpace = THREE.SRGBColorSpace;
    glyphTex[ch] = tx;
    return tx;
  }
  const glyphs = [];
  for (let i = 0; i < GLYPH_POOL; i++) {
    const mat = new THREE.MeshBasicMaterial({
      transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.62, 0.62), mat);
    mesh.visible = false;
    ctx.scene.add(mesh);
    glyphs.push({ mesh: mesh, mat: mat, life: 0, max: 1, vx: 0, vy: 0, spin: 0 });
  }
  let glyphCursor = 0;
  const worldV = new THREE.Vector3();

  function launchGlyph(keyIdx, ch) {
    if (ch === ' ' || ch === '#') return;
    const gl = glyphs[glyphCursor]; glyphCursor = (glyphCursor + 1) % GLYPH_POOL;
    gl.mat.map = texFor(ch);
    gl.mat.needsUpdate = true;
    worldV.set(keys[keyIdx].x, 0.2, keys[keyIdx].z);
    board.localToWorld(worldV);
    gl.mesh.position.copy(worldV);
    gl.vx = (rnd() - 0.5) * 0.7;
    gl.vy = 2.0 + rnd() * 0.7;
    gl.spin = (rnd() - 0.5) * 2.4;
    gl.max = 1.05; gl.life = gl.max;
    gl.mesh.visible = true;
  }

  // ---- WPM trace ------------------------------------------------------------
  const samples = new Float32Array(TRACE_N);
  const tracePos = new Float32Array(TRACE_N * 3);
  const TRACE_X0 = -4.2, TRACE_X1 = 4.2, TRACE_Y = 1.7, TRACE_H = 1.5, TRACE_Z = -1.3;
  for (let i = 0; i < TRACE_N; i++) {
    tracePos[i * 3] = TRACE_X0 + (TRACE_X1 - TRACE_X0) * (i / (TRACE_N - 1));
    tracePos[i * 3 + 1] = TRACE_Y;
    tracePos[i * 3 + 2] = TRACE_Z;
  }
  const traceGeo = new THREE.BufferGeometry();
  traceGeo.setAttribute('position', new THREE.Float32BufferAttribute(tracePos, 3));
  const traceMat = new THREE.LineBasicMaterial({ color: PRESS_COL, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
  const trace = new THREE.Line(traceGeo, traceMat);
  ctx.scene.add(trace);
  // glowing head dot on the newest sample
  const headGeo = new THREE.BufferGeometry();
  headGeo.setAttribute('position', new THREE.Float32BufferAttribute([TRACE_X1, TRACE_Y, TRACE_Z], 3));
  const headMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(PRESS_COL) } },
    vertexShader: [
      'void main(){',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = 220.0 / -mv.z;',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.05, d) * 0.8);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const head = new THREE.Points(headGeo, headMat);
  ctx.scene.add(head);

  // label the speed line at its left end
  const traceTag = ctx.makeTag('wpm trace', '#5BC8D8', 0.3);
  traceTag.position.set(TRACE_X0 + 0.55, TRACE_Y - 0.42, TRACE_Z);
  traceTag.material.opacity = 0.7;
  ctx.scene.add(traceTag);

  // ---- typing engine ---------------------------------------------------------
  const PHRASES = [
    'THE QUICK ONYX GOBLIN JUMPS OVER A LAZY DWARF',
    'PACK MY BOX WITH FIVE DOZEN LIQUID GEMS',
    'HOW VEXINGLY QUICK DAFT ZEBRAS JUMP',
    'BRIGHT VIXENS JUMP WHEN DOZY FOWL QUACK',
    'CRAZY FREDERICK BOUGHT MANY VERY EXQUISITE OPAL JEWELS'
  ];
  let phraseIdx = 0;
  let charIdx = 0;
  let nextAt = 1.2;         // local time of the next keystroke
  let wordFactor = 1;       // per-word burst speed
  let pendingFix = null;    // the correct char to press after a mistake
  let ema = 0;              // keystroke-rate accumulator (the WPM signal)
  let dipFlash = 0;         // rose flash on the trace after a miss
  let sampleTimer = 0;
  let tt = 0;

  function neighborOf(keyIdx) {
    let best = -1, bestD = 1e9;
    for (let i = 0; i < N_KEYS; i++) {
      if (i === keyIdx || keys[i].char === '#' || keys[i].char === ' ') continue;
      const dx = keys[i].x - keys[keyIdx].x, dz = keys[i].z - keys[keyIdx].z;
      const d = dx * dx + dz * dz;
      if (d > 0.001 && d < bestD) { bestD = d; best = i; }
    }
    return best < 0 ? keyIdx : best;
  }

  function strike(keyIdx, wrong) {
    presses.push({ key: keyIdx, t0: tt });
    if (wrong) {
      missGlow[keyIdx] = 1;
      ema = Math.max(0, ema - 1.4); // accuracy cost dips the trace
      dipFlash = 1;
    } else {
      glow[keyIdx] = 1;
      ema += 1;
      launchGlyph(keyIdx, keys[keyIdx].char);
    }
  }

  function scheduleNext(afterErr) {
    const phrase = PHRASES[phraseIdx];
    if (afterErr) { nextAt = tt + 0.26 + rnd() * 0.15; return; }
    if (charIdx >= phrase.length) {
      phraseIdx = (phraseIdx + 1) % PHRASES.length;
      charIdx = 0;
      nextAt = tt + 1.7 + rnd() * 0.9;  // a breath between phrases
      return;
    }
    const ch = phrase[charIdx];
    let d;
    if (ch === ' ') { d = 0.15 + rnd() * 0.12; wordFactor = 0.75 + rnd() * 0.55; }
    else d = (0.072 + rnd() * 0.06) * wordFactor;
    if (rnd() < 0.05) d += 0.35 + rnd() * 0.4;   // a human micro-hesitation
    nextAt = tt + d;
  }

  function fireKeystroke() {
    if (pendingFix !== null) {
      strike(pendingFix, false);
      pendingFix = null;
      charIdx++;
      scheduleNext(false);
      return;
    }
    const phrase = PHRASES[phraseIdx];
    if (charIdx >= phrase.length) { scheduleNext(false); return; }
    const ch = phrase[charIdx];
    const keyIdx = charToKey[ch];
    if (keyIdx === undefined) { charIdx++; scheduleNext(false); return; }
    if (ch !== ' ' && rnd() < MISTAKE_P) {
      strike(neighborOf(keyIdx), true);   // the slip
      pendingFix = keyIdx;                // then the corrective press
      scheduleNext(true);
      return;
    }
    strike(keyIdx, false);
    charIdx++;
    scheduleNext(false);
  }

  function pressPulse(a) {
    if (a <= 0) return 0;
    return smooth(0, 0.045, a) * (1 - smooth(0.07, 0.22, a));
  }

  ctx.camera.position.set(0, 2.75, 6.5);
  ctx.camera.lookAt(0, 0.65, 0);

  function update(t, dt) {
    dt = clamp(dt, 0, 0.05);
    tt += dt;

    // fire due keystrokes (at most a few per frame)
    let guard = 0;
    while (tt >= nextAt && guard < 4) { fireKeystroke(); guard++; }

    // drop expired presses
    for (let i = presses.length - 1; i >= 0; i--) {
      if (tt - presses[i].t0 > 0.6) presses.splice(i, 1);
    }

    // live caption follows the typing engine
    let cap;
    if (dipFlash > 0.45) cap = 'A rare miss stings in rose and costs the trace';
    else if (pendingFix !== null) cap = 'The corrective press lands right after the slip';
    else if (charIdx === 0 && tt < nextAt) cap = 'A breath between phrases; the trace dips';
    else if (ema > 5.2) cap = 'A typing burst lifts the WPM trace';
    else cap = 'Steady human rhythm, steady speed';
    ctx.caption(cap);

    // key motion: own press plus rippled neighbor presses
    for (let i = 0; i < N_KEYS; i++) {
      let depth = 0;
      for (const p of presses) {
        const dx = keys[i].x - keys[p.key].x, dz = keys[i].z - keys[p.key].z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > RIPPLE_R) continue;
        const amp = p.key === i ? 1 : 0.28 * Math.exp(-dist / 0.7);
        depth += amp * pressPulse(tt - p.t0 - dist * 0.05);
      }
      depth = Math.min(1, depth);
      m4.makeScale(keys[i].wide ? 4.2 : 1, 1, 1);
      m4.setPosition(keys[i].x, -depth * PRESS_DEPTH, keys[i].z);
      capMesh.setMatrixAt(i, m4);

      glow[i] *= Math.exp(-dt * 3.8);
      missGlow[i] *= Math.exp(-dt * 3.2);
      cTmp.copy(baseCol).lerp(pressCol, Math.min(1, glow[i]));
      cTmp.lerp(missColC, Math.min(1, missGlow[i]));
      capMesh.setColorAt(i, cTmp);
    }
    capMesh.instanceMatrix.needsUpdate = true;
    capMesh.instanceColor.needsUpdate = true;

    // rate signal decay and trace sampling
    ema *= Math.exp(-dt * EMA_DECAY);
    dipFlash *= Math.exp(-dt * 3);
    sampleTimer += dt;
    while (sampleTimer >= TRACE_DT) {
      sampleTimer -= TRACE_DT;
      samples.copyWithin(0, 1);
      samples[TRACE_N - 1] = clamp(ema / 7.5, 0, 1.25);
    }
    const pa = traceGeo.attributes.position.array;
    for (let i = 0; i < TRACE_N; i++) {
      pa[i * 3 + 1] = TRACE_Y + samples[i] * TRACE_H;
    }
    traceGeo.attributes.position.needsUpdate = true;
    traceMat.color.copy(pressCol).lerp(missColC, Math.min(1, dipFlash));
    const hp = headGeo.attributes.position.array;
    hp[1] = TRACE_Y + samples[TRACE_N - 1] * TRACE_H;
    headGeo.attributes.position.needsUpdate = true;
    headMat.uniforms.uColor.value.copy(traceMat.color);

    // airborne glyphs
    for (const gl of glyphs) {
      if (gl.life <= 0) { if (gl.mesh.visible) gl.mesh.visible = false; continue; }
      gl.life -= dt;
      gl.vy -= 2.3 * dt;
      gl.mesh.position.x += gl.vx * dt;
      gl.mesh.position.y += gl.vy * dt;
      gl.mesh.quaternion.copy(ctx.camera.quaternion);
      gl.mesh.rotateZ(gl.spin * (gl.max - gl.life));
      const u = clamp(gl.life / gl.max, 0, 1);
      gl.mat.opacity = smooth(0, 0.12, 1 - u) * (0.35 + 0.65 * u);
    }

    // gentle board breath and pointer parallax
    board.position.y = -0.4 + Math.sin(tt * 0.6) * 0.04;
    const px = ctx.pointer.x * 1.2;
    const py = 2.75 + ctx.pointer.y * 0.9;
    ctx.camera.position.x += (px - ctx.camera.position.x) * (1 - Math.exp(-dt * 3));
    ctx.camera.position.y += (py - ctx.camera.position.y) * (1 - Math.exp(-dt * 3));
    ctx.camera.lookAt(0, 0.65, 0);
  }

  return { update };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

/* Live phase caption: scenes call ctx.caption('...') each frame; the text
   only touches the DOM when it changes, with a quick cross-fade. */
const lblPhase = document.getElementById('lblPhase');
let capText = null, capTimer = 0;
ctx.caption = (s) => {
  if (s === capText || !lblPhase) return;
  capText = s;
  lblPhase.style.opacity = '0';
  clearTimeout(capTimer);
  capTimer = setTimeout(() => {
    lblPhase.textContent = capText;
    lblPhase.style.opacity = '1';
  }, 180);
};

/* Small floating text tag rendered to a canvas texture, for labelling
   objects inside the 3D scene. Returns a sprite; scale is world height. */
ctx.makeTag = (text, color, h = 0.42) => {
  const pad = 18, fpx = 46;
  const meas = document.createElement('canvas').getContext('2d');
  meas.font = '600 ' + fpx + 'px ui-monospace, Menlo, Consolas, monospace';
  const tw = Math.ceil(meas.measureText(text).width);
  const cw = tw + pad * 2, ch = fpx + pad * 2;
  const cnv = document.createElement('canvas');
  cnv.width = cw; cnv.height = ch;
  const g = cnv.getContext('2d');
  g.font = meas.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = color; g.shadowBlur = 14;
  g.fillStyle = color;
  g.fillText(text, cw / 2, ch / 2 + 2);
  g.shadowBlur = 0;
  g.fillText(text, cw / 2, ch / 2 + 2);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: false,
  }));
  spr.scale.set(h * cw / ch, h, 1);
  spr.renderOrder = 20;
  return spr;
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'typing-master-gui-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

/* Always autoplay; the Pause button is the opt-out. */
loop(performance.now());
</script>
</body>
</html>
