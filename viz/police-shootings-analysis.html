<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#090A12">
  <title>Police Shootings Analysis in 3D · Salman Adnan</title>
  <meta name="description" content="A quiet field of light: a respectful, slow 3D memorial to the records behind the analysis.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #090A12;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #E8DFC8; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="A slow, quiet field where points of warm light rise gently from dark ground, hold, and fade, in memoriam."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
  </div>
  <p id="note" hidden>Motion is paused because your system prefers reduced motion.
     Press Play to animate.</p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: police-shootings-analysis ================= */
// A QUIET FIELD OF LIGHT
// Concept: a memorial. Single warm points of light rise very slowly from a dark
//          ground, hold at a personal height, dim to faint embers that linger
//          in the air for minutes, and only then fade. Nothing bursts, nothing
//          plays. The sky slowly fills with quiet remembered lights.
// Palette: bg near-black indigo #090A12, candle warm white #E8DFC8,
//          ember #C8926A, ground slate #2A3040, mist violet #3A3550.
//          Justification: candlelight in the dark is a universal register of
//          mourning; everything else stays out of the way.
// Signature: the slow accumulation of embers that refuse to disappear quickly.

function createScene(THREE, ctx) {
  const Q = ctx.quality;

  // Tunables: all timing is deliberately long. Slower and dimmer wins here.
  const LIGHTS = Math.floor(380 * Q);  // total light slots cycling through life
  const PERIOD = 200.0;                // seconds of one light's full life
  const RISE = 15.0;                   // seconds a light takes to rise
  const HOLD = 12.0;                   // seconds it holds at full, gentle glow
  const DIM = 8.0;                     // seconds it takes to dim to ember
  const FADE = 18.0;                   // final fade of the oldest embers
  const GROUND_PTS = Math.floor(6000 * Q); // dim slate ground points
  const FIELD_X = 26.0;                // ground extent, x
  const FIELD_Z = 18.0;                // ground extent, z
  const MISTS = 6;                     // drifting violet mist sheets
  const BG = 0x090A12;

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.018);

  const px = ctx.renderer.getPixelRatio();

  // ---- ground: a dark landmass suggested by uneven point density ----
  const gPos = new Float32Array(GROUND_PTS * 3);
  const blobs = [];
  for (let b = 0; b < 4; b++) {
    blobs.push([(Math.random() - 0.5) * FIELD_X * 0.7, (Math.random() - 0.5) * FIELD_Z * 0.7]);
  }
  function gauss() { return (Math.random() + Math.random() + Math.random()) - 1.5; }
  for (let i = 0; i < GROUND_PTS; i++) {
    let x, z;
    if (i % 5 < 3) { // uniform spread
      x = (Math.random() * 2 - 1) * FIELD_X * 0.5;
      z = (Math.random() * 2 - 1) * FIELD_Z * 0.5;
    } else {         // denser patches
      const b = blobs[i % blobs.length];
      x = b[0] + gauss() * 2.6;
      z = b[1] + gauss() * 2.0;
    }
    gPos[i * 3] = x;
    gPos[i * 3 + 1] = 0.15 * Math.sin(x * 0.30) * Math.cos(z * 0.40) - 0.05;
    gPos[i * 3 + 2] = z;
  }
  const gGeo = new THREE.BufferGeometry();
  gGeo.setAttribute('position', new THREE.Float32BufferAttribute(gPos, 3));
  const gUniforms = {
    uTime: { value: 0 },
    uPx: { value: px },
    uSlate: { value: new THREE.Color(0x2A3040) }
  };
  const gMat = new THREE.ShaderMaterial({
    uniforms: gUniforms,
    transparent: true,
    depthWrite: false,
    vertexShader: `
      uniform float uTime;
      uniform float uPx;
      varying float vA;
      void main(){
        // a very slow breath of brightness across the ground
        vA = 0.10 + 0.06 * (0.5 + 0.5 * sin(uTime * 0.08 + (position.x + position.z) * 0.25));
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = uPx * 1.5 * (90.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform vec3 uSlate;
      varying float vA;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float alpha = smoothstep(0.5, 0.1, d) * vA;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(uSlate, alpha);
      }`
  });
  ctx.scene.add(new THREE.Points(gGeo, gMat));

  // ---- the lights: whole life computed analytically in the vertex shader,
  //      so there is never a reset pop, only slow arrivals and departures ----
  const cPos = new Float32Array(LIGHTS * 3);   // xz anchor (varied per cycle in-shader)
  const cHash = new Float32Array(LIGHTS * 3);  // per-light randomness
  const cPhase = new Float32Array(LIGHTS);     // life-cycle offset, spread evenly
  for (let i = 0; i < LIGHTS; i++) {
    cPos[i * 3] = (Math.random() * 2 - 1) * FIELD_X * 0.42;
    cPos[i * 3 + 1] = 0;
    cPos[i * 3 + 2] = (Math.random() * 2 - 1) * FIELD_Z * 0.42;
    cHash[i * 3] = Math.random();
    cHash[i * 3 + 1] = Math.random();
    cHash[i * 3 + 2] = Math.random();
    // even spread plus a little randomness keeps arrivals unhurried, never batched
    cPhase[i] = (i / LIGHTS) * PERIOD + Math.random() * (PERIOD / LIGHTS);
  }
  const cGeo = new THREE.BufferGeometry();
  cGeo.setAttribute('position', new THREE.Float32BufferAttribute(cPos, 3));
  cGeo.setAttribute('aHash', new THREE.Float32BufferAttribute(cHash, 3));
  cGeo.setAttribute('aPhase', new THREE.Float32BufferAttribute(cPhase, 1));

  const cUniforms = {
    uTime: { value: 0 },
    uPeriod: { value: PERIOD },
    uPx: { value: px },
    uCandle: { value: new THREE.Color(0xE8DFC8) },
    uEmber: { value: new THREE.Color(0xC8926A) }
  };
  const cMat = new THREE.ShaderMaterial({
    uniforms: cUniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      uniform float uTime;
      uniform float uPeriod;
      uniform float uPx;
      uniform vec3 uCandle;
      uniform vec3 uEmber;
      attribute vec3 aHash;
      attribute float aPhase;
      varying float vB;
      varying vec3 vColor;
      float hash(float n){ return fract(sin(n) * 43758.5453); }
      void main(){
        float u = mod(uTime + aPhase, uPeriod);
        float cyc = floor((uTime + aPhase) / uPeriod);
        // each new life takes a nearby but different place on the ground
        vec2 base = position.xz + vec2(
          hash(cyc * 3.17 + aHash.x * 91.0) - 0.5,
          hash(cyc * 7.91 + aHash.y * 57.0) - 0.5) * 7.0;
        float r = clamp(u / ${RISE.toFixed(1)}, 0.0, 1.0);
        float yf = r * r * (3.0 - 2.0 * r);           // eased, very slow rise
        float height = 2.0 + aHash.z * 2.6;           // a personal height
        float d = smoothstep(${(RISE + HOLD).toFixed(1)}, ${(RISE + HOLD + DIM).toFixed(1)}, u);
        float bIn = smoothstep(0.0, 4.0, u);          // gentle first light
        float flick = 1.0 + 0.05 * sin(uTime * 1.3 + aHash.x * 40.0);
        float breathe = 0.85 + 0.15 * sin(uTime * 0.22 + aHash.y * 40.0);
        float level = mix(flick, 0.16 * breathe, d);  // full glow eases to ember
        float fadeOut = 1.0 - smoothstep(uPeriod - ${FADE.toFixed(1)}, uPeriod, u);
        vB = bIn * level * fadeOut;
        vColor = mix(uCandle, uEmber, d);
        // almost imperceptible sway
        vec2 sway = vec2(sin(uTime * 0.20 + aHash.x * 60.0),
                         cos(uTime * 0.17 + aHash.y * 60.0)) * 0.10 * yf;
        vec3 p = vec3(base.x + sway.x, yf * height, base.y + sway.y);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = uPx * mix(3.4, 1.9, d) * (110.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying float vB;
      varying vec3 vColor;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float core = smoothstep(0.22, 0.0, d);
        float alpha = smoothstep(0.5, 0.08, d) * vB;
        if (alpha < 0.008) discard;
        gl_FragColor = vec4(vColor * (0.7 + 0.5 * core), alpha);
      }`
  });
  ctx.scene.add(new THREE.Points(cGeo, cMat));

  // ---- low violet mist, breathing across the ground ----
  function makeMistTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 128;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(128, 64, 0, 128, 64, 120);
    grad.addColorStop(0, 'rgba(255,255,255,0.5)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.18)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 256, 128);
    return new THREE.CanvasTexture(c);
  }
  const mistTex = makeMistTexture();
  const mistGeo = new THREE.BufferGeometry();
  mistGeo.setAttribute('position', new THREE.Float32BufferAttribute(
    [-0.5, 0, -0.5, 0.5, 0, -0.5, 0.5, 0, 0.5, -0.5, 0, 0.5], 3));
  mistGeo.setAttribute('uv', new THREE.Float32BufferAttribute([0, 0, 1, 0, 1, 1, 0, 1], 2));
  mistGeo.setIndex([0, 1, 2, 0, 2, 3]);
  const mists = [];
  for (let i = 0; i < MISTS; i++) {
    const m = new THREE.Mesh(mistGeo, new THREE.MeshBasicMaterial({
      map: mistTex, color: new THREE.Color(0x3A3550),
      transparent: true, opacity: 0.04,
      blending: THREE.AdditiveBlending, depthWrite: false
    }));
    m.scale.set(10 + Math.random() * 6, 1, 5 + Math.random() * 3);
    m.position.set((Math.random() - 0.5) * FIELD_X * 0.8, 0.5 + Math.random() * 0.5,
                   (Math.random() - 0.5) * FIELD_Z * 0.8);
    m.userData.baseX = m.position.x;
    m.userData.ph = Math.random() * Math.PI * 2;
    ctx.scene.add(m);
    mists.push(m);
  }

  // ---- soft vignette, fixed to the camera ----
  function makeVignetteTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 256;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(128, 128, 60, 128, 128, 180);
    grad.addColorStop(0, 'rgba(5,5,10,0)');
    grad.addColorStop(1, 'rgba(5,5,10,0.55)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 256, 256);
    return new THREE.CanvasTexture(c);
  }
  const vinGeo = new THREE.BufferGeometry();
  vinGeo.setAttribute('position', new THREE.Float32BufferAttribute(
    [-0.5, -0.5, 0, 0.5, -0.5, 0, 0.5, 0.5, 0, -0.5, 0.5, 0], 3));
  vinGeo.setAttribute('uv', new THREE.Float32BufferAttribute([0, 0, 1, 0, 1, 1, 0, 1], 2));
  vinGeo.setIndex([0, 1, 2, 0, 2, 3]);
  const vignette = new THREE.Mesh(vinGeo, new THREE.MeshBasicMaterial({
    map: makeVignetteTexture(), transparent: true,
    depthTest: false, depthWrite: false
  }));
  vignette.renderOrder = 10;
  const VIN_DIST = 0.55;
  vignette.position.set(0, 0, -VIN_DIST);
  ctx.scene.add(ctx.camera); // camera must be in the scene for its child to render
  ctx.camera.add(vignette);
  function fitVignette(aspect) {
    const h = 2 * VIN_DIST * Math.tan((ctx.camera.fov * Math.PI / 180) / 2) * 1.15;
    vignette.scale.set(h * aspect, h, 1);
  }
  fitVignette(ctx.camera.aspect || 1.6);

  const CAM_R = 17.5, CAM_H = 4.3;
  ctx.camera.position.set(0, CAM_H, CAM_R);
  ctx.camera.lookAt(0, 2.2, 0);

  return {
    update(t) {
      gUniforms.uTime.value = t;
      cUniforms.uTime.value = t;

      // mist breathes and drifts, never wrapping, never popping
      for (let i = 0; i < MISTS; i++) {
        const m = mists[i];
        m.position.x = m.userData.baseX + Math.sin(t * 0.012 + m.userData.ph) * 2.5;
        m.material.opacity = 0.030 + 0.020 * (0.5 + 0.5 * Math.sin(t * 0.05 + m.userData.ph * 2.0));
      }

      // the view only tilts a few degrees; no orbiting, no travel
      const az = ctx.pointer.x * 0.07 + Math.sin(t * 0.01) * 0.02;
      ctx.camera.position.set(
        Math.sin(az) * CAM_R,
        CAM_H + ctx.pointer.y * 0.5,
        Math.cos(az) * CAM_R);
      ctx.camera.lookAt(0, 2.2, 0);
    },
    resize(w, h) {
      fitVignette(w / h);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'police-shootings-analysis-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
