<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0D1020">
  <title>Agency Blog SaaS in 3D · Salman Adnan</title>
  <meta name="description" content="Draft Press: an interactive 3D study of blank pages becoming typeset drafts as credits tick down.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0D1020;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #E5B84F; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated stream of blank page planes passing through a glowing gate where ink particles assemble into text blocks, while credit tokens orbit."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
  </div>
  <p id="note" hidden>Motion is paused because your system prefers reduced motion.
     Press Play to animate.</p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: agency-blog-saas ================= */
// DRAFT PRESS
// Concept: blank bone-white pages glide through a tall glowing gate where
// indigo ink swirls; as each page passes, an ink-wipe reveals its typeset
// blocks, a red seal stamps in last, and one gold credit token spirals into
// the gate and winks out, the orbiting ring lazily replenishing.
// Palette: bg ink navy #0D1020, page bone #EDE7DC, ink indigo #4A5AE8,
//          credit gold #E5B84F, seal red #D95252.
//   Editorial navy and bone with indigo ink says publishing; gold makes the
//   credit economy visible, red is saved for the seal.
// Signature: the ink-wipe typesetting moment inside the gate.

function createScene(THREE, ctx) {
  var q = ctx.quality;

  // ---- tunables ----
  var BG = 0x0d1020;                       // background, ink navy
  var N_PAGES = Math.max(4, Math.floor(7 * q)); // pages on the belt
  var PAGE_W = 2.2, PAGE_H = 3.0;          // page plane size
  var TRAVEL = 16.0;                       // half travel span along x
  var PAGE_SPEED = 0.045;                  // belt loops per second (~22s circuit)
  var N_INK = Math.max(700, Math.floor(2200 * q)); // ink swirl particles
  var N_TOKENS = Math.max(8, Math.floor(12 * q)); // credit tokens in the ring
  var TOKEN_R = 3.6;                       // token orbit radius around the gate
  var TOKEN_SPIN = 0.25;                   // ring revolutions per second factor
  var CONSUME_TIME = 1.15;                 // token spiral-in duration (s)
  var RESPAWN_AFTER = 2.6;                 // seconds a consumed token stays gone

  var COL_GOLD = new THREE.Color(0xe5b84f);
  var COL_INK = new THREE.Color(0x4a5ae8);

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.028);
  ctx.scene.add(new THREE.AmbientLight(0x252a4a, 1.3));
  var dir = new THREE.DirectionalLight(0xd8dcf2, 1.0);
  dir.position.set(6, 8, 9);
  ctx.scene.add(dir);
  var fill = new THREE.DirectionalLight(0x2a3060, 0.5);
  fill.position.set(-7, -2, -5);
  ctx.scene.add(fill);

  function ssj(a, b, x) {
    x = Math.min(1, Math.max(0, (x - a) / (b - a)));
    return x * x * (3 - 2 * x);
  }
  function ease(u) { return u * u * (3 - 2 * u); }

  // ---- pages: one plane + own shader material each (few of them)
  var pageGeo = new THREE.PlaneGeometry(PAGE_W, PAGE_H, 12, 16);
  var pageVert = [
    'uniform float uTime;',
    'uniform float uSeed;',
    'varying vec2 vUv;',
    'void main(){',
    '  vUv = uv;',
    '  vec3 p = position;',
    '  p.z += 0.06 * sin(uv.y * 3.1416 + uTime * 0.8 + uSeed * 6.0);',
    '  p.z += 0.04 * sin(uv.x * 2.2 + uTime * 0.6 + uSeed * 3.0);',
    '  gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);',
    '}'
  ].join('\n');
  var pageFrag = [
    'uniform float uSeed;',
    'uniform float uReveal;',
    'uniform float uSeal;',
    'uniform float uAlpha;',
    'varying vec2 vUv;',
    'float hash(float n){ return fract(sin(n) * 43758.5453123); }',
    'float band(float y, float c, float h){ return smoothstep(h, h * 0.55, abs(y - c)); }',
    'void main(){',
    '  vec3 paper = vec3(0.929, 0.906, 0.863);',
    '  vec3 inkCol = vec3(0.29, 0.353, 0.91);',
    '  vec3 sealCol = vec3(0.851, 0.322, 0.322);',
    '  float g = hash(floor(vUv.x * 140.0) + floor(vUv.y * 190.0) * 91.7 + uSeed) * 0.05;',
    '  vec3 col = paper - g;',
    '  float vg = smoothstep(0.0, 0.06, vUv.x) * smoothstep(1.0, 0.94, vUv.x)',
    '           * smoothstep(0.0, 0.045, vUv.y) * smoothstep(1.0, 0.955, vUv.y);',
    '  col *= 0.8 + 0.2 * vg;',
    '  float ink = 0.0;',
    '  float tw = 0.42 + 0.3 * hash(uSeed + 1.7);',
    '  ink += band(vUv.y, 0.875, 0.034) * step(0.1, vUv.x) * step(vUv.x, 0.1 + tw);',
    '  for (int rr = 0; rr < 10; rr++) {',
    '    float fr = float(rr);',
    '    float yc = 0.76 - fr * 0.058;',
    '    float skip = step(0.88, hash(uSeed + fr * 7.31 + 2.0));',
    '    float xe = 0.9 - 0.28 * hash(uSeed + fr * 3.77 + 9.0);',
    '    ink += band(vUv.y, yc, 0.016) * step(0.1, vUv.x) * step(vUv.x, xe) * (1.0 - skip);',
    '  }',
    '  ink = min(ink, 1.0);',
    '  float dTop = 1.0 - vUv.y;',
    '  float front = uReveal * 1.15 - 0.05;',
    '  float visible = 1.0 - smoothstep(front - 0.03, front + 0.05, dTop);',
    '  col = mix(col, inkCol, ink * visible * 0.88);',
    '  float fe = exp(-abs(dTop - front) * 26.0)',
    '           * smoothstep(0.02, 0.12, uReveal) * (1.0 - smoothstep(0.9, 1.0, uReveal));',
    '  col += inkCol * fe * 0.6;',
    '  vec2 sc = (vUv - vec2(0.8, 0.13)) * vec2(1.0, 1.364);',
    '  float sd = length(sc);',
    '  float ring = smoothstep(0.056, 0.048, sd) * smoothstep(0.03, 0.038, sd);',
    '  float mark = smoothstep(0.017, 0.008, sd);',
    '  col = mix(col, sealCol, (ring + mark) * uSeal * 0.9);',
    '  gl_FragColor = vec4(col, uAlpha);',
    '}'
  ].join('\n');

  var pages = [];
  for (var p = 0; p < N_PAGES; p++) {
    var uniforms = {
      uTime: { value: 0 },
      uSeed: { value: Math.random() * 40 },
      uReveal: { value: 0 },
      uSeal: { value: 0 },
      uAlpha: { value: 0 }
    };
    var mat = new THREE.ShaderMaterial({
      uniforms: uniforms,
      vertexShader: pageVert,
      fragmentShader: pageFrag,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    var mesh = new THREE.Mesh(pageGeo, mat);
    ctx.scene.add(mesh);
    pages.push({ mesh: mesh, u: uniforms, offset: p / N_PAGES, prevX: -TRAVEL });
  }

  // ---- gate frame (portal in the x = 0 plane; pages pass through it)
  var frameMat = new THREE.MeshStandardMaterial({ color: 0x2a3480, roughness: 0.35, metalness: 0.5, emissive: 0x3a48c0, emissiveIntensity: 0.8 });
  var gateGroup = new THREE.Group();
  var vBarGeo = new THREE.BoxGeometry(0.32, 5.6, 0.32);
  var barL = new THREE.Mesh(vBarGeo, frameMat); barL.position.set(0, 0.5, -1.7);
  var barR = new THREE.Mesh(vBarGeo, frameMat); barR.position.set(0, 0.5, 1.7);
  var hBarGeo = new THREE.BoxGeometry(0.32, 0.32, 3.72);
  var barT = new THREE.Mesh(hBarGeo, frameMat); barT.position.set(0, 3.3, 0);
  var barB = new THREE.Mesh(hBarGeo, frameMat); barB.position.set(0, -2.3, 0);
  gateGroup.add(barL, barR, barT, barB);
  ctx.scene.add(gateGroup);

  // ---- ink swirl inside the gate (curl noise, brightens when a page passes)
  var inkGeo = new THREE.BufferGeometry();
  var inkPos = new Float32Array(N_INK * 3);
  var inkSeed = new Float32Array(N_INK);
  for (var k = 0; k < N_INK; k++) {
    inkPos[k * 3] = (Math.random() - 0.5) * 1.4;
    inkPos[k * 3 + 1] = 0.5 + (Math.random() - 0.5) * 4.6;
    inkPos[k * 3 + 2] = (Math.random() - 0.5) * 2.9;
    inkSeed[k] = Math.random();
  }
  inkGeo.setAttribute('position', new THREE.Float32BufferAttribute(inkPos, 3));
  inkGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(inkSeed, 1));
  var inkUniforms = { uTime: { value: 0 }, uAct: { value: 0 }, uColor: { value: COL_INK } };
  var inkMat = new THREE.ShaderMaterial({
    uniforms: inkUniforms,
    vertexShader: [
      'attribute float aSeed;',
      'uniform float uTime;',
      'uniform float uAct;',
      'varying float vA;',
      'vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}',
      'vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}',
      'vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}',
      'vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}',
      'float snoise(vec3 v){',
      '  const vec2 C = vec2(1.0/6.0, 1.0/3.0);',
      '  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);',
      '  vec3 i  = floor(v + dot(v, C.yyy));',
      '  vec3 x0 = v - i + dot(i, C.xxx);',
      '  vec3 g = step(x0.yzx, x0.xyz);',
      '  vec3 l = 1.0 - g;',
      '  vec3 i1 = min(g.xyz, l.zxy);',
      '  vec3 i2 = max(g.xyz, l.zxy);',
      '  vec3 x1 = x0 - i1 + C.xxx;',
      '  vec3 x2 = x0 - i2 + C.yyy;',
      '  vec3 x3 = x0 - D.yyy;',
      '  i = mod289(i);',
      '  vec4 p = permute(permute(permute(',
      '            i.z + vec4(0.0, i1.z, i2.z, 1.0))',
      '          + i.y + vec4(0.0, i1.y, i2.y, 1.0))',
      '          + i.x + vec4(0.0, i1.x, i2.x, 1.0));',
      '  float n_ = 0.142857142857;',
      '  vec3 ns = n_ * D.wyz - D.xzx;',
      '  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);',
      '  vec4 x_ = floor(j * ns.z);',
      '  vec4 y_ = floor(j - 7.0 * x_);',
      '  vec4 x = x_ * ns.x + ns.yyyy;',
      '  vec4 y = y_ * ns.x + ns.yyyy;',
      '  vec4 h = 1.0 - abs(x) - abs(y);',
      '  vec4 b0 = vec4(x.xy, y.xy);',
      '  vec4 b1 = vec4(x.zw, y.zw);',
      '  vec4 s0 = floor(b0) * 2.0 + 1.0;',
      '  vec4 s1 = floor(b1) * 2.0 + 1.0;',
      '  vec4 sh = -step(h, vec4(0.0));',
      '  vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;',
      '  vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;',
      '  vec3 p0 = vec3(a0.xy, h.x);',
      '  vec3 p1 = vec3(a0.zw, h.y);',
      '  vec3 p2 = vec3(a1.xy, h.z);',
      '  vec3 p3 = vec3(a1.zw, h.w);',
      '  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));',
      '  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;',
      '  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);',
      '  m = m * m;',
      '  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));',
      '}',
      'vec3 curl(vec3 p){',
      '  const float e = 0.1;',
      '  float n1 = snoise(vec3(p.x, p.y + e, p.z));',
      '  float n2 = snoise(vec3(p.x, p.y - e, p.z));',
      '  float n3 = snoise(vec3(p.x, p.y, p.z + e));',
      '  float n4 = snoise(vec3(p.x, p.y, p.z - e));',
      '  float n5 = snoise(vec3(p.x + e, p.y, p.z));',
      '  float n6 = snoise(vec3(p.x - e, p.y, p.z));',
      '  float x = n2 - n1 - n4 + n3;',
      '  float y = n4 - n3 - n6 + n5;',
      '  float z = n6 - n5 - n2 + n1;',
      '  return normalize(vec3(x, y, z));',
      '}',
      'void main(){',
      '  vec3 p = position;',
      '  vec3 fl = curl(p * 0.55 + vec3(0.0, uTime * 0.22, uTime * 0.05));',
      '  p += fl * (0.45 + 0.85 * uAct);',
      '  p.x *= 0.5;',
      '  float tw = 0.5 + 0.5 * sin(uTime * 2.4 + aSeed * 6.2831);',
      '  vA = (0.16 + 0.55 * uAct) * (0.35 + 0.65 * tw);',
      '  vec4 mv = modelViewMatrix * vec4(p, 1.0);',
      '  gl_PointSize = (2.2 + 3.2 * aSeed) * (150.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vA;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  float a = smoothstep(0.5, 0.08, d) * vA;',
      '  gl_FragColor = vec4(uColor, a);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var inkPoints = new THREE.Points(inkGeo, inkMat);
  inkPoints.frustumCulled = false; // curl displacement happens in the vertex shader
  ctx.scene.add(inkPoints);

  // soft gate-center glow that breathes with activity
  var glowGeo = new THREE.BufferGeometry();
  glowGeo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0.5, 0], 3));
  var glowUniforms = { uAct: { value: 0 }, uColor: { value: COL_INK } };
  var glowMat = new THREE.ShaderMaterial({
    uniforms: glowUniforms,
    vertexShader: [
      'uniform float uAct;',
      'varying float vG;',
      'void main(){',
      '  vG = uAct;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = (40.0 + 90.0 * uAct) * (150.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vG;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  float a = smoothstep(0.5, 0.02, d) * (0.1 + 0.35 * vG);',
      '  gl_FragColor = vec4(uColor, a);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(glowGeo, glowMat));

  // ---- credit tokens orbiting the gate
  var tokGeo = new THREE.OctahedronGeometry(0.17);
  var tokMat = new THREE.MeshStandardMaterial({ color: COL_GOLD, roughness: 0.3, metalness: 0.7, emissive: 0x9a7420, emissiveIntensity: 0.9 });
  var tokens = [];
  for (var tk = 0; tk < N_TOKENS; tk++) {
    var tMesh = new THREE.Mesh(tokGeo, tokMat);
    ctx.scene.add(tMesh);
    tokens.push({ mesh: tMesh, slot: tk / N_TOKENS * Math.PI * 2, state: 'orbit', t0: 0 });
  }
  function consumeToken(t) {
    for (var ct = 0; ct < tokens.length; ct++) {
      if (tokens[ct].state === 'orbit') { tokens[ct].state = 'consume'; tokens[ct].t0 = t; return; }
    }
  }

  return {
    update: function (t, dt) {
      inkUniforms.uTime.value = t;

      // pages along the belt
      var act = 0;
      for (var i = 0; i < pages.length; i++) {
        var pg = pages[i];
        var prog = (t * PAGE_SPEED + pg.offset) % 1;
        var x = -TRAVEL + prog * 2 * TRAVEL;
        var y = 0.45 + 0.22 * Math.sin(t * 0.6 + i * 2.1);
        pg.mesh.position.set(x, y, 0);
        pg.mesh.rotation.y = 0.12 * Math.sin(t * 0.4 + i);
        pg.u.uTime.value = t;
        pg.u.uReveal.value = ssj(-1.5, 1.9, x);
        pg.u.uSeal.value = ssj(2.5, 4.3, x);
        pg.u.uAlpha.value = ssj(-TRAVEL, -TRAVEL + 3.4, x) * (1 - ssj(TRAVEL - 3.4, TRAVEL, x));
        act = Math.max(act, Math.exp(-x * x * 0.35));
        // a page finishing its pass through the gate consumes one credit token
        if (pg.prevX <= 2.0 && x > 2.0) consumeToken(t);
        pg.prevX = x;
      }
      inkUniforms.uAct.value += (act - inkUniforms.uAct.value) * Math.min(1, dt * 5.0);
      glowUniforms.uAct.value = inkUniforms.uAct.value;

      // credit token ring
      var baseSpin = t * TOKEN_SPIN;
      for (var j = 0; j < tokens.length; j++) {
        var tok = tokens[j];
        var ang = tok.slot + baseSpin;
        if (tok.state === 'orbit') {
          tok.mesh.position.set(0.15 * Math.sin(t * 0.8 + j), 0.5 + TOKEN_R * Math.cos(ang), TOKEN_R * Math.sin(ang));
          tok.mesh.scale.setScalar(1);
          tok.mesh.rotation.set(t * 0.8 + j, t * 0.6, 0);
        } else if (tok.state === 'consume') {
          var cu = (t - tok.t0) / CONSUME_TIME;
          if (cu >= 1) {
            tok.state = 'gone';
            tok.t0 = t;
            tok.mesh.scale.setScalar(0.0001);
            tok.mesh.position.set(0, 0.5, 0);
          } else {
            var eu = ease(cu);
            var rr = TOKEN_R * (1 - eu);
            var aa = ang + eu * 5.0; // spiral in, angle accelerating
            tok.mesh.position.set(0.15 * Math.sin(t * 0.8 + j) * (1 - eu), 0.5 + rr * Math.cos(aa), rr * Math.sin(aa));
            tok.mesh.scale.setScalar(Math.max(0.0001, 1 - eu * 0.9));
            tok.mesh.rotation.set(t * 3.0, t * 2.4, 0);
          }
        } else if (tok.state === 'gone') {
          if (t - tok.t0 > RESPAWN_AFTER) { tok.state = 'respawn'; tok.t0 = t; }
        } else if (tok.state === 'respawn') {
          var ru = Math.min(1, (t - tok.t0) / 0.9);
          tok.mesh.position.set(0.15 * Math.sin(t * 0.8 + j) * ru, 0.5 + TOKEN_R * Math.cos(ang), TOKEN_R * Math.sin(ang));
          tok.mesh.scale.setScalar(Math.max(0.0001, ease(ru)));
          if (ru >= 1) tok.state = 'orbit';
        }
      }

      // gate frame gently pulses with activity
      frameMat.emissiveIntensity = 0.6 + 0.7 * inkUniforms.uAct.value;

      // camera: front-side view, slow drift, pointer parallax
      var cx = 8.2 + 0.8 * Math.sin(t * 0.05) + ctx.pointer.x * 1.6;
      var cy = 2.3 + 0.5 * Math.sin(t * 0.07) + ctx.pointer.y * 1.4;
      ctx.camera.position.set(cx, cy, 10.2);
      ctx.camera.lookAt(0.4, 0.4, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'agency-blog-saas-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
