      position: absolute; inset: 0; display: none;

    }
    #lbl {
      position: absolute; left: 12px; top: 12px; max-width: 44ch;

{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

/* ================= scene: balochi-poet-classifier ================= */
// VERSE CONSTELLATIONS
// Concept: verse particles drift in embedding space, then ease into four poet
//          clusters, ignite constellation lines, hold, and release to drift again.
// Palette: bg desert night #100C14, verse sand #E4C590, cluster turquoise #3EC8B4,
//          accent carmine #C94F5E, dim star #8A84A0.
//          Justification: turquoise and carmine echo Balochi embroidery threads
//          laid on a desert night sky.
// Signature: constellation lines igniting the instant a cluster forms.

function createScene(THREE, ctx) {
  const Q = ctx.quality;

  // Tunables
  const COUNT = Math.floor(3000 * Q);   // verse particles
  const CLUSTERS = 4;                   // poets
  const CYCLE = 20.0;                   // seconds per drift-gather-hold-release cycle
  const T_DRIFT = 6.0;                  // free drift hold
  const T_GATHER = 4.0;                 // ease into clusters
  const T_HOLD = 6.0;                   // constellations held
  const DRIFT_RADIUS = 6.0;             // radius of the drifting cloud
  const CLUSTER_RING = 3.7;             // ring radius the four clusters sit on
  const CLUSTER_SIGMA = 1.35;           // spread of each cluster blob
  const LINES_PER_CLUSTER = 12;         // sampled members joined by constellation lines
  const CAM_R = 13.0;                   // camera orbit radius
  const BG = 0x100C14;                  // desert night
  const HUES = [0x3EC8B4, 0xC94F5E, 0xE4C590, 0x8A84A0]; // one hue per poet

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.012);

  const px = ctx.renderer.getPixelRatio();
  const group = new THREE.Group();
  ctx.scene.add(group);

  // Known-good simplex noise + curl, used for the analytic drift field.
  const NOISE = `
  vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
              i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }
  vec3 curl(vec3 p){
    const float e = 0.1;
    float n1 = snoise(vec3(p.x, p.y + e, p.z));
    float n2 = snoise(vec3(p.x, p.y - e, p.z));
    float n3 = snoise(vec3(p.x, p.y, p.z + e));
    float n4 = snoise(vec3(p.x, p.y, p.z - e));
    float n5 = snoise(vec3(p.x + e, p.y, p.z));
    float n6 = snoise(vec3(p.x - e, p.y, p.z));
    float x = n2 - n1 - n4 + n3;
    float y = n4 - n3 - n6 + n5;
    float z = n6 - n5 - n2 + n1;
    return normalize(vec3(x, y, z));
  }`;

  // Glyph atlas: four abstract calligraphic stroke marks on a 2x2 grid.
  function makeGlyphAtlas() {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const g = c.getContext('2d');
    g.clearRect(0, 0, 128, 128);
    g.strokeStyle = 'rgba(255,255,255,0.95)';
    g.fillStyle = 'rgba(255,255,255,0.9)';
    g.lineCap = 'round';
    g.shadowColor = 'rgba(255,255,255,0.8)';
    g.shadowBlur = 4;
    const cells = [[0, 0], [64, 0], [0, 64], [64, 64]];
    for (let k = 0; k < 4; k++) {
      const ox = cells[k][0], oy = cells[k][1];
      g.save();
      g.translate(ox + 32, oy + 32);
      g.rotate(k * 0.7 - 0.4);
      g.lineWidth = 3.2;
      g.beginPath();
      g.moveTo(-16, 6);
      g.bezierCurveTo(-8, -14, 6, -10 + k * 3, 16, 2 - k * 2);
      g.stroke();
      g.lineWidth = 2.2;
      g.beginPath();
      g.moveTo(-10, 12);
      g.quadraticCurveTo(2, 16 - k * 4, 14, 10);
      g.stroke();
      g.beginPath();
      g.arc(8 - k * 4, -12, 2.2, 0, Math.PI * 2);
      g.fill();
      g.restore();
    }
    const tex = new THREE.CanvasTexture(c);
    return tex;
  }

  // Verse particle geometry: position = drift base, aCluster = per-cycle target.
  const pos = new Float32Array(COUNT * 3);
  const aCluster = new Float32Array(COUNT * 3);
  const aSeed = new Float32Array(COUNT);
  const aPhase = new Float32Array(COUNT);
  const aCid = new Float32Array(COUNT);
  for (let i = 0; i < COUNT; i++) {
    // rejection-free ball sample, flattened slightly on y
    const u = Math.random(), v = Math.random(), w = Math.random();
    const r = DRIFT_RADIUS * Math.cbrt(u);
    const th = v * Math.PI * 2, ph = Math.acos(2 * w - 1);
    pos[i * 3] = r * Math.sin(ph) * Math.cos(th);
    pos[i * 3 + 1] = r * Math.cos(ph) * 0.7;
    pos[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
    aSeed[i] = Math.random() * 100;
    aPhase[i] = Math.random();
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('aCluster', new THREE.Float32BufferAttribute(aCluster, 3));
  geo.setAttribute('aSeed', new THREE.Float32BufferAttribute(aSeed, 1));
  geo.setAttribute('aPhase', new THREE.Float32BufferAttribute(aPhase, 1));
  geo.setAttribute('aCid', new THREE.Float32BufferAttribute(aCid, 1));

  const uniforms = {
    uTime: { value: 0 },
    uMix: { value: 0 },
    uPx: { value: px },
    uMap: { value: makeGlyphAtlas() },
    uCol0: { value: new THREE.Color(HUES[0]) },
    uCol1: { value: new THREE.Color(HUES[1]) },
    uCol2: { value: new THREE.Color(HUES[2]) },
    uCol3: { value: new THREE.Color(HUES[3]) },
    uSand: { value: new THREE.Color(0xE4C590) },
    uDim: { value: new THREE.Color(0x8A84A0) }
  };

  const verseMat = new THREE.ShaderMaterial({
    uniforms: uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      uniform float uTime;
      uniform float uMix;
      uniform float uPx;
      uniform vec3 uCol0; uniform vec3 uCol1; uniform vec3 uCol2; uniform vec3 uCol3;
      uniform vec3 uSand; uniform vec3 uDim;
      attribute vec3 aCluster;
      attribute float aSeed;
      attribute float aPhase;
      attribute float aCid;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vGlyph;
      ${NOISE}
      void main(){
        // per-particle staggered ease between drift and cluster states
        float m = smoothstep(0.0, 1.0, clamp(uMix * 1.35 - aPhase * 0.35, 0.0, 1.0));
        vec3 drift = position + curl(position * 0.13 + vec3(0.0, uTime * 0.025, uTime * 0.016)) * 1.4;
        vec3 cpos = aCluster + vec3(
          sin(uTime * 0.50 + aSeed * 9.1),
          cos(uTime * 0.42 + aSeed * 7.3),
          sin(uTime * 0.47 + aSeed * 5.7)) * 0.045;
        vec3 p = mix(drift, cpos, m);
        float tw = 0.6 + 0.4 * sin(uTime * (0.6 + fract(aSeed * 3.7)) + aSeed * 20.0);
        vec3 cc = uCol0;
        if (aCid > 0.5) cc = uCol1;
        if (aCid > 1.5) cc = uCol2;
        if (aCid > 2.5) cc = uCol3;
        vec3 dcol = mix(uDim, uSand, fract(aSeed * 7.31)) * (0.55 + 0.45 * tw);
        vColor = mix(dcol, cc * (0.85 + 0.30 * tw), m);
        vAlpha = 0.45 + 0.30 * tw - 0.24 * m;
        vGlyph = floor(fract(aSeed * 13.7) * 4.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = uPx * (2.3 + 0.3 * m + 0.8 * tw) * (100.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform sampler2D uMap;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vGlyph;
      void main(){
        vec2 cell = vec2(mod(vGlyph, 2.0), floor(vGlyph * 0.5));
        vec2 uv = gl_PointCoord * 0.5 + cell * 0.5;
        float a = texture2D(uMap, uv).a * vAlpha;
        if (a < 0.02) discard;
        gl_FragColor = vec4(vColor, a);
      }`
  });

  const verses = new THREE.Points(geo, verseMat);
  group.add(verses);

  // Constellation lines: nearest-neighbor links among sampled cluster members.
  const MAX_SEG = CLUSTERS * LINES_PER_CLUSTER;
  const linePos = new Float32Array(MAX_SEG * 2 * 3);
  const lineCol = new Float32Array(MAX_SEG * 2 * 3);
  const lineGeo = new THREE.BufferGeometry();
  // BufferAttribute keeps these as the live arrays reassignClusters writes into
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol, 3));
  const lineMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const lines = new THREE.LineSegments(lineGeo, lineMat);
  lines.frustumCulled = false; // rebuilt every cycle
  group.add(lines);

  // Faint halo billboards, one per cluster.
  function makeHaloTexture() {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(64, 64, 0, 64, 64, 64);
    grad.addColorStop(0, 'rgba(255,255,255,0.55)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0.16)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  }
  const haloTex = makeHaloTexture();
  const quad = new THREE.BufferGeometry();
  quad.setAttribute('position', new THREE.Float32BufferAttribute(
    [-0.5, -0.5, 0, 0.5, -0.5, 0, 0.5, 0.5, 0, -0.5, 0.5, 0], 3));
  quad.setAttribute('uv', new THREE.Float32BufferAttribute(
    [0, 0, 1, 0, 1, 1, 0, 1], 2));
  quad.setIndex([0, 1, 2, 0, 2, 3]);
  const halos = [];
  for (let k = 0; k < CLUSTERS; k++) {
    const m = new THREE.MeshBasicMaterial({
      map: haloTex, color: new THREE.Color(HUES[k]),
      transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    const h = new THREE.Mesh(quad, m);
    h.scale.setScalar(CLUSTER_SIGMA * 5.2);
    group.add(h);
    halos.push(h);
  }

  // Poet tags, one per cluster; repositioned each cycle, faded with formation.
  const poetTags = [];
  for (let k = 0; k < CLUSTERS; k++) {
    const tag = ctx.makeTag('poet ' + (k + 1), '#' + new THREE.Color(HUES[k]).getHexString(), 0.5);
    tag.material.opacity = 0;
    group.add(tag);
    poetTags.push(tag);
  }

  // Cluster assignment, refreshed every cycle while fully dispersed.
  const centers = [];
  for (let k = 0; k < CLUSTERS; k++) centers.push(new THREE.Vector3());
  const clusterHues = [];
  for (let k = 0; k < CLUSTERS; k++) clusterHues.push(new THREE.Color(HUES[k]));
  let assignedCycle = -1;

  function gauss() { return (Math.random() + Math.random() + Math.random()) / 1.5 - 1; }

  function reassignClusters() {
    const baseA = Math.random() * Math.PI * 2;
    for (let k = 0; k < CLUSTERS; k++) {
      const a = baseA + k * (Math.PI * 2 / CLUSTERS) + (Math.random() - 0.5) * 0.5;
      const rr = CLUSTER_RING + (Math.random() - 0.5) * 0.9;
      centers[k].set(Math.cos(a) * rr, (Math.random() - 0.5) * 2.2, Math.sin(a) * rr);
    }
    const off = Math.floor(Math.random() * CLUSTERS);
    const cl = geo.getAttribute('aCluster');
    const cid = geo.getAttribute('aCid');
    for (let i = 0; i < COUNT; i++) {
      const k = (i + off) % CLUSTERS;
      cid.array[i] = k;
      cl.array[i * 3] = centers[k].x + gauss() * CLUSTER_SIGMA;
      cl.array[i * 3 + 1] = centers[k].y + gauss() * CLUSTER_SIGMA * 0.65;
      cl.array[i * 3 + 2] = centers[k].z + gauss() * CLUSTER_SIGMA;
    }
    cl.needsUpdate = true;
    cid.needsUpdate = true;

    // rebuild constellation lines from a sample of each cluster
    let seg = 0;
    for (let k = 0; k < CLUSTERS; k++) {
      const sx = [], sy = [], sz = [];
      for (let i = 0; i < COUNT && sx.length < LINES_PER_CLUSTER; i++) {
        if (cid.array[i] === k && (i % 17) === 0) {
          sx.push(cl.array[i * 3]); sy.push(cl.array[i * 3 + 1]); sz.push(cl.array[i * 3 + 2]);
        }
      }
      const col = clusterHues[k];
      const used = [];
      for (let a = 0; a < sx.length; a++) {
        let best = -1, bd = 1e9;
        for (let b = 0; b < sx.length; b++) {
          if (b === a) continue;
          const dx = sx[a] - sx[b], dy = sy[a] - sy[b], dz = sz[a] - sz[b];
          const d2 = dx * dx + dy * dy + dz * dz;
          if (d2 < bd) { bd = d2; best = b; }
        }
        if (best < 0) continue;
        // skip mutual duplicates and overlong links so each cluster
        // reads as a constellation of short strokes, not a tangle
        const key = Math.min(a, best) * LINES_PER_CLUSTER + Math.max(a, best);
        if (used.indexOf(key) >= 0 || bd > CLUSTER_SIGMA * CLUSTER_SIGMA * 2.6) continue;
        used.push(key);
        const o = seg * 6;
        linePos[o] = sx[a]; linePos[o + 1] = sy[a]; linePos[o + 2] = sz[a];
        linePos[o + 3] = sx[best]; linePos[o + 4] = sy[best]; linePos[o + 5] = sz[best];
        for (let vtx = 0; vtx < 2; vtx++) {
          // lifted above 1.0 so the links cut through the additive glyph glow
          lineCol[o + vtx * 3] = col.r * 1.5 + 0.3;
          lineCol[o + vtx * 3 + 1] = col.g * 1.5 + 0.3;
          lineCol[o + vtx * 3 + 2] = col.b * 1.5 + 0.3;
        }
        seg++;
      }
      halos[k].position.copy(centers[k]);
      poetTags[k].position.set(centers[k].x, centers[k].y + CLUSTER_SIGMA * 1.5, centers[k].z);
    }
    lineGeo.getAttribute('position').needsUpdate = true;
    lineGeo.getAttribute('color').needsUpdate = true;
    lineGeo.setDrawRange(0, seg * 2);
  }
  reassignClusters();
  assignedCycle = 0;

  ctx.camera.position.set(0, 1.5, CAM_R);
  ctx.camera.lookAt(0, 0, 0);

  function smooth01(x) { return x <= 0 ? 0 : x >= 1 ? 1 : x * x * (3 - 2 * x); }

  return {
    update(t) {
      uniforms.uTime.value = t;
      const cycleIdx = Math.floor(t / CYCLE);
      const phase = t - cycleIdx * CYCLE;

      // gather-hold-release envelope
      let mixVal;
      if (phase < T_DRIFT) mixVal = 0;
      else if (phase < T_DRIFT + T_GATHER) mixVal = smooth01((phase - T_DRIFT) / T_GATHER);
      else if (phase < T_DRIFT + T_GATHER + T_HOLD) mixVal = 1;
      else mixVal = 1 - smooth01((phase - T_DRIFT - T_GATHER - T_HOLD) / (CYCLE - T_DRIFT - T_GATHER - T_HOLD));
      uniforms.uMix.value = mixVal;

      // re-cluster while fully dispersed, once per cycle
      if (phase < T_DRIFT && assignedCycle !== cycleIdx) {
        reassignClusters();
        assignedCycle = cycleIdx;
      }

      // constellation lines ignite the moment clusters complete, then settle
      const formedFor = Math.max(0, phase - (T_DRIFT + T_GATHER));
      const ignite = smooth01((mixVal - 0.86) / 0.14);
      lineMat.opacity = ignite * (0.5 + 0.4 * Math.exp(-formedFor * 1.4));

      group.rotation.y = t * 0.015;

      // halos breathe with the formation; billboard in group-local space
      // (cancel the parent group rotation so they always face the camera)
      for (let k = 0; k < CLUSTERS; k++) {
        halos[k].material.opacity = ignite * (0.17 + 0.04 * Math.sin(t * 0.7 + k * 1.7));
        halos[k].quaternion.copy(group.quaternion).invert().multiply(ctx.camera.quaternion);
        poetTags[k].material.opacity = smooth01((mixVal - 0.7) / 0.3) * 0.9;
      }

      // live caption follows the cycle envelope
      let cap;
      if (phase < T_DRIFT) cap = 'Verse embeddings drift unclassified in embedding space';
      else if (phase < T_DRIFT + T_GATHER) cap = 'The classifier pulls each verse toward its poet';
      else if (phase < T_DRIFT + T_GATHER + T_HOLD) cap = 'Four poets, four constellations';
      else cap = 'Released: the verses scatter and the next batch drifts in';
      ctx.caption(cap);

      const a = t * 0.05 + ctx.pointer.x * 0.35;
      ctx.camera.position.set(
        Math.sin(a) * CAM_R,
        1.5 + ctx.pointer.y * 1.2 + Math.sin(t * 0.11) * 0.3,
        Math.cos(a) * CAM_R);
      ctx.camera.lookAt(0, 0, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

/* Live phase caption: scenes call ctx.caption('...') each frame; the text
   only touches the DOM when it changes, with a quick cross-fade. */
const lblPhase = document.getElementById('lblPhase');
let capText = null, capTimer = 0;
ctx.caption = (s) => {
  if (s === capText || !lblPhase) return;
  capText = s;
  lblPhase.style.opacity = '0';
  clearTimeout(capTimer);
  capTimer = setTimeout(() => {
    lblPhase.textContent = capText;
    lblPhase.style.opacity = '1';
  }, 180);
};

/* Small floating text tag rendered to a canvas texture, for labelling
   objects inside the 3D scene. Returns a sprite; scale is world height. */
ctx.makeTag = (text, color, h = 0.42) => {
  const pad = 18, fpx = 46;
  const meas = document.createElement('canvas').getContext('2d');
  meas.font = '600 ' + fpx + 'px ui-monospace, Menlo, Consolas, monospace';
  const tw = Math.ceil(meas.measureText(text).width);
  const cw = tw + pad * 2, ch = fpx + pad * 2;
  const cnv = document.createElement('canvas');
  cnv.width = cw; cnv.height = ch;
  const g = cnv.getContext('2d');
  g.font = meas.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = color; g.shadowBlur = 14;
  g.fillStyle = color;
  g.fillText(text, cw / 2, ch / 2 + 2);
  g.shadowBlur = 0;
  g.fillText(text, cw / 2, ch / 2 + 2);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: false,
  }));
  spr.scale.set(h * cw / ch, h, 1);
  spr.renderOrder = 20;
  return spr;
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'balochi-poet-classifier-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

/* Always autoplay; the Pause button is the opt-out. */
loop(performance.now());
</script>
</body>
</html>
