<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#071013">
  <title>WebGL Terrain Explorer in 3D · Salman Adnan</title>
  <meta name="description" content="Wireframe Ridge Flight: an interactive 3D study of endless procedural terrain in glowing wireframe.">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../assets/favicon.png" sizes="any">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #071013;
      overflow: hidden;
      font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: rgba(255, 255, 255, 0.85);
    }
    #stage { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    canvas:focus-visible { box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6); }
    #hud {
      position: absolute; right: 12px; bottom: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 999px;
      background: rgba(8, 8, 14, 0.55);
      backdrop-filter: blur(6px);
      opacity: 0.55; transition: opacity 0.25s ease;
    }
    #hud:hover, #hud:focus-within { opacity: 1; }
    #hud button {
      appearance: none; border: 1px solid rgba(255, 255, 255, 0.25);
      background: transparent; color: inherit; font: inherit;
      padding: 3px 10px; border-radius: 999px; cursor: pointer;
    }
    #hud button:hover { border-color: rgba(255, 255, 255, 0.6); }
    #hud button:focus-visible, #hud input:focus-visible {
      outline: 2px solid #fff; outline-offset: 2px;
    }
    #hud label { display: flex; align-items: center; gap: 6px; }
    #hud input[type="range"] { width: 72px; accent-color: #D9A94E; }
    #note {
      position: absolute; left: 12px; bottom: 12px; max-width: 46ch;
      padding: 8px 12px; border-radius: 10px;
      background: rgba(8, 8, 14, 0.65);
    }
    #err {
      position: absolute; inset: 0; display: none;
      place-items: center; text-align: center; padding: 24px;
    }
    @media (max-width: 560px) {
      #hud label { display: none; }
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c" tabindex="0" aria-label="Animated endless flight over glowing wireframe ridges with contour bands and low fog."></canvas>
  <div id="hud" role="group" aria-label="Visualization controls">
    <button id="btnPlay" type="button" aria-pressed="false">Pause</button>
    <label for="speed">speed
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1"
             aria-label="Animation speed">
    </label>
    <button id="btnPng" type="button">Save PNG</button>
  </div>
  <p id="note" hidden>Motion is paused because your system prefers reduced motion.
     Press Play to animate.</p>
  <div id="err"><p>This visualization needs WebGL, which is unavailable here.<br>
     A screenshot of it lives on the project page.</p></div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================= scene: webgl-terrain-explorer ================= */
// Wireframe Ridge Flight
// Concept: an endless piloted flight over procedural ridged-FBM terrain, drawn twice:
// a near-black solid occluder pass under a glowing wireframe pass, so back faces hide
// and the structure reads as light. Gold contour bands slide across the slopes.
// Palette: bg deep pine #071013, wire cyan #6FC8D8, contour gold #D9A94E,
//          fog slate #14232B, peak white #EAF4F4. The original project is a raw-WebGL
//          terrain flyer; structure rendered as light is its purest aesthetic form.
// Signature: gold contour bands sliding across ridges as they rise out of the fog.

function createScene(THREE, ctx) {
  const Q = ctx.quality;

  // ---- tunables ----
  const SEG_X = Math.max(70, Math.floor(150 * Q));  // grid columns
  const SEG_Z = Math.max(96, Math.floor(200 * Q));  // grid rows along the flight axis
  const W = 120;         // terrain width, world units
  const D = 170;         // terrain depth, world units
  const AMP = 6.2;       // ridge height
  const FREQ = 0.030;    // noise frequency
  const FLY = 5.4;       // forward speed, units per second
  const BAND = 1.15;     // contour band interval in height units
  const DAY = 52.0;      // day-night hue breathing cycle, seconds
  const CAM_Y = 2.9;     // base camera height above the mesh origin
  const COL_WIRE_A = new THREE.Color(0x6FC8D8); // cool cyan wire
  const COL_WIRE_B = new THREE.Color(0x4EB8A0); // warmer teal wire (night side of the cycle)
  const COL_GOLD   = new THREE.Color(0xD9A94E); // contour bands
  const COL_FOG    = new THREE.Color(0x14232B); // valley fog slate
  const COL_PEAK   = new THREE.Color(0xEAF4F4); // white caps
  const COL_DEEP   = new THREE.Color(0x081116); // occluder body, just above the bg

  ctx.scene.background = new THREE.Color(0x071013);

  const NOISE = `
    vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}
    vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
    float snoise(vec3 v){
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute(permute(permute(
                i.z + vec4(0.0, i1.z, i2.z, 1.0))
              + i.y + vec4(0.0, i1.y, i2.y, 1.0))
              + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0) * 2.0 + 1.0;
      vec4 s1 = floor(b1) * 2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }
  `;

  // shared vertex shader: 3-octave ridged FBM heightfield, scrolled by uOffset
  const terrainVert = NOISE + `
    uniform vec2 uOffset;
    uniform float uAmp;
    uniform float uFreq;
    varying float vH;
    varying float vFog;
    varying float vEdge;
    void main() {
      vec2 wp = (position.xy + uOffset) * uFreq;
      float a = 0.55;
      float f = 1.0;
      float h = 0.0;
      for (int i = 0; i < 3; i++) {
        float n = snoise(vec3(wp * f, 3.7));
        n = 1.0 - abs(n);
        n = n * n;
        h += n * a;
        a *= 0.5;
        f *= 2.15;
      }
      h = pow(h, 1.5) * uAmp;
      vec3 p = position;
      p.z += h;
      vH = h;
      vEdge = 1.0 - smoothstep(46.0, 58.0, abs(position.x));
      vec4 world = modelMatrix * vec4(p, 1.0);
      vec4 mv = viewMatrix * world;
      vFog = clamp(1.0 - exp(-0.00048 * dot(mv.xyz, mv.xyz)), 0.0, 1.0);
      gl_Position = projectionMatrix * mv;
    }
  `;

  const occluderFrag = `
    uniform vec3 uDeep;
    uniform vec3 uFogC;
    uniform vec3 uBg;
    varying float vH;
    varying float vFog;
    varying float vEdge;
    void main() {
      vec3 col = mix(uDeep, uFogC, vFog);
      col = mix(uBg, col, vEdge);
      gl_FragColor = vec4(col, 1.0);
    }
  `;

  const wireFrag = `
    uniform vec3 uWireA;
    uniform vec3 uWireB;
    uniform float uDay;
    uniform vec3 uGold;
    uniform vec3 uFogC;
    uniform vec3 uWhite;
    uniform float uAmp;
    uniform float uBand;
    varying float vH;
    varying float vFog;
    varying float vEdge;
    void main() {
      vec3 wire = mix(uWireA, uWireB, uDay);
      float hn = clamp(vH / uAmp, 0.0, 1.1);
      vec3 col = wire * (0.35 + 0.9 * hn);
      float band = abs(fract(vH / uBand + 0.5) - 0.5) * uBand;
      float contour = 1.0 - smoothstep(0.02, 0.075, band);
      col = mix(col, uGold, contour * 0.85);
      float cap = smoothstep(0.76, 0.94, hn);
      col = mix(col, uWhite, cap * 0.8);
      col = mix(col, uFogC, vFog);
      float a = (1.0 - vFog * 0.88) * vEdge;
      gl_FragColor = vec4(col, a);
    }
  `;

  const uOffset = { value: new THREE.Vector2(0, 0) };
  const uDay = { value: 0 };

  const geo = new THREE.PlaneGeometry(W, D, SEG_X, SEG_Z);

  const occMat = new THREE.ShaderMaterial({
    vertexShader: terrainVert,
    fragmentShader: occluderFrag,
    uniforms: {
      uOffset: uOffset,
      uAmp: { value: AMP },
      uFreq: { value: FREQ },
      uDeep: { value: COL_DEEP },
      uFogC: { value: COL_FOG },
      uBg: { value: new THREE.Color(0x071013) },
    },
    polygonOffset: true,
    polygonOffsetFactor: 2,
    polygonOffsetUnits: 2,
  });
  const occluder = new THREE.Mesh(geo, occMat);
  occluder.rotation.x = -Math.PI / 2;
  occluder.position.set(0, -5, -8);
  occluder.frustumCulled = false;
  occluder.renderOrder = 0;
  ctx.scene.add(occluder);

  const wireMat = new THREE.ShaderMaterial({
    vertexShader: terrainVert,
    fragmentShader: wireFrag,
    uniforms: {
      uOffset: uOffset,
      uAmp: { value: AMP },
      uFreq: { value: FREQ },
      uDay: uDay,
      uWireA: { value: COL_WIRE_A },
      uWireB: { value: COL_WIRE_B },
      uGold: { value: COL_GOLD },
      uFogC: { value: COL_FOG },
      uWhite: { value: COL_PEAK },
      uBand: { value: BAND },
    },
    wireframe: true,
    transparent: true,
    depthWrite: false,
  });
  const wires = new THREE.Mesh(geo, wireMat);
  wires.rotation.x = -Math.PI / 2;
  wires.position.set(0, -5, -8);
  wires.frustumCulled = false;
  wires.renderOrder = 1;
  ctx.scene.add(wires);

  ctx.camera.position.set(0, CAM_Y, 70);
  ctx.camera.lookAt(0, CAM_Y - 2.6, 30);

  // flight state: steering is a smoothed target so banking feels piloted, not twitchy
  let offX = 0;
  let steerCur = 0;
  let roll = 0;

  return {
    update(t, dt) {
      const step = Math.min(dt || 0.016, 0.05);
      const steerTarget =
        ctx.pointer.x * 10 +
        Math.sin(t * 0.061) * 6 +
        Math.sin(t * 0.023 + 1.7) * 4;
      steerCur += (steerTarget - steerCur) * Math.min(1, step * 1.2);
      offX += steerCur * step * 0.6;
      uOffset.value.set(offX, t * FLY);
      uDay.value = 0.5 + 0.5 * Math.sin(t * 6.2831853 / DAY);

      const rollT = THREE.MathUtils.clamp(-steerCur * 0.028, -0.34, 0.34);
      roll += (rollT - roll) * Math.min(1, step * 2.0);

      const camY = CAM_Y + Math.sin(t * 0.23) * 0.45 + ctx.pointer.y * 0.9;
      ctx.camera.position.set(0, camY, 70);
      ctx.camera.lookAt(-steerCur * 0.55, camY - 2.6 + ctx.pointer.y * 2.0, 30);
      ctx.camera.rotateZ(roll);
    },
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'webgl-terrain-explorer-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
