<script type="module">
import * as THREE from 'three';

/* ================= scene: morse-code-converter ================= */
// SIGNAL BEACON, authentic Morse timing rippling out as light: the beacon
// pulses a word bank with true ITU proportions (dot 1, dash 3, intra-letter
// gap 1, letter gap 3, word gap 7), each element sends a ring down a lamp
// wire, and completed letters surface as glyphs at the far end. The timing
// is generated from a real Morse table; you could transcribe it.
// Palette: bg night harbor #0A101A, beacon amber #F2B441, ring pale #EAE4D0,
//   wire steel #5A6478, letter cyan #63BCD8. Signal-lamp amber over harbor
//   dark is Morse's native habitat.
// Signature: genuinely correct Morse timing you could transcribe.

function createScene(THREE, ctx) {
  const q = ctx.quality;

  // ---- tunables -----------------------------------------------------------
  const BG = 0x0A101A;          // night harbor
  const AMBER = 0xF2B441;       // beacon light
  const RING_COL = 0xEAE4D0;    // expanding pale rings
  const WIRE_COL = 0x5A6478;    // steel wire
  const LETTER_COL = 0x63BCD8;  // translated letter glyphs
  const UNIT = 0.3;             // one Morse unit, seconds (dot length)
  const ATTACK = 0.05;          // lamp turn-on ease
  const RELEASE = 0.07;         // lamp turn-off ease
  const WORDS = ['SIGNAL', 'HELLO', 'MORSE', 'LIGHT']; // rotating word bank
  const N_LAMPS = 24;           // lamps hanging along the wire
  const LAMP_LAG = 0.09;        // propagation delay per lamp, seconds
  const RING_POOL = 10;         // concurrent expanding rings
  const GLYPH_POOL = 5;         // concurrent floating letters
  const N_WIRE = 90;            // wire polyline samples
  const N_SUB = 84;             // subtitle ticker dots along the base
  const N_STARS = Math.max(80, Math.floor(220 * q)); // background stars

  const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
  const smooth = (a, b, v) => { const x = clamp((v - a) / (b - a), 0, 1); return x * x * (3 - 2 * x); };
  let seed = 60660;
  const rnd = () => { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let z = Math.imul(seed ^ seed >>> 15, 1 | seed); z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z; return ((z ^ z >>> 14) >>> 0) / 4294967296; };

  // ---- authentic Morse timeline ---------------------------------------------
  const MORSE = {
    A: '.-', E: '.', G: '--.', H: '....', I: '..', L: '.-..', M: '--',
    N: '-.', O: '---', R: '.-.', S: '...', T: '-'
  };
  // on-intervals {a, b, dash} and letter completion events {t, ch}
  const intervals = [];
  const letterEvents = [];
  let cur = UNIT * 4; // a beat of stillness before the first word
  for (const word of WORDS) {
    for (const ch of word) {
      const code = MORSE[ch];
      for (let s = 0; s < code.length; s++) {
        const dur = (code[s] === '-' ? 3 : 1) * UNIT;
        intervals.push({ a: cur, b: cur + dur, dash: code[s] === '-' });
        cur += dur;
        cur += UNIT;               // intra-letter gap: 1 unit
      }
      letterEvents.push({ t: cur, ch: ch });
      cur += UNIT * 2;             // letter gap: 3 units total
    }
    cur += UNIT * 4;               // word gap: 7 units total
  }
  const TOTAL = cur + UNIT * 2;    // loop length, with a final hush

  function wrap(x) { return ((x % TOTAL) + TOTAL) % TOTAL; }

  function signalAt(time) {
    const w = wrap(time);
    // binary search: last interval starting at or before w (plus release tail)
    let lo = 0, hi = intervals.length - 1, idx = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (intervals[mid].a <= w) { idx = mid; lo = mid + 1; } else hi = mid - 1;
    }
    if (idx < 0) return 0;
    const iv = intervals[idx];
    if (w > iv.b + RELEASE * 1.2) return 0;
    return smooth(iv.a, iv.a + ATTACK, w) * (1 - smooth(iv.b, iv.b + RELEASE, w));
  }

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.02);

  const amb = new THREE.AmbientLight(0x93a0b8, 0.7);
  ctx.scene.add(amb);

  // ---- sea and stars ----------------------------------------------------------
  const sea = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 30),
    new THREE.MeshBasicMaterial({ color: 0x0C1420 })
  );
  sea.rotation.x = -Math.PI / 2;
  sea.position.y = -2.75;
  ctx.scene.add(sea);

  const starPos = new Float32Array(N_STARS * 3);
  for (let i = 0; i < N_STARS; i++) {
    starPos[i * 3] = (rnd() - 0.5) * 46;
    starPos[i * 3 + 1] = rnd() * 12 + 0.5;
    starPos[i * 3 + 2] = -9 - rnd() * 10;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  const starMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(0x8fa0c0) }, uTime: { value: 0 } },
    vertexShader: [
      'uniform float uTime;',
      'varying float vTw;',
      'void main(){',
      '  vTw = 0.5 + 0.5 * sin(uTime * 0.7 + position.x * 5.0 + position.y * 3.0);',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = 30.0 / -mv.z;',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vTw;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.1, d) * (0.2 + 0.35 * vTw));',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(starGeo, starMat));

  // ---- the beacon ---------------------------------------------------------------
  const BEACON_X = -7, LAMP_Y = 1.5;
  const tower = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.24, 4.2, 12),
    new THREE.MeshBasicMaterial({ color: 0x232B3A })
  );
  tower.position.set(BEACON_X, -0.65, 0);
  ctx.scene.add(tower);

  const lampHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 20, 14),
    new THREE.MeshBasicMaterial({ color: AMBER, transparent: true, opacity: 0.12 })
  );
  lampHead.position.set(BEACON_X, LAMP_Y, 0);
  ctx.scene.add(lampHead);

  function glowSprite(hex, size) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
    const m = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: new THREE.Color(hex) }, uSize: { value: size }, uOp: { value: 0 } },
      vertexShader: [
        'uniform float uSize;',
        'void main(){',
        '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
        '  gl_PointSize = uSize * (140.0 / -mv.z);',
        '  gl_Position = projectionMatrix * mv;',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform vec3 uColor;',
        'uniform float uOp;',
        'void main(){',
        '  float d = length(gl_PointCoord - 0.5);',
        '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.02, d) * uOp);',
        '}'
      ].join('\n'),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const p = new THREE.Points(g, m);
    return { obj: p, mat: m };
  }
  const beaconGlow = glowSprite(AMBER, 5.2);
  beaconGlow.obj.position.set(BEACON_X, LAMP_Y, 0);
  ctx.scene.add(beaconGlow.obj);
  const seaGlow = glowSprite(AMBER, 6.5);
  seaGlow.obj.position.set(BEACON_X, -2.6, 0.5);
  ctx.scene.add(seaGlow.obj);

  // ---- expanding rings -------------------------------------------------------
  const rings = [];
  const ringGeo = new THREE.RingGeometry(0.3, 0.36, 48);
  for (let i = 0; i < RING_POOL; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: RING_COL, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(ringGeo, mat);
    mesh.position.set(BEACON_X, LAMP_Y, 0);
    mesh.visible = false;
    ctx.scene.add(mesh);
    rings.push({ mesh: mesh, mat: mat, life: 0, max: 1, dash: false });
  }
  let ringCursor = 0;
  function emitRing(dash) {
    const r = rings[ringCursor]; ringCursor = (ringCursor + 1) % RING_POOL;
    r.max = dash ? 2.6 : 2.0;
    r.life = r.max; r.dash = dash;
    r.mesh.visible = true;
  }

  // ---- the lamp wire -----------------------------------------------------------
  const WIRE_X0 = BEACON_X + 0.25, WIRE_Y0 = LAMP_Y + 0.1;
  const WIRE_X1 = 9.6, WIRE_Y1 = 2.5, SAG = 1.35, DROP = 0.42;
  function wirePoint(u, swayAmp, out) {
    out.x = WIRE_X0 + (WIRE_X1 - WIRE_X0) * u;
    out.y = WIRE_Y0 + (WIRE_Y1 - WIRE_Y0) * u - SAG * 4 * u * (1 - u);
    out.z = Math.sin(Math.PI * u) * swayAmp;
    return out;
  }
  const wirePos = new Float32Array(N_WIRE * 3);
  const wireGeo = new THREE.BufferGeometry();
  wireGeo.setAttribute('position', new THREE.Float32BufferAttribute(wirePos, 3));
  const wireLine = new THREE.Line(wireGeo, new THREE.LineBasicMaterial({ color: WIRE_COL, transparent: true, opacity: 0.5 }));
  ctx.scene.add(wireLine);

  const dropPos = new Float32Array(N_LAMPS * 6);
  const dropGeo = new THREE.BufferGeometry();
  dropGeo.setAttribute('position', new THREE.Float32BufferAttribute(dropPos, 3));
  const dropLines = new THREE.LineSegments(dropGeo, new THREE.LineBasicMaterial({ color: WIRE_COL, transparent: true, opacity: 0.4 }));
  ctx.scene.add(dropLines);

  const lampMesh = new THREE.InstancedMesh(
    new THREE.SphereGeometry(0.085, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    N_LAMPS
  );
  const cSteel = new THREE.Color(0x39404E), cAmber = new THREE.Color(AMBER), cTmp = new THREE.Color();
  const m4 = new THREE.Matrix4();
  for (let i = 0; i < N_LAMPS; i++) lampMesh.setColorAt(i, cSteel);
  lampMesh.instanceColor.needsUpdate = true;
  ctx.scene.add(lampMesh);

  // additive halo for each lamp, brightness in an attribute
  const haloPos = new Float32Array(N_LAMPS * 3);
  const haloB = new Float32Array(N_LAMPS);
  const haloGeo = new THREE.BufferGeometry();
  haloGeo.setAttribute('position', new THREE.Float32BufferAttribute(haloPos, 3));
  haloGeo.setAttribute('aBright', new THREE.Float32BufferAttribute(haloB, 1));
  const haloMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(AMBER) } },
    vertexShader: [
      'attribute float aBright;',
      'varying float vB;',
      'void main(){',
      '  vB = aBright;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = (0.4 + 1.4 * aBright) * (140.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vB;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.05, d) * vB * 0.85);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(haloGeo, haloMat));

  // ---- subtitle ticker along the base -----------------------------------------
  const subPos = new Float32Array(N_SUB * 3);
  const subB = new Float32Array(N_SUB);
  for (let i = 0; i < N_SUB; i++) {
    subPos[i * 3] = -5.4 + (i / (N_SUB - 1)) * 14.4;
    subPos[i * 3 + 1] = -2.55;
    subPos[i * 3 + 2] = 2.4;
  }
  const subGeo = new THREE.BufferGeometry();
  subGeo.setAttribute('position', new THREE.Float32BufferAttribute(subPos, 3));
  subGeo.setAttribute('aBright', new THREE.Float32BufferAttribute(subB, 1));
  const subMat = haloMat.clone();
  subMat.uniforms.uColor.value = new THREE.Color(RING_COL);
  ctx.scene.add(new THREE.Points(subGeo, subMat));

  // ---- floating letter glyphs at the far end ----------------------------------
  const glyphTex = {};
  function texFor(ch) {
    if (glyphTex[ch]) return glyphTex[ch];
    const cv = document.createElement('canvas');
    cv.width = 96; cv.height = 96;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, 96, 96);
    g.font = '600 64px "Courier New", monospace';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillStyle = '#BFE8F5';
    g.fillText(ch, 48, 52);
    const tx = new THREE.CanvasTexture(cv);
    glyphTex[ch] = tx;
    return tx;
  }
  const glyphs = [];
  for (let i = 0; i < GLYPH_POOL; i++) {
    const mat = new THREE.MeshBasicMaterial({
      transparent: true, opacity: 0, depthWrite: false,
      color: LETTER_COL, blending: THREE.AdditiveBlending
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), mat);
    mesh.visible = false;
    ctx.scene.add(mesh);
    glyphs.push({ mesh: mesh, mat: mat, life: 0, max: 3.2, drift: 0 });
  }
  let glyphCursor = 0;
  function spawnGlyph(ch) {
    const gl = glyphs[glyphCursor]; glyphCursor = (glyphCursor + 1) % GLYPH_POOL;
    gl.mat.map = texFor(ch);
    gl.mat.needsUpdate = true;
    gl.mesh.position.set(WIRE_X1 - 0.4, WIRE_Y1 - DROP - 0.5, 0.2);
    gl.drift = (rnd() - 0.5) * 0.3;
    gl.life = gl.max;
    gl.mesh.visible = true;
  }

  const WIRE_DELAY = N_LAMPS * LAMP_LAG + 0.2; // beacon-to-far-end travel time
  let prevPhase = wrap(-0.0001);
  let prevArrive = wrap(-WIRE_DELAY - 0.0001);
  const tmpV = new THREE.Vector3();

  ctx.camera.position.set(1.2, 0.7, 12.6);
  ctx.camera.lookAt(1.2, 0.3, 0);

  function update(t, dt) {
    dt = clamp(dt, 0, 0.05);
    const phase = wrap(t);
    const sig = signalAt(t);

    // beacon light follows the true Morse envelope
    lampHead.material.opacity = 0.12 + 0.88 * sig;
    beaconGlow.mat.uniforms.uOp.value = 0.12 + 0.75 * sig;
    seaGlow.mat.uniforms.uOp.value = 0.05 + 0.22 * sig;

    // emit a ring at each element onset (handles the loop wrap)
    for (const iv of intervals) {
      const crossed = prevPhase < phase
        ? (iv.a > prevPhase && iv.a <= phase)
        : (iv.a > prevPhase || iv.a <= phase);
      if (crossed) emitRing(iv.dash);
    }
    prevPhase = phase;

    // rings expand and fade
    for (const r of rings) {
      if (r.life <= 0) { if (r.mesh.visible) r.mesh.visible = false; continue; }
      r.life -= dt;
      const u = 1 - r.life / r.max;
      const s = 1 + u * (r.dash ? 16 : 11);
      r.mesh.scale.setScalar(s);
      r.mat.opacity = (1 - u) * (1 - u) * 0.55;
    }

    // wire sway: pointer pushes it, plus a slow idle breath
    const swayAmp = ctx.pointer.x * 0.9 + Math.sin(t * 0.4) * 0.12;
    const wp = wireGeo.attributes.position.array;
    for (let i = 0; i < N_WIRE; i++) {
      wirePoint(i / (N_WIRE - 1), swayAmp, tmpV);
      wp[i * 3] = tmpV.x; wp[i * 3 + 1] = tmpV.y; wp[i * 3 + 2] = tmpV.z;
    }
    wireGeo.attributes.position.needsUpdate = true;

    // lamps: each shows the signal delayed by its place on the wire
    const dp = dropGeo.attributes.position.array;
    const hp = haloGeo.attributes.position.array;
    const hb = haloGeo.attributes.aBright.array;
    for (let i = 0; i < N_LAMPS; i++) {
      const u = (i + 1) / (N_LAMPS + 1);
      wirePoint(u, swayAmp, tmpV);
      const lx = tmpV.x, ly = tmpV.y - DROP, lz = tmpV.z;
      dp[i * 6] = tmpV.x; dp[i * 6 + 1] = tmpV.y; dp[i * 6 + 2] = tmpV.z;
      dp[i * 6 + 3] = lx; dp[i * 6 + 4] = ly; dp[i * 6 + 5] = lz;
      m4.makeTranslation(lx, ly, lz);
      lampMesh.setMatrixAt(i, m4);
      const b = signalAt(t - (i + 1) * LAMP_LAG);
      cTmp.copy(cSteel).lerp(cAmber, b);
      lampMesh.setColorAt(i, cTmp);
      hp[i * 3] = lx; hp[i * 3 + 1] = ly; hp[i * 3 + 2] = lz;
      hb[i] = b;
    }
    dropGeo.attributes.position.needsUpdate = true;
    haloGeo.attributes.position.needsUpdate = true;
    haloGeo.attributes.aBright.needsUpdate = true;
    lampMesh.instanceMatrix.needsUpdate = true;
    lampMesh.instanceColor.needsUpdate = true;

    // completed letters materialize once the pulse train has crossed the wire
    const arrive = wrap(t - WIRE_DELAY);
    for (const ev of letterEvents) {
      const crossed = prevArrive < arrive
        ? (ev.t > prevArrive && ev.t <= arrive)
        : (ev.t > prevArrive || ev.t <= arrive);
      if (crossed) spawnGlyph(ev.ch);
    }
    prevArrive = arrive;

    for (const gl of glyphs) {
      if (gl.life <= 0) { if (gl.mesh.visible) gl.mesh.visible = false; continue; }
      gl.life -= dt;
      const u = 1 - gl.life / gl.max;
      gl.mesh.position.y += dt * 0.45;
      gl.mesh.position.x += gl.drift * dt;
      gl.mesh.quaternion.copy(ctx.camera.quaternion);
      gl.mat.opacity = smooth(0, 0.12, u) * (1 - smooth(0.6, 1, u));
    }

    // subtitle ticker: the same signal, streamed across the base
    const sb = subGeo.attributes.aBright.array;
    for (let i = 0; i < N_SUB; i++) {
      sb[i] = signalAt(t - i * 0.06) * 0.5;
    }
    subGeo.attributes.aBright.needsUpdate = true;

    starMat.uniforms.uTime.value = t;

    // quiet camera with pointer parallax
    const px = 1.2 + ctx.pointer.x * 0.8;
    const py = 0.7 + ctx.pointer.y * 0.7;
    ctx.camera.position.x += (px - ctx.camera.position.x) * (1 - Math.exp(-dt * 2.5));
    ctx.camera.position.y += (py - ctx.camera.position.y) * (1 - Math.exp(-dt * 2.5));
    ctx.camera.lookAt(1.2, 0.3, 0);
  }

  return { update };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');
const note = document.getElementById('note');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  note.hidden = true;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'morse-code-converter-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

if (reduceMotion) {
  /* Advance to a composed moment, render one still frame, and wait. */
  for (let i = 0; i < 240; i++) { t += 1 / 60; piece.update(t, 1 / 60); }
  renderer.render(ctx.scene, camera);
  userPaused = true;
  note.hidden = false;
  setPlayUi();
} else {
  loop(performance.now());
}
</script>
</body>
</html>
