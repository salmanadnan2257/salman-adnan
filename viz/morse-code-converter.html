<script type="module">
import * as THREE from 'three';

/* ================= scene: morse-code-converter ================= */
// SIGNAL BEACON, authentic Morse timing rippling out as light: the beacon
// pulses a word bank with true ITU proportions (dot 1, dash 3, intra-letter
// gap 1, letter gap 3, word gap 7), each element sends a ring down a lamp
// wire, and completed letters surface as glyphs at the far end. The timing
// is generated from a real Morse table; you could transcribe it.
// Palette: bg night harbor #0A101A, beacon amber #F2B441, ring pale #EAE4D0,
//   wire steel #5A6478, letter cyan #63BCD8. Signal-lamp amber over harbor
//   dark is Morse's native habitat.
// Signature: genuinely correct Morse timing you could transcribe.

function createScene(THREE, ctx) {
  const q = ctx.quality;

  // ---- tunables -----------------------------------------------------------
  const BG = 0x0A101A;          // night harbor
  const AMBER = 0xF2B441;       // beacon light
  const RING_COL = 0xEAE4D0;    // expanding pale rings
  const WIRE_COL = 0x5A6478;    // steel wire
  const LETTER_COL = 0x63BCD8;  // translated letter glyphs
  const UNIT = 0.3;             // one Morse unit, seconds (dot length)
  const ATTACK = 0.05;          // lamp turn-on ease
  const RELEASE = 0.07;         // lamp turn-off ease
  const WORDS = ['SIGNAL', 'HELLO', 'MORSE', 'LIGHT']; // rotating word bank
  const N_LAMPS = 24;           // lamps hanging along the wire
  const LAMP_LAG = 0.09;        // propagation delay per lamp, seconds
  const RING_POOL = 10;         // concurrent expanding rings
  const GLYPH_POOL = 5;         // concurrent floating letters
  const N_WIRE = 90;            // wire polyline samples
  const N_SUB = 84;             // subtitle ticker dots along the base
  const N_STARS = Math.max(80, Math.floor(220 * q)); // background stars

  const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
  const smooth = (a, b, v) => { const x = clamp((v - a) / (b - a), 0, 1); return x * x * (3 - 2 * x); };
  let seed = 60660;
  const rnd = () => { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let z = Math.imul(seed ^ seed >>> 15, 1 | seed); z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z; return ((z ^ z >>> 14) >>> 0) / 4294967296; };

  // ---- authentic Morse timeline ---------------------------------------------
  const MORSE = {
    A: '.-', E: '.', G: '--.', H: '....', I: '..', L: '.-..', M: '--',
    N: '-.', O: '---', R: '.-.', S: '...', T: '-'
  };
  // on-intervals {a, b, dash}, letter completion events {t, ch},
  // and per-word spans {word, a, b, evs} for the live caption
  const intervals = [];
  const letterEvents = [];
  const wordSpans = [];
  let cur = UNIT * 4; // a beat of stillness before the first word
  for (const word of WORDS) {
    const span = { word: word, a: cur, b: cur, evs: [] };
    for (const ch of word) {
      const code = MORSE[ch];
      for (let s = 0; s < code.length; s++) {
        const dur = (code[s] === '-' ? 3 : 1) * UNIT;
        intervals.push({ a: cur, b: cur + dur, dash: code[s] === '-' });
        cur += dur;
        cur += UNIT;               // intra-letter gap: 1 unit
      }
      letterEvents.push({ t: cur, ch: ch });
      span.evs.push(cur);
      span.b = cur;
      cur += UNIT * 2;             // letter gap: 3 units total
    }
    wordSpans.push(span);
    cur += UNIT * 4;               // word gap: 7 units total
  }
  const TOTAL = cur + UNIT * 2;    // loop length, with a final hush

  function wrap(x) { return ((x % TOTAL) + TOTAL) % TOTAL; }

  function signalAt(time) {
    const w = wrap(time);
    // binary search: last interval starting at or before w (plus release tail)
    let lo = 0, hi = intervals.length - 1, idx = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (intervals[mid].a <= w) { idx = mid; lo = mid + 1; } else hi = mid - 1;
    }
    if (idx < 0) return 0;
    const iv = intervals[idx];
    if (w > iv.b + RELEASE * 1.2) return 0;
    return smooth(iv.a, iv.a + ATTACK, w) * (1 - smooth(iv.b, iv.b + RELEASE, w));
  }

  ctx.scene.background = new THREE.Color(BG);
  ctx.scene.fog = new THREE.FogExp2(BG, 0.02);

  const amb = new THREE.AmbientLight(0x93a0b8, 0.7);
  ctx.scene.add(amb);

  // ---- sea and stars ----------------------------------------------------------
  const sea = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 30),
    new THREE.MeshBasicMaterial({ color: 0x0C1420 })
  );
  sea.rotation.x = -Math.PI / 2;
  sea.position.y = -2.75;
  ctx.scene.add(sea);

  const starPos = new Float32Array(N_STARS * 3);
  for (let i = 0; i < N_STARS; i++) {
    starPos[i * 3] = (rnd() - 0.5) * 46;
    starPos[i * 3 + 1] = rnd() * 12 + 0.5;
    starPos[i * 3 + 2] = -9 - rnd() * 10;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  const starMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(0x8fa0c0) }, uTime: { value: 0 } },
    vertexShader: [
      'uniform float uTime;',
      'varying float vTw;',
      'void main(){',
      '  vTw = 0.5 + 0.5 * sin(uTime * 0.7 + position.x * 5.0 + position.y * 3.0);',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = 30.0 / -mv.z;',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vTw;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.1, d) * (0.2 + 0.35 * vTw));',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(starGeo, starMat));

  // ---- the beacon ---------------------------------------------------------------
  const BEACON_X = -7, LAMP_Y = 1.5;
  const tower = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.24, 4.2, 12),
    new THREE.MeshBasicMaterial({ color: 0x232B3A })
  );
  tower.position.set(BEACON_X, -0.65, 0);
  ctx.scene.add(tower);

  const lampHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 20, 14),
    new THREE.MeshBasicMaterial({ color: AMBER, transparent: true, opacity: 0.12 })
  );
  lampHead.position.set(BEACON_X, LAMP_Y, 0);
  ctx.scene.add(lampHead);

  function glowSprite(hex, size) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
    const m = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: new THREE.Color(hex) }, uSize: { value: size }, uOp: { value: 0 } },
      vertexShader: [
        'uniform float uSize;',
        'void main(){',
        '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
        '  gl_PointSize = uSize * (140.0 / -mv.z);',
        '  gl_Position = projectionMatrix * mv;',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform vec3 uColor;',
        'uniform float uOp;',
        'void main(){',
        '  float d = length(gl_PointCoord - 0.5);',
        '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.02, d) * uOp);',
        '}'
      ].join('\n'),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const p = new THREE.Points(g, m);
    return { obj: p, mat: m };
  }
  const beaconGlow = glowSprite(AMBER, 5.2);
  beaconGlow.obj.position.set(BEACON_X, LAMP_Y, 0);
  ctx.scene.add(beaconGlow.obj);
  const seaGlow = glowSprite(AMBER, 6.5);
  seaGlow.obj.position.set(BEACON_X, -2.6, 0.5);
  ctx.scene.add(seaGlow.obj);

  // ---- expanding rings -------------------------------------------------------
  const rings = [];
  const ringGeo = new THREE.RingGeometry(0.3, 0.36, 48);
  for (let i = 0; i < RING_POOL; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: RING_COL, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(ringGeo, mat);
    mesh.position.set(BEACON_X, LAMP_Y, 0);
    mesh.visible = false;
    ctx.scene.add(mesh);
    rings.push({ mesh: mesh, mat: mat, life: 0, max: 1, dash: false });
  }
  let ringCursor = 0;
  function emitRing(dash) {
    const r = rings[ringCursor]; ringCursor = (ringCursor + 1) % RING_POOL;
    r.max = dash ? 2.6 : 2.0;
    r.life = r.max; r.dash = dash;
    r.mesh.visible = true;
  }

  // ---- the lamp wire -----------------------------------------------------------
  const WIRE_X0 = BEACON_X + 0.25, WIRE_Y0 = LAMP_Y + 0.1;
  const WIRE_X1 = 9.6, WIRE_Y1 = 2.5, SAG = 1.35, DROP = 0.42;
  function wirePoint(u, swayAmp, out) {
    out.x = WIRE_X0 + (WIRE_X1 - WIRE_X0) * u;
    out.y = WIRE_Y0 + (WIRE_Y1 - WIRE_Y0) * u - SAG * 4 * u * (1 - u);
    out.z = Math.sin(Math.PI * u) * swayAmp;
    return out;
  }
  const wirePos = new Float32Array(N_WIRE * 3);
  const wireGeo = new THREE.BufferGeometry();
  wireGeo.setAttribute('position', new THREE.Float32BufferAttribute(wirePos, 3));
  const wireLine = new THREE.Line(wireGeo, new THREE.LineBasicMaterial({ color: WIRE_COL, transparent: true, opacity: 0.5 }));
  ctx.scene.add(wireLine);

  const dropPos = new Float32Array(N_LAMPS * 6);
  const dropGeo = new THREE.BufferGeometry();
  dropGeo.setAttribute('position', new THREE.Float32BufferAttribute(dropPos, 3));
  const dropLines = new THREE.LineSegments(dropGeo, new THREE.LineBasicMaterial({ color: WIRE_COL, transparent: true, opacity: 0.4 }));
  ctx.scene.add(dropLines);

  const lampMesh = new THREE.InstancedMesh(
    new THREE.SphereGeometry(0.085, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    N_LAMPS
  );
  const cSteel = new THREE.Color(0x39404E), cAmber = new THREE.Color(AMBER), cTmp = new THREE.Color();
  const m4 = new THREE.Matrix4();
  for (let i = 0; i < N_LAMPS; i++) lampMesh.setColorAt(i, cSteel);
  lampMesh.instanceColor.needsUpdate = true;
  ctx.scene.add(lampMesh);

  // additive halo for each lamp, brightness in an attribute
  const haloPos = new Float32Array(N_LAMPS * 3);
  const haloB = new Float32Array(N_LAMPS);
  const haloGeo = new THREE.BufferGeometry();
  haloGeo.setAttribute('position', new THREE.Float32BufferAttribute(haloPos, 3));
  haloGeo.setAttribute('aBright', new THREE.Float32BufferAttribute(haloB, 1));
  const haloMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(AMBER) } },
    vertexShader: [
      'attribute float aBright;',
      'varying float vB;',
      'void main(){',
      '  vB = aBright;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = (0.4 + 1.4 * aBright) * (140.0 / -mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor;',
      'varying float vB;',
      'void main(){',
      '  float d = length(gl_PointCoord - 0.5);',
      '  gl_FragColor = vec4(uColor, smoothstep(0.5, 0.05, d) * vB * 0.85);',
      '}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(haloGeo, haloMat));

  // ---- subtitle ticker along the base -----------------------------------------
  const subPos = new Float32Array(N_SUB * 3);
  const subB = new Float32Array(N_SUB);
  for (let i = 0; i < N_SUB; i++) {
    subPos[i * 3] = -5.4 + (i / (N_SUB - 1)) * 14.4;
    subPos[i * 3 + 1] = -2.55;
    subPos[i * 3 + 2] = 2.4;
  }
  const subGeo = new THREE.BufferGeometry();
  subGeo.setAttribute('position', new THREE.Float32BufferAttribute(subPos, 3));
  subGeo.setAttribute('aBright', new THREE.Float32BufferAttribute(subB, 1));
  const subMat = haloMat.clone();
  subMat.uniforms.uColor.value = new THREE.Color(RING_COL);
  ctx.scene.add(new THREE.Points(subGeo, subMat));

  // ---- floating letter glyphs at the far end ----------------------------------
  const glyphTex = {};
  function texFor(ch) {
    if (glyphTex[ch]) return glyphTex[ch];
    const cv = document.createElement('canvas');
    cv.width = 96; cv.height = 96;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, 96, 96);
    g.font = '600 64px "Courier New", monospace';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillStyle = '#BFE8F5';
    g.fillText(ch, 48, 52);
    const tx = new THREE.CanvasTexture(cv);
    glyphTex[ch] = tx;
    return tx;
  }
  const glyphs = [];
  for (let i = 0; i < GLYPH_POOL; i++) {
    const mat = new THREE.MeshBasicMaterial({
      transparent: true, opacity: 0, depthWrite: false,
      color: LETTER_COL, blending: THREE.AdditiveBlending
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), mat);
    mesh.visible = false;
    ctx.scene.add(mesh);
    glyphs.push({ mesh: mesh, mat: mat, life: 0, max: 3.2, drift: 0 });
  }
  // ---- floating tags ----
  const beaconTag = ctx.makeTag('beacon', '#F2B441', 0.45);
  beaconTag.position.set(BEACON_X, LAMP_Y + 1.15, 0);
  beaconTag.material.opacity = 0.75;
  ctx.scene.add(beaconTag);
  const decodedTag = ctx.makeTag('decoded letters', '#63BCD8', 0.4);
  decodedTag.position.set(WIRE_X1 - 0.5, WIRE_Y1 - DROP - 1.15, 0.2);
  decodedTag.material.opacity = 0.65;
  ctx.scene.add(decodedTag);

  let glyphCursor = 0;
  function spawnGlyph(ch) {
    const gl = glyphs[glyphCursor]; glyphCursor = (glyphCursor + 1) % GLYPH_POOL;
    gl.mat.map = texFor(ch);
    gl.mat.needsUpdate = true;
    gl.mesh.position.set(WIRE_X1 - 0.4, WIRE_Y1 - DROP - 0.5, 0.2);
    gl.drift = (rnd() - 0.5) * 0.3;
    gl.life = gl.max;
    gl.mesh.visible = true;
  }

  const WIRE_DELAY = N_LAMPS * LAMP_LAG + 0.2; // beacon-to-far-end travel time
  let prevPhase = wrap(-0.0001);
  let prevArrive = wrap(-WIRE_DELAY - 0.0001);
  const tmpV = new THREE.Vector3();

  ctx.camera.position.set(1.2, 0.7, 12.6);
  ctx.camera.lookAt(1.2, 0.3, 0);

  function update(t, dt) {
    dt = clamp(dt, 0, 0.05);
    const phase = wrap(t);
    const sig = signalAt(t);

    // live caption: the word the beacon is actually keying right now
    let cap = 'dot 1 unit, dash 3, letter gap 3, word gap 7';
    for (let i = 0; i < wordSpans.length; i++) {
      const sp = wordSpans[i];
      if (phase >= sp.a && phase <= sp.b) {
        let done = 0;
        for (const et of sp.evs) if (phase >= et) done++;
        const cursor = Math.min(done + 1, sp.word.length);
        cap = 'sending: ' + sp.word + ', letter ' + cursor + ' of ' + sp.word.length;
        break;
      }
      const gapEnd = i + 1 < wordSpans.length ? wordSpans[i + 1].a : sp.b + UNIT * 6;
      if (phase > sp.b && phase < gapEnd) { cap = 'decoded: ' + sp.word; break; }
    }
    ctx.caption(cap);

    // beacon light follows the true Morse envelope
    lampHead.material.opacity = 0.12 + 0.88 * sig;
    beaconGlow.mat.uniforms.uOp.value = 0.12 + 0.75 * sig;
    seaGlow.mat.uniforms.uOp.value = 0.05 + 0.22 * sig;

    // emit a ring at each element onset (handles the loop wrap)
    for (const iv of intervals) {
      const crossed = prevPhase < phase
        ? (iv.a > prevPhase && iv.a <= phase)
        : (iv.a > prevPhase || iv.a <= phase);
      if (crossed) emitRing(iv.dash);
    }
    prevPhase = phase;

    // rings expand and fade
    for (const r of rings) {
      if (r.life <= 0) { if (r.mesh.visible) r.mesh.visible = false; continue; }
      r.life -= dt;
      const u = 1 - r.life / r.max;
      const s = 1 + u * (r.dash ? 16 : 11);
      r.mesh.scale.setScalar(s);
      r.mat.opacity = (1 - u) * (1 - u) * 0.55;
    }

    // wire sway: pointer pushes it, plus a slow idle breath
    const swayAmp = ctx.pointer.x * 0.9 + Math.sin(t * 0.4) * 0.12;
    const wp = wireGeo.attributes.position.array;
    for (let i = 0; i < N_WIRE; i++) {
      wirePoint(i / (N_WIRE - 1), swayAmp, tmpV);
      wp[i * 3] = tmpV.x; wp[i * 3 + 1] = tmpV.y; wp[i * 3 + 2] = tmpV.z;
    }
    wireGeo.attributes.position.needsUpdate = true;

    // lamps: each shows the signal delayed by its place on the wire
    const dp = dropGeo.attributes.position.array;
    const hp = haloGeo.attributes.position.array;
    const hb = haloGeo.attributes.aBright.array;
    for (let i = 0; i < N_LAMPS; i++) {
      const u = (i + 1) / (N_LAMPS + 1);
      wirePoint(u, swayAmp, tmpV);
      const lx = tmpV.x, ly = tmpV.y - DROP, lz = tmpV.z;
      dp[i * 6] = tmpV.x; dp[i * 6 + 1] = tmpV.y; dp[i * 6 + 2] = tmpV.z;
      dp[i * 6 + 3] = lx; dp[i * 6 + 4] = ly; dp[i * 6 + 5] = lz;
      m4.makeTranslation(lx, ly, lz);
      lampMesh.setMatrixAt(i, m4);
      const b = signalAt(t - (i + 1) * LAMP_LAG);
      cTmp.copy(cSteel).lerp(cAmber, b);
      lampMesh.setColorAt(i, cTmp);
      hp[i * 3] = lx; hp[i * 3 + 1] = ly; hp[i * 3 + 2] = lz;
      hb[i] = b;
    }
    dropGeo.attributes.position.needsUpdate = true;
    haloGeo.attributes.position.needsUpdate = true;
    haloGeo.attributes.aBright.needsUpdate = true;
    lampMesh.instanceMatrix.needsUpdate = true;
    lampMesh.instanceColor.needsUpdate = true;

    // completed letters materialize once the pulse train has crossed the wire
    const arrive = wrap(t - WIRE_DELAY);
    for (const ev of letterEvents) {
      const crossed = prevArrive < arrive
        ? (ev.t > prevArrive && ev.t <= arrive)
        : (ev.t > prevArrive || ev.t <= arrive);
      if (crossed) spawnGlyph(ev.ch);
    }
    prevArrive = arrive;

    for (const gl of glyphs) {
      if (gl.life <= 0) { if (gl.mesh.visible) gl.mesh.visible = false; continue; }
      gl.life -= dt;
      const u = 1 - gl.life / gl.max;
      gl.mesh.position.y += dt * 0.45;
      gl.mesh.position.x += gl.drift * dt;
      gl.mesh.quaternion.copy(ctx.camera.quaternion);
      gl.mat.opacity = smooth(0, 0.12, u) * (1 - smooth(0.6, 1, u));
    }

    // subtitle ticker: the same signal, streamed across the base
    const sb = subGeo.attributes.aBright.array;
    for (let i = 0; i < N_SUB; i++) {
      sb[i] = signalAt(t - i * 0.06) * 0.5;
    }
    subGeo.attributes.aBright.needsUpdate = true;

    starMat.uniforms.uTime.value = t;

    // quiet camera with pointer parallax
    const px = 1.2 + ctx.pointer.x * 0.8;
    const py = 0.7 + ctx.pointer.y * 0.7;
    ctx.camera.position.x += (px - ctx.camera.position.x) * (1 - Math.exp(-dt * 2.5));
    ctx.camera.position.y += (py - ctx.camera.position.y) * (1 - Math.exp(-dt * 2.5));
    ctx.camera.lookAt(1.2, 0.3, 0);
  }

  return { update };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

/* The scene drives the camera itself, calling camera.lookAt(target) every
   frame. Recording that target is what lets the viewer orbit the piece: the
   pivot below is whatever the scene is looking at right now, so the orbit
   layer further down can swing the camera around it without the scene and
   the viewer fighting over the camera. */
const sceneLook = new THREE.Vector3(0, 0, 0);
const rawLookAt = camera.lookAt.bind(camera);
camera.lookAt = function (x, y, z) {
  if (x && x.isVector3) sceneLook.copy(x); else sceneLook.set(x, y, z);
  return rawLookAt(sceneLook);
};

/* Live phase caption: scenes call ctx.caption('...') each frame; the text
   only touches the DOM when it changes, with a quick cross-fade. */
const lblPhase = document.getElementById('lblPhase');
let capText = null, capTimer = 0;
ctx.caption = (s) => {
  if (s === capText || !lblPhase) return;
  capText = s;
  lblPhase.style.opacity = '0';
  clearTimeout(capTimer);
  capTimer = setTimeout(() => {
    lblPhase.textContent = capText;
    lblPhase.style.opacity = '1';
  }, 180);
};

/* Small floating text tag rendered to a canvas texture, for labelling
   objects inside the 3D scene. Returns a sprite; scale is world height. */
ctx.makeTag = (text, color, h = 0.42) => {
  const pad = 18, fpx = 46;
  const meas = document.createElement('canvas').getContext('2d');
  meas.font = '600 ' + fpx + 'px ui-monospace, Menlo, Consolas, monospace';
  const tw = Math.ceil(meas.measureText(text).width);
  const cw = tw + pad * 2, ch = fpx + pad * 2;
  const cnv = document.createElement('canvas');
  cnv.width = cw; cnv.height = ch;
  const g = cnv.getContext('2d');
  g.font = meas.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = color; g.shadowBlur = 14;
  g.fillStyle = color;
  g.fillText(text, cw / 2, ch / 2 + 2);
  g.shadowBlur = 0;
  g.fillText(text, cw / 2, ch / 2 + 2);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: false,
  }));
  spr.scale.set(h * cw / ch, h, 1);
  spr.renderOrder = 20;
  return spr;
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
/* Resizing clears the drawing buffer, and a paused piece has no loop running to
   redraw it, so ask the view loop for a single frame. */
window.addEventListener('resize', () => { resize(); kickView(); });
resize();

/* Pointer parallax target, lerped each frame for weight. Frozen while the
   viewer is dragging, so a grab is a clean orbit and not a double motion. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  if (drag.id !== -1) return;
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

/* ================= direct manipulation =================
   Grab the piece and it orbits around whatever the scene is looking at, with
   a little weight on release. Wheel or pinch zooms, double-click or the Reset
   button returns the framing. The orbit is an offset applied after the scene
   has placed its camera for the frame, never a replacement for it, so the
   animation keeps playing from wherever the viewer parked the view. */

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const PITCH_LIMIT = 1.15;            // radians of tilt either side of the scene's own
const ZOOM_MIN = 0.4, ZOOM_MAX = 2.6;
const EPS = 1e-4;

const view = {
  yaw: 0, pitch: 0, zoom: 1,               // what is applied this frame
  yawGoal: 0, pitchGoal: 0, zoomGoal: 1,   // where it is easing to
  vYaw: 0, vPitch: 0,                      // release momentum
  touched: false                           // the viewer has taken the wheel
};
const drag = { id: -1, x: 0, y: 0 };
const touches = new Map();                 // live touch points, for pinch
let pinchFrom = 0, pinchZoom = 1;
/* What the view looked like when the gesture now in flight began. Embedded, the
   canvas is touch-action: pan-y, so a vertical swipe is the host page's to keep:
   the browser hands over a pointerdown and a move, then cancels. That gesture was
   never an orbit, and this is what it gets put back to. */
const gesture = {
  active: false,
  yaw: 0, pitch: 0, zoom: 1,
  yawGoal: 0, pitchGoal: 0, zoomGoal: 1,
  touched: false
};

const hintEl = document.getElementById('hint');
const btnReset = document.getElementById('btnReset');

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

/* The viewer has taken the wheel. The hint and the Reset button are deliberately
   not set from here: they follow the view's own state, synced every frame, so a
   gesture the browser takes back for a page scroll leaves no trace on either. */
function engage() { view.touched = true; }

function beginGesture() {
  if (gesture.active) return;
  gesture.active = true;
  gesture.yaw = view.yaw; gesture.pitch = view.pitch; gesture.zoom = view.zoom;
  gesture.yawGoal = view.yawGoal; gesture.pitchGoal = view.pitchGoal;
  gesture.zoomGoal = view.zoomGoal;
  gesture.touched = view.touched;
}

function undoGesture() {
  if (!gesture.active) return;
  view.yaw = gesture.yaw; view.pitch = gesture.pitch; view.zoom = gesture.zoom;
  view.yawGoal = gesture.yawGoal; view.pitchGoal = gesture.pitchGoal;
  view.zoomGoal = gesture.zoomGoal;
  view.vYaw = 0; view.vPitch = 0;
  view.touched = gesture.touched;
}

/* Is there anything to reset? Only if the view sits off the framing the scene gave
   it, or is still carrying a release back into one. A finger that merely crossed the
   canvas on its way down the page moved nothing, so it is offered nothing. */
function viewMoved() {
  return view.yaw !== 0 || view.pitch !== 0 || view.zoom !== 1 ||
    view.yawGoal !== 0 || view.pitchGoal !== 0 || view.zoomGoal !== 1 ||
    view.vYaw !== 0 || view.vPitch !== 0;
}

function syncViewUi() {
  if (hintEl && hintEl.classList.contains('is-gone') !== view.touched) {
    hintEl.classList.toggle('is-gone', view.touched);
  }
  if (!btnReset) return;
  const show = viewMoved();
  if (btnReset.hidden === !show) return;   // already saying the right thing
  /* Hiding the control the keyboard is standing on would drop focus to nowhere:
     hand it back to the piece first. */
  if (!show && document.activeElement === btnReset) canvas.focus({ preventScroll: true });
  btnReset.hidden = !show;
}

function resetView() {
  view.yawGoal = 0; view.pitchGoal = 0; view.zoomGoal = 1;
  view.vYaw = 0; view.vPitch = 0;
  if (reduceMotion) { view.yaw = 0; view.pitch = 0; view.zoom = 1; }
  kickView();
}

/* Wheel belongs to the host page until the viewer has actually grabbed the
   piece, so scrolling past an embedded visualization never gets hijacked. */
function ownsWheel() {
  return view.touched || window.self === window.top || !!document.fullscreenElement;
}

/* Touch: a vertical swipe still scrolls the host page while embedded; taken
   full screen or opened on its own, the canvas takes every axis. */
function syncTouchAction() {
  const own = window.self === window.top || !!document.fullscreenElement;
  canvas.style.touchAction = own ? 'none' : 'pan-y';
}
syncTouchAction();

function pinchSpan() {
  const p = Array.from(touches.values());
  return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
}

canvas.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;   // the left button orbits; leave the rest alone
  beginGesture();
  if (e.pointerType === 'touch') {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size >= 2) {
      drag.id = -1;
      canvas.classList.remove('is-grabbing');
      /* seed the pinch on exactly two fingers; a third neither orbits nor re-seeds */
      if (touches.size === 2) {
        pinchFrom = pinchSpan();
        pinchZoom = view.zoomGoal;
        engage();
      }
      return;
    }
  }
  if (drag.id !== -1) return;
  drag.id = e.pointerId;
  drag.x = e.clientX;
  drag.y = e.clientY;
  view.vYaw = 0; view.vPitch = 0;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) { /* capture is a nicety */ }
  canvas.classList.add('is-grabbing');
  canvas.focus({ preventScroll: true });
  /* Engaging happens on the first actual movement, not here: a stray click on an
     embedded piece must not quietly take the scroll wheel away from the host page. */
});

canvas.addEventListener('pointermove', (e) => {
  if (e.pointerType === 'touch' && touches.has(e.pointerId)) {
    touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (touches.size === 2 && pinchFrom > 0) {
      view.zoomGoal = clamp(pinchZoom * (pinchFrom / Math.max(1, pinchSpan())), ZOOM_MIN, ZOOM_MAX);
      kickView();
      return;
    }
  }
  if (e.pointerId !== drag.id) return;
  const dx = e.clientX - drag.x;
  const dy = e.clientY - drag.y;
  drag.x = e.clientX;
  drag.y = e.clientY;
  const yawStep = -(dx / Math.max(1, window.innerWidth)) * Math.PI * 2;
  const pitchStep = (dy / Math.max(1, window.innerHeight)) * Math.PI * 1.4;
  view.yawGoal += yawStep;
  view.pitchGoal = clamp(view.pitchGoal + pitchStep, -PITCH_LIMIT, PITCH_LIMIT);
  view.vYaw = yawStep;
  view.vPitch = pitchStep;
  engage();
  kickView();
});

function endDrag(e) {
  touches.delete(e.pointerId);
  if (touches.size === 2) { pinchFrom = pinchSpan(); pinchZoom = view.zoomGoal; }
  else if (touches.size < 2) pinchFrom = 0;
  if (e.pointerId === drag.id) {
    drag.id = -1;
    canvas.classList.remove('is-grabbing');
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) { /* already gone */ }
  }
  if (drag.id === -1 && touches.size === 0) gesture.active = false;
  kickView();
}
canvas.addEventListener('pointerup', endDrag);
/* The browser has taken the gesture back: the finger that started on the piece
   turned out to be the host page scrolling past it, so it was never an orbit. Give
   the view back exactly as the gesture found it, hint and Reset button included. */
canvas.addEventListener('pointercancel', (e) => { undoGesture(); endDrag(e); });

canvas.addEventListener('wheel', (e) => {
  if (!ownsWheel()) return;   // let the host page scroll
  e.preventDefault();
  const d = e.deltaY * (e.deltaMode === 1 ? 16 : (e.deltaMode === 2 ? 400 : 1));
  view.zoomGoal = clamp(view.zoomGoal * Math.exp(d * 0.0012), ZOOM_MIN, ZOOM_MAX);
  engage();
  kickView();
}, { passive: false });

canvas.addEventListener('dblclick', (e) => { e.preventDefault(); resetView(); });
if (btnReset) btnReset.addEventListener('click', resetView);

/* The same orbit from the keyboard, for anyone not using a pointer. */
canvas.setAttribute('aria-label', (canvas.getAttribute('aria-label') || '') +
  ' Interactive: drag or use the arrow keys to orbit the view, plus and minus to zoom, R to reset it.');

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  setPlayUi();
  if (!userPaused) {
    if (vraf) { cancelAnimationFrame(vraf); vraf = 0; }
    if (raf) { cancelAnimationFrame(raf); raf = 0; }
    last = performance.now();
    loop(last);
  }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); return; }
  const step = 0.14;
  if (e.code === 'ArrowLeft') view.yawGoal += step;
  else if (e.code === 'ArrowRight') view.yawGoal -= step;
  else if (e.code === 'ArrowUp') view.pitchGoal = clamp(view.pitchGoal - step, -PITCH_LIMIT, PITCH_LIMIT);
  else if (e.code === 'ArrowDown') view.pitchGoal = clamp(view.pitchGoal + step, -PITCH_LIMIT, PITCH_LIMIT);
  else if (e.key === '+' || e.key === '=') view.zoomGoal = clamp(view.zoomGoal * 0.88, ZOOM_MIN, ZOOM_MAX);
  else if (e.key === '-' || e.key === '_') view.zoomGoal = clamp(view.zoomGoal / 0.88, ZOOM_MIN, ZOOM_MAX);
  else if (e.key === 'r' || e.key === 'R') { resetView(); engage(); e.preventDefault(); return; }
  else return;
  e.preventDefault();
  engage();
  kickView();
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'morse-code-converter-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
    syncTouchAction();
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) {
    /* the hidden tab left a frame queued; drop it rather than run two loops */
    if (raf) { cancelAnimationFrame(raf); raf = 0; }
    last = performance.now();
    loop(last);
  }
});

/* The scene's own camera placement for this frame, before the viewer's orbit
   is layered on. Kept so the orbit is re-derived from the scene's framing every
   frame instead of compounding on its own output. */
const baseCam = new THREE.Vector3();
const off = new THREE.Vector3();
/* Whatever the scene rotated the camera by beyond simply aiming it at the pivot
   (the terrain piece banks into its turns). Re-applied after every orbit so the
   viewer moving the view never flattens the scene's own tilt. */
const sceneTwist = new THREE.Quaternion();
const aimQ = new THREE.Quaternion();
let baseSet = false;

function stepView(dt) {
  if (reduceMotion) { view.vYaw = 0; view.vPitch = 0; }
  else if (drag.id === -1) {
    view.yawGoal += view.vYaw;
    view.pitchGoal = clamp(view.pitchGoal + view.vPitch, -PITCH_LIMIT, PITCH_LIMIT);
    const decay = Math.pow(0.9, dt * 60);
    view.vYaw *= decay;
    view.vPitch *= decay;
    if (Math.abs(view.vYaw) < EPS) view.vYaw = 0;
    if (Math.abs(view.vPitch) < EPS) view.vPitch = 0;
  }
  const k = reduceMotion ? 1 : Math.min(1, dt * 9);
  view.yaw += (view.yawGoal - view.yaw) * k;
  view.pitch += (view.pitchGoal - view.pitch) * k;
  view.zoom += (view.zoomGoal - view.zoom) * k;
  /* Settle exactly on the identity view rather than asymptotically near it, so a
     reset gives the framing back to the scene instead of leaving it a hair off. */
  if (Math.abs(view.yaw) < EPS) view.yaw = 0;
  if (Math.abs(view.pitch) < EPS) view.pitch = 0;
  if (Math.abs(view.zoom - 1) < EPS) view.zoom = 1;
  syncViewUi();
}

/* fresh: the scene has just placed the camera this frame. Otherwise the piece
   is paused and the camera is restored from the last placement it made. */
function applyView(fresh) {
  if (fresh) {
    baseCam.copy(camera.position);
    baseSet = true;
    /* Measure the scene's own twist: aim at the pivot, compare with where the
       scene actually left the camera, then put the scene's orientation back. */
    aimQ.copy(camera.quaternion);
    rawLookAt(sceneLook);
    sceneTwist.copy(camera.quaternion).invert().multiply(aimQ);
    camera.quaternion.copy(aimQ);
  } else if (baseSet) {
    camera.position.copy(baseCam);
  }
  if (!view.touched || !baseSet) return;
  /* Nothing to add: give the scene's own framing straight back, so an untouched
     view and a reset view are the same view, down to the pixel. When the piece is
     paused the scene is not re-aiming the camera itself, so do it here. */
  if (view.yaw === 0 && view.pitch === 0 && view.zoom === 1) {
    if (!fresh) { rawLookAt(sceneLook); camera.quaternion.multiply(sceneTwist); }
    return;
  }
  off.copy(baseCam).sub(sceneLook);
  let r = off.length();
  if (r < 1e-5) return;
  const theta = Math.atan2(off.x, off.z) + view.yaw;
  const phi = clamp(Math.acos(clamp(off.y / r, -1, 1)) - view.pitch, 0.08, Math.PI - 0.08);
  r = Math.max(0.05, r * view.zoom);
  const flat = Math.sin(phi) * r;
  camera.position.set(
    sceneLook.x + flat * Math.sin(theta),
    sceneLook.y + r * Math.cos(phi),
    sceneLook.z + flat * Math.cos(theta)
  );
  rawLookAt(sceneLook);
  camera.quaternion.multiply(sceneTwist);
}

function viewSettling() {
  return drag.id !== -1 || view.vYaw !== 0 || view.vPitch !== 0 ||
    Math.abs(view.yawGoal - view.yaw) > EPS ||
    Math.abs(view.pitchGoal - view.pitch) > EPS ||
    Math.abs(view.zoomGoal - view.zoom) > EPS;
}

/* Dragging a paused piece still moves the view: a light loop that eases the
   orbit and redraws, without advancing the scene. */
let vraf = 0, vlast = 0;
function viewFrame(now) {
  vraf = 0;
  const dt = Math.min((now - vlast) / 1000, 0.1);
  vlast = now;
  stepView(dt);
  applyView(false);
  renderer.render(ctx.scene, camera);
  if (viewSettling()) kickView();
}
function kickView() {
  if (!userPaused || hidden || vraf) return;
  vlast = performance.now();
  vraf = requestAnimationFrame(viewFrame);
}

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  /* Give the scene back its own camera before it steps. Some pieces ease the camera
     from wherever it currently is rather than placing it outright, and they must not
     read the viewer's orbit back as their own starting point: the two would feed each
     other and the framing would run away within a second. */
  if (baseSet) camera.position.copy(baseCam);
  piece.update(t, dt * speed);
  stepView(dt);
  applyView(true);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}
