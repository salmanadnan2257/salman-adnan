<script type="module">
import * as THREE from 'three';

/* ================= scene: hitec-shopify-automation ================= */
// CONVEYOR SYNC: a curtain of CSV data rain feeds two looping conveyor belts
// of kraft product boxes; a translucent cyan scanner plane sweeps the belts
// and every box it crosses flip-refreshes its floating gold tag, while stale
// tags dim and the occasional mismatch takes a corrective side loop.
//
// Palette: bg warehouse night #0E1112, belt graphite #2A3038, box kraft #C89B62,
//          scan cyan #55C0D8, tag gold #E8C25C.
//   Utilitarian night-shift grays and kraft; cyan is the automation doing the work.
//
// Signature: the scanner sweep leaving a wake of freshly flipped tags.

function createScene(THREE, ctx) {
  const Q = ctx.quality;
  const PR = ctx.renderer.getPixelRatio();

  // ---- tunables ----
  const RAIN_COUNT    = Math.floor(1300 * Q); // falling CSV row streaks
  const BOX_COUNT     = Math.max(24, Math.floor(60 * Q)); // boxes across both belts
  const SCAN_PERIOD   = 8.0;   // seconds per scanner cycle
  const SCAN_SWEEP    = 5.5;   // active sweep portion of the cycle
  const SCAN_X        = 8.4;   // sweep half range in x
  const STALE_TIME    = 8.0;   // tag fades toward stale over this many seconds
  const FLIP_TIME     = 0.45;  // tag flip-refresh duration
  const MISMATCH_GAP  = 5.0;   // average seconds between mismatch events
  const MISMATCH_DUR  = 3.2;   // side-loop correction duration
  const TAG_HEIGHT    = 0.66;  // tag hover height above a box

  const COL_BG    = 0x0E1112;
  const COL_KRAFT = new THREE.Color(0xC89B62);
  const COL_GOLD  = new THREE.Color(0xE8C25C);
  const COL_AMBER = new THREE.Color(0xE89440);
  const COL_WHITE = new THREE.Color(1.35, 1.35, 1.3);

  ctx.scene.background = new THREE.Color(COL_BG);
  ctx.scene.fog = new THREE.FogExp2(COL_BG, 0.022);

  function smooth01(x) {
    x = Math.min(1, Math.max(0, x));
    return x * x * (3 - 2 * x);
  }
  function smoother01(x) {
    x = Math.min(1, Math.max(0, x));
    return x * x * x * (x * (x * 6 - 15) + 10);
  }

  const uTime = { value: 0 };
  const uPr = { value: PR };

  // ---- belts: stadium loops in the XZ plane ----
  const belts = [
    { y: -1.55, cz: 1.7, L: 4.6, R: 1.5, dir: 1, speed: 0.026 },
    { y: 0.95, cz: -1.9, L: 5.6, R: 1.7, dir: -1, speed: 0.021 }
  ];

  function pointOnLoop(belt, u, outPos, outTan) {
    const L = belt.L, R = belt.R;
    const P = 4 * L + 2 * Math.PI * R;
    let d = (((u % 1) + 1) % 1) * P;
    let x, z, tx, tz;
    if (d < 2 * L) {
      x = -L + d; z = -R; tx = 1; tz = 0;
    } else if (d < 2 * L + Math.PI * R) {
      const th = -Math.PI / 2 + (d - 2 * L) / R;
      x = L + R * Math.cos(th); z = R * Math.sin(th);
      tx = -Math.sin(th); tz = Math.cos(th);
    } else if (d < 4 * L + Math.PI * R) {
      x = L - (d - 2 * L - Math.PI * R); z = R; tx = -1; tz = 0;
    } else {
      const th = Math.PI / 2 + (d - 4 * L - Math.PI * R) / R;
      x = -L + R * Math.cos(th); z = R * Math.sin(th);
      tx = -Math.sin(th); tz = Math.cos(th);
    }
    outPos.set(x, belt.y, belt.cz + z);
    if (outTan) outTan.set(tx, 0, tz);
    return outPos;
  }

  // belt outlines: top rim, lower rim, and roller ticks
  const outlineMat = new THREE.LineBasicMaterial({ color: 0x3A424C, transparent: true, opacity: 0.7 });
  const outlineDim = new THREE.LineBasicMaterial({ color: 0x2A3038, transparent: true, opacity: 0.85 });
  const pA = new THREE.Vector3();
  const pB = new THREE.Vector3();
  for (let b = 0; b < belts.length; b++) {
    const belt = belts[b];
    const SAMPLES = 120;
    const rim = new Float32Array(SAMPLES * 2 * 3);
    const rimLow = new Float32Array(SAMPLES * 2 * 3);
    const ticks = new Float32Array(Math.floor(SAMPLES / 8) * 2 * 3);
    let ti = 0;
    for (let i = 0; i < SAMPLES; i++) {
      pointOnLoop(belt, i / SAMPLES, pA);
      pointOnLoop(belt, (i + 1) / SAMPLES, pB);
      rim.set([pA.x, pA.y, pA.z, pB.x, pB.y, pB.z], i * 6);
      rimLow.set([pA.x, pA.y - 0.3, pA.z, pB.x, pB.y - 0.3, pB.z], i * 6);
      if (i % 8 === 0 && ti < ticks.length) {
        ticks.set([pA.x, pA.y, pA.z, pA.x, pA.y - 0.3, pA.z], ti);
        ti += 6;
      }
    }
    const rimGeo = new THREE.BufferGeometry();
    rimGeo.setAttribute('position', new THREE.Float32BufferAttribute(rim, 3));
    ctx.scene.add(new THREE.LineSegments(rimGeo, outlineMat));
    const rimLowGeo = new THREE.BufferGeometry();
    rimLowGeo.setAttribute('position', new THREE.Float32BufferAttribute(rimLow, 3));
    ctx.scene.add(new THREE.LineSegments(rimLowGeo, outlineDim));
    const tickGeo = new THREE.BufferGeometry();
    tickGeo.setAttribute('position', new THREE.Float32BufferAttribute(ticks, 3));
    ctx.scene.add(new THREE.LineSegments(tickGeo, outlineDim));
  }

  // ---- product boxes (instanced, per-face fake shading via vertex colors) ----
  const boxGeo = new THREE.BoxGeometry(0.62, 0.42, 0.46);
  {
    const n = boxGeo.attributes.normal;
    const shade = new Float32Array(n.count * 3);
    for (let i = 0; i < n.count; i++) {
      const ny = n.getY(i);
      const v = ny > 0.5 ? 1.0 : (ny < -0.5 ? 0.5 : 0.74);
      shade[i * 3] = v; shade[i * 3 + 1] = v; shade[i * 3 + 2] = v;
    }
    boxGeo.setAttribute('color', new THREE.Float32BufferAttribute(shade, 3));
  }
  const boxMat = new THREE.MeshBasicMaterial({ vertexColors: true });
  const boxMesh = new THREE.InstancedMesh(boxGeo, boxMat, BOX_COUNT);
  ctx.scene.add(boxMesh);

  // ---- floating tags: shared generated label texture, billboarded quads ----
  function makeTagTexture() {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 80;
    const g = c.getContext('2d');
    g.clearRect(0, 0, 128, 80);
    g.fillStyle = 'rgba(22,26,28,0.88)';
    g.strokeStyle = 'rgba(255,255,255,0.85)';
    g.lineWidth = 3;
    const r = 10;
    g.beginPath();
    g.moveTo(6 + r, 6);
    g.lineTo(122 - r, 6); g.arcTo(122, 6, 122, 6 + r, r);
    g.lineTo(122, 74 - r); g.arcTo(122, 74, 122 - r, 74, r);
    g.lineTo(6 + r, 74); g.arcTo(6, 74, 6, 74 - r, r);
    g.lineTo(6, 6 + r); g.arcTo(6, 6, 6 + r, 6, r);
    g.closePath();
    g.fill();
    g.stroke();
    // two text lines and a bold price block, drawn in white so tint colors them
    g.fillStyle = 'rgba(255,255,255,0.75)';
    g.fillRect(16, 18, 72, 7);
    g.fillStyle = 'rgba(255,255,255,0.5)';
    g.fillRect(16, 32, 52, 6);
    g.fillStyle = 'rgba(255,255,255,0.95)';
    g.fillRect(16, 46, 34, 12);
    // barcode ticks
    g.fillStyle = 'rgba(255,255,255,0.6)';
    for (let x = 60; x < 112; x += 5) g.fillRect(x, 46, 2, 12);
    const tex = new THREE.CanvasTexture(c);
    return tex;
  }
  const tagTex = makeTagTexture();
  const tagGeo = new THREE.PlaneGeometry(0.54, 0.34);
  const tagMat = new THREE.MeshBasicMaterial({
    map: tagTex,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const tagMesh = new THREE.InstancedMesh(tagGeo, tagMat, BOX_COUNT);
  ctx.scene.add(tagMesh);

  // ---- per-box state ----
  const boxes = [];
  {
    let n = 0;
    for (let i = 0; i < BOX_COUNT; i++) {
      const belt = belts[i % 2];
      boxes.push({
        belt: belt,
        u0: (Math.floor(i / 2) / Math.ceil(BOX_COUNT / 2)) + Math.random() * 0.008,
        age: Math.random() * STALE_TIME,
        flipT: 1,
        prevS: 0,
        mm: -1, // mismatch timer, negative = inactive
        bob: Math.random() * Math.PI * 2,
        scale: 0.85 + Math.random() * 0.3
      });
      n++;
    }
  }

  const m4 = new THREE.Matrix4();
  const q4 = new THREE.Quaternion();
  const eul = new THREE.Euler();
  const posV = new THREE.Vector3();
  const tanV = new THREE.Vector3();
  const sclV = new THREE.Vector3();
  const colA = new THREE.Color();
  const colB = new THREE.Color();
  for (let i = 0; i < BOX_COUNT; i++) {
    boxMesh.setColorAt(i, colA.copy(COL_KRAFT));
    tagMesh.setColorAt(i, colA.copy(COL_GOLD));
  }
  boxMesh.instanceColor.needsUpdate = true;
  tagMesh.instanceColor.needsUpdate = true;

  // ---- scanner plane and bright core line ----
  const scanGroup = new THREE.Group();
  const scanPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(7.6, 4.8),
    new THREE.MeshBasicMaterial({
      color: 0x55C0D8,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  scanPlane.rotation.y = Math.PI / 2;
  scanGroup.add(scanPlane);
  const scanCore = new THREE.Mesh(
    new THREE.BoxGeometry(0.035, 4.8, 7.6),
    new THREE.MeshBasicMaterial({
      color: 0x9FE4F4,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  scanGroup.add(scanCore);
  scanGroup.position.set(-SCAN_X, -0.2, 0);
  ctx.scene.add(scanGroup);

  // ---- CSV rain curtain ----
  const rainPos = new Float32Array(RAIN_COUNT * 3);
  const rainSeed = new Float32Array(RAIN_COUNT);
  for (let i = 0; i < RAIN_COUNT; i++) {
    rainPos[i * 3 + 0] = (Math.random() - 0.5) * 34;
    rainPos[i * 3 + 1] = Math.random() * 15; // offset within the fall range
    rainPos[i * 3 + 2] = -7.5 - Math.random() * 3.5;
    rainSeed[i] = Math.random();
  }
  const rainGeo = new THREE.BufferGeometry();
  rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(rainPos, 3));
  rainGeo.setAttribute('aSeed', new THREE.Float32BufferAttribute(rainSeed, 1));
  const rainMat = new THREE.ShaderMaterial({
    uniforms: { uTime: uTime, uPr: uPr },
    vertexShader: `
      attribute float aSeed;
      uniform float uTime;
      uniform float uPr;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vec3 p = position;
        float range = 15.0;
        float spd = 1.6 + aSeed * 2.2;
        float f = mod(p.y + uTime * spd, range) / range;
        p.y = 8.5 - f * range;
        float tw = 0.6 + 0.4 * sin(uTime * 3.0 + aSeed * 40.0);
        vColor = vec3(0.333, 0.753, 0.847) * 0.55;
        vAlpha = tw * smoothstep(0.0, 0.07, f) * (1.0 - smoothstep(0.72, 1.0, f)) * 0.5;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = (1.1 + aSeed * 0.9) * uPr * (150.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vec2 q = gl_PointCoord - 0.5;
        float ax = smoothstep(0.17, 0.03, abs(q.x));
        float ay = smoothstep(0.5, 0.28, abs(q.y));
        gl_FragColor = vec4(vColor, ax * ay * vAlpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  ctx.scene.add(new THREE.Points(rainGeo, rainMat));

  // ---- floating tag near the data rain curtain ----
  const csvTag = ctx.makeTag('csv feed', '#55C0D8', 0.7);
  csvTag.position.set(4.5, 4.8, -8);
  csvTag.material.opacity = 0.65;
  ctx.scene.add(csvTag);

  // ---- state ----
  let nextMismatch = 3.0 + Math.random() * MISMATCH_GAP;
  let camX = 0, camY = 1.1;

  return {
    update(t, dt) {
      dt = Math.min(Math.max(dt || 0.016, 0.0001), 0.05);
      uTime.value = t;

      // scanner cycle: eased sweep, faded turnaround so the jump back is invisible
      const cycleT = t % SCAN_PERIOD;
      let scanX = -SCAN_X;
      let scanAlpha = 0;
      let scanActive = false;
      if (cycleT < SCAN_SWEEP) {
        const k = smoother01(cycleT / SCAN_SWEEP);
        scanX = -SCAN_X + 2 * SCAN_X * k;
        scanAlpha = smooth01(cycleT / 0.45) * smooth01((SCAN_SWEEP - cycleT) / 0.45);
        scanActive = scanAlpha > 0.35;
      }
      scanGroup.position.x = scanX;
      scanPlane.material.opacity = 0.10 * scanAlpha;
      scanCore.material.opacity = 0.6 * scanAlpha;

      // mismatch scheduling
      if (t >= nextMismatch) {
        nextMismatch = t + MISMATCH_GAP * (0.6 + Math.random() * 0.9);
        for (let tries = 0; tries < 8; tries++) {
          const b = boxes[Math.floor(Math.random() * BOX_COUNT)];
          if (b.mm < 0 && b.flipT >= 1) { b.mm = 0; b.mmFlipped = false; break; }
        }
      }

      // boxes and tags
      let mmPeak = 0;
      for (let i = 0; i < BOX_COUNT; i++) {
        const b = boxes[i];
        const u = b.u0 + t * b.belt.speed * b.belt.dir;
        pointOnLoop(b.belt, u, posV, tanV);
        posV.y += Math.sin(t * 1.8 + b.bob) * 0.02;

        // mismatch side loop: eased lateral excursion, amber tint, corrective flip
        let mmBell = 0;
        if (b.mm >= 0) {
          b.mm += dt;
          const k = Math.min(1, b.mm / MISMATCH_DUR);
          mmBell = Math.sin(Math.PI * smooth01(k));
          if (mmBell > mmPeak) mmPeak = mmBell;
          if (k > 0.82 && !b.mmFlipped) { b.mmFlipped = true; b.flipT = 0.0001; b.age = 0; }
          if (k >= 1) b.mm = -1;
        }
        if (mmBell > 0) {
          posV.x += tanV.z * 1.05 * mmBell;
          posV.z += -tanV.x * 1.05 * mmBell;
          posV.y += 0.22 * mmBell;
        }

        // scanner crossing detection
        const s = posV.x - scanX;
        if (scanActive && s * b.prevS < 0 && b.age > 1.2) {
          b.flipT = 0.0001;
          b.age = 0;
        }
        b.prevS = s;
        b.age += dt;
        if (b.flipT < 1) b.flipT = Math.min(1, b.flipT + dt / FLIP_TIME);

        // box transform
        eul.set(0, Math.atan2(-tanV.z, tanV.x), 0);
        q4.setFromEuler(eul);
        sclV.set(b.scale, b.scale, b.scale);
        m4.compose(posV, q4, sclV);
        boxMesh.setMatrixAt(i, m4);

        // box color: kraft, dimmed while stale, warmed amber during mismatch
        const fresh = 1 - Math.min(1, b.age / STALE_TIME);
        colA.copy(COL_KRAFT).multiplyScalar(0.62 + 0.38 * fresh);
        if (mmBell > 0) colA.lerp(COL_AMBER, mmBell * 0.75);
        boxMesh.setColorAt(i, colA);

        // tag transform: billboard, flip via vertical squash
        posV.y += TAG_HEIGHT + Math.sin(t * 1.3 + b.bob) * 0.025;
        const squash = Math.max(0.06, Math.abs(Math.cos(Math.PI * b.flipT)));
        sclV.set(1, squash, 1);
        m4.compose(posV, ctx.camera.quaternion, sclV);
        tagMesh.setMatrixAt(i, m4);

        // tag color: gold when fresh, gray when stale, white flash mid-flip
        const flash = Math.sin(Math.PI * b.flipT);
        colB.copy(COL_GOLD).multiplyScalar(0.42 + 0.58 * fresh);
        colB.lerp(COL_WHITE, flash * 0.8);
        if (mmBell > 0) colB.lerp(COL_AMBER, mmBell * 0.6);
        tagMesh.setColorAt(i, colB);
      }
      boxMesh.instanceMatrix.needsUpdate = true;
      boxMesh.instanceColor.needsUpdate = true;
      tagMesh.instanceMatrix.needsUpdate = true;
      tagMesh.instanceColor.needsUpdate = true;

      // live caption follows the scanner cycle and mismatch events
      let cap;
      if (scanActive) cap = 'The sync pass sweeps the belts: every tag it crosses flips fresh';
      else if (mmPeak > 0.35) cap = 'A mismatch takes the corrective side loop';
      else if (cycleT < SCAN_SWEEP + 1.4) cap = 'Supplier CSV data rains into the system';
      else cap = 'Stale tags dim until the next sync pass';
      ctx.caption(cap);

      // camera: gentle sway plus pointer parallax
      const targetX = ctx.pointer.x * 1.4 + Math.sin(t * 0.05) * 0.5;
      const targetY = 1.1 + ctx.pointer.y * 0.9;
      camX += (targetX - camX) * Math.min(1, dt * 3);
      camY += (targetY - camY) * Math.min(1, dt * 3);
      ctx.camera.position.set(camX, camY, 13.8);
      ctx.camera.lookAt(0, -0.35, 0);
    }
  };
}

/* ================= shared runtime ================= */

const canvas = document.getElementById('c');
const btnPlay = document.getElementById('btnPlay');
const speedEl = document.getElementById('speed');
const btnPng = document.getElementById('btnPng');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  throw e;
}

/* Quality tier: 1 on desktop, lower on small screens or few cores.
   Scenes scale particle counts by ctx.quality. */
const small = Math.min(window.innerWidth, window.innerHeight) < 700;
const weak = (navigator.hardwareConcurrency || 8) <= 4;
const quality = small ? 0.5 : (weak ? 0.7 : 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, quality < 1 ? 1.5 : 2));

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500);
camera.position.set(0, 0, 12);

const ctx = {
  scene: new THREE.Scene(),
  camera,
  renderer,
  quality,
  pointer: { x: 0, y: 0 },  /* smoothed, -1..1, y up */
};

/* Live phase caption: scenes call ctx.caption('...') each frame; the text
   only touches the DOM when it changes, with a quick cross-fade. */
const lblPhase = document.getElementById('lblPhase');
let capText = null, capTimer = 0;
ctx.caption = (s) => {
  if (s === capText || !lblPhase) return;
  capText = s;
  lblPhase.style.opacity = '0';
  clearTimeout(capTimer);
  capTimer = setTimeout(() => {
    lblPhase.textContent = capText;
    lblPhase.style.opacity = '1';
  }, 180);
};

/* Small floating text tag rendered to a canvas texture, for labelling
   objects inside the 3D scene. Returns a sprite; scale is world height. */
ctx.makeTag = (text, color, h = 0.42) => {
  const pad = 18, fpx = 46;
  const meas = document.createElement('canvas').getContext('2d');
  meas.font = '600 ' + fpx + 'px ui-monospace, Menlo, Consolas, monospace';
  const tw = Math.ceil(meas.measureText(text).width);
  const cw = tw + pad * 2, ch = fpx + pad * 2;
  const cnv = document.createElement('canvas');
  cnv.width = cw; cnv.height = ch;
  const g = cnv.getContext('2d');
  g.font = meas.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = color; g.shadowBlur = 14;
  g.fillStyle = color;
  g.fillText(text, cw / 2, ch / 2 + 2);
  g.shadowBlur = 0;
  g.fillText(text, cw / 2, ch / 2 + 2);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: false,
  }));
  spr.scale.set(h * cw / ch, h, 1);
  spr.renderOrder = 20;
  return spr;
};

let piece;
try {
  piece = createScene(THREE, ctx);
} catch (e) {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('hud').hidden = true;
  console.error(e);
  throw e;
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (piece.resize) piece.resize(w, h);
}
window.addEventListener('resize', resize);
resize();

/* Pointer parallax target, lerped each frame for weight. */
const target = { x: 0, y: 0 };
window.addEventListener('pointermove', (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = -((e.clientY / window.innerHeight) * 2 - 1);
}, { passive: true });

let userPaused = false;
let hidden = false;
let speed = 1;
let t = 0;
let last = performance.now();

function setPlayUi() {
  btnPlay.textContent = userPaused ? 'Play' : 'Pause';
  btnPlay.setAttribute('aria-pressed', String(userPaused));
}
btnPlay.addEventListener('click', () => {
  userPaused = !userPaused;
  setPlayUi();
  if (!userPaused) { last = performance.now(); loop(last); }
});
canvas.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
});
speedEl.addEventListener('input', () => { speed = parseFloat(speedEl.value) || 1; });

btnPng.addEventListener('click', () => {
  renderer.render(ctx.scene, camera);
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hitec-shopify-automation-3d.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  });
});

const btnFs = document.getElementById('btnFs');
if (!document.fullscreenEnabled) {
  btnFs.hidden = true; /* e.g. embedded without allow="fullscreen" */
} else {
  btnFs.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });
  document.addEventListener('fullscreenchange', () => {
    const on = !!document.fullscreenElement;
    btnFs.textContent = on ? 'Exit fullscreen' : 'Fullscreen';
    btnFs.setAttribute('aria-pressed', String(on));
  });
}

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden && !userPaused) { last = performance.now(); loop(last); }
});

let raf = 0;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  t += dt * speed;
  ctx.pointer.x += (target.x - ctx.pointer.x) * 0.06;
  ctx.pointer.y += (target.y - ctx.pointer.y) * 0.06;
  piece.update(t, dt * speed);
  renderer.render(ctx.scene, camera);
}
function loop(now) {
  if (userPaused || hidden) return;
  frame(now);
  raf = requestAnimationFrame(loop);
}

/* Always autoplay; the Pause button is the opt-out. */
loop(performance.now());
</script>
</body>
</html>
